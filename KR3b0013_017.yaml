body:
  text: 虎鈐經卷十七宋許洞撰雲氣統論第一百六十九雜雲氣第一百七十城上雲氣第一百七十一勝兵雲氣第一百七十二將軍雲氣第一百七十三伏兵雲氣第一百七十四姦賊雲氣第一百七十五敗兵雲氣第一百七十六雲氣統論第一百六十九臣聞百人已上勝敗之氣必俱焉是以順之者昌逆之者亡天地無言吉㓙以象占雲氣有異必契灾變占氣之時觀氣之初出如甑上炊勃鬱上騰氣積而為霧氣陰氣結為虹霓暈珥之屬不積不結散漫不定不能為灾必須和雜殺氣森森然疾起者乃可占常以平明下晡日出没時候之期内有風雨為解者不成灾也若出軍之日天氣漠漠雲彩陰沉而寒者必戰之象也若清明和暢風塵不動者不戰也如或有青氣見軍王相上者大勝青屈旋留注者下流血大霧五十日日不散者其境當有兵馬霧色蒼黄者亦有灾變也白雲如疋練經丑未者兵之象也或雲如人行排列如陣或壬子日四面無雲獨見出雲如旌旗皆兵象也或雲三道如霧非霧如塵非塵者敵人發軍之徵隨其起處防之或白雲如疋布起于東方者大兵起也色赤者尤甚青者失喪黑者亦如之也或黑雲三道首尾鋭而中裂者其下將有大戰或雲氣赤而其縁黄者大臣専權之兆也不早除之將有大變於軍上往来則徃者敗来者勝或雲氣散如錦文者當有赦書行天下天下若無慶賀事必見流血或雲氣如虎頭者暴亂之象也象一作衆或雲氣如弩弓之狀者天子之氣或雲氣長數十百丈者猛將之氣也或雲氣無故如虎行空中者當暴兵至也或雲如人字在空者所發之處一作地必有人来告急一人則氣一條雲如方一紅者暴兵至也或望無雲獨見赤氣如旦暮之霧或見黑雲極天或白雲如僊人衣十萬聨結部隊相逐罷而復起或白雲廣六七丈東西極天如此者皆起兵之象或有黑雲如人持刀楯者暴兵之氣也如見之國當嚴號令肅士伍以備之雜雲氣第一百七十凡占氣三四百里仰而望之平望在桑榆上餘二千里登髙望之下屬地者三千里雲氣有獸居上者勝自華以南氣下黑上赤嵩髙三河之郊氣正赤恒山之北氣下黑上青渤碣海岱之間氣皆黑江淮之間氣皆白徒氣白土功氣黄車氣乍髙乍下往往而聚騎氣卓而卓一作卑布卒氣摶前卑而後髙者疾前方而髙後鋭而卑者却其氣平者徐行前髙後卑者不止而反氣相遇者卑勝髙鋭勝方来卑而循車轍者不過三四日去之五六里見氣来髙七八尺者不過五六日去之十餘里二十里見来髙丈餘二十丈者不過三四十日去之五六十里見稍雲精白者其將悍其士怯其大根而前絶逺者當戰青白而前低者戰勝其前赤而仰者戰不勝陣雲如立垣杼雲類杼軸雲摶兩端鋭杓雲如繩者居前亘天其半天雲蜺者類闕旗鼔鈎雲勾曲諸此雲見以五色合占而澤摶宓其見動人乃有占兵必起合鬬其直王朔所候決于日旁雲氣人主象皆如其形以占故北邊之氣如羣畜穹閭南夷之氣類舟航旛斾一作旗若冬至之後夜明者陽氣之動也不足占勝兵雲氣第一百七十一處營臨陣之時紫氣出於軍上者大慶之兆也即日有喜或軍上雲氣如覆隄前赤後白者勝氣利進兵攻擊在敵則勝或軍上氣凝成雲中天而住一作往堅固不變者名曰剛氣在敵則勿攻之或軍上雲氣作盤踞之狀者此之謂天威也宜用兵精固以漸進戰或軍上雲氣如華盖先動者或雲氣上赤下黑臨軍者此弱彼强然弱終破强小能擊大大戰大勝小戰小勝或雲氣如黑人在赤雲中謂之捷一作梅氣或雲氣如十五童子氣中赤氣在前者彊兵之氣也或雲氣如山隄林木或白氣粉一作分澤聳如樓臺縁以赤氣或雲氣爛如火光或湧如山火煙或雲氣如山盖分為一作髙兩穗蓬蓬然又類草煙之狀此得天勢也或雲氣凝白逐五軍而覆或雲氣十十五五如髙薄蹲黑氣中或氣如黑煙或雲氣如馬頭髙尾低或雲氣如人持斧向敵或雲氣如一疋練此十者勁兵之氣也在敵則宜避之在我則所向皆克矣或雲氣黄白厚潤而重者或雲氣動廣如三疋皂帛前大後狭軍行其中有雲如鬬雞赤白相隨在氣中或陣上有五色氣連天或雲氣連天如烏衣人在赤雲中或黄氣亘天此五者應天之兵也擊之大㓙或軍上氣如虵舉頭向敵或赤黄氣于天或雲氣如日月而赤氣繞之或雲氣如日暈有光著一作者或氣凝聚而不散或赤雲如龍彩色鬱鬱衝天或雲相繞又如鳯凰之狀或雲氣光潤如城門隠隠在白雲中或氣内赤外黄此九者彊兵之勝氣一曰王者之氣也雲氣如是具在我軍上則出擊敵若在敵上則慎勿妄動又若在我軍上及敵人軍氣如常者亦勝兆也城上雲氣第一百七十二進兵攻城及敵来圍我亦審雲氣之吉㓙或城上或營上有氣如人十十五五皆乂手低頭者軍人願降也此章一縁勝敗之氣雜論之又多言城中之事故别立此章若于營塞及陣上吉㓙亦同或雲氣上黄下白名曰喜氣所臨之軍欲相和解或城中氣如白旗者不可拔或黄雲臨城者城中有大喜慶或青色氣如牛頭觸人者城中不可屠一作圗或城中氣出東方色黄者此天鉞不可伐伐者大禍或城上氣如火煙坌湧者主人欲出戰也其氣不可擊諸氣但出而無極者不可屠或赤氣或黑氣如杵形從城内向外者内兵突出主人大勝或城上雲氣分為兩穗火之狀者不可攻或濛繞城而不入者外兵不得入凡攻城塞有諸氣出入吾軍者勝氣也謹備之或攻城赤氣在城上黄氣在四面繞之者城中大將死城降或城上赤氣如飛鳥者急攻之立可破矣或氣出入於城中者城中居一作軍民欲逃散無鬬志急攻之或氣如死灰而覆其城寨者吏士一作使病城可屠或城上全無雲氣者士卒心散或城上赤氣如衆人頭向下者其下多死喪血流或白氣繞城而入者急攻之可拔或白氣光如劍形長百餘丈自敵上起而横城上者攻之者受禍城不可屠八十一日内應或黑雲髙起以黄為縁長凝於陣前横列如跪如伏如手相牽三三五五低頭拱手營陣之上者人必降或雲氣如鷄雉及走兔者賊當来攻城急備之或雲氣三條五條横列成陣文如虎斑者所臨之軍必拔城殺將見之急攻之或雲如龍行於城上者必有大水凡城上勝敗之氣如是者勝在敵不可攻之敗在敵可攻之勝在我則利出兵進擊敗在我則堅壁清野嚴以守之雲氣所見天地心也可不慎哉將軍雲氣第一百七十三欲知敵將之賢愚亦以雲氣占之夫軍上青雲帶赤中黄白色自晝至夜不散者其主弱臣强大將軍驕恣法令顛倒可急攻之或軍上雲氣昏昏暗濁者主將不明賢良不附也或軍上雲氣如蛟龍者主將軍神䰟散亂可擊之或出自白日没之後有青氣西亘天者經十日不雨大將當失位應在三年之内也已而變赤者大敗之兆也或軍上青氣漸黑者大將軍死或雲氣黄白而潤澤者將有威徳也或軍上氣漸漸如雲變作山形者將有深識也或雲外黑而中赤向前者或兩軍相當雲氣如囷倉者或赤氣如山者此三者將悍精驍勇也或雲上與天連者將有智也或雲氣如龍虎在煞氣中或如火煙奮奮或如火光奕奕或如林木巃嵸者或如塵埃頭尖而卑者或色紫黑狀如門上樓者或如紫粉一作粉素霏拂者或如龍游黒霧中者或如日月有赤氣起繞者或狀如門上黑下赤者或皂旗者或如弓形或蜿蜒如蛟虵者此十三者猛將之氣也或雲氣青而疎散者將怯弱也或前大後小者將不明也或内黑縁以白氣者將懦而無謀也如此者可以詐動可以事惑可以威讋可以强逼決勝矣伏兵雲氣第一百七十四進兵之時先於山川四面望其雲氣渾渾圓長赤氣在其中者或如赤杵在黑雲中者其下有伏兵或氣青黑色掩北斗者敵將設伏兵以待我也或兩軍相當赤氣在陣前後者亦有伏兵隨氣所在防之或雲絞絞綿綿者此以車騎為伏也或雲氣聳然類山邱形者此皆精猛之伏兵也或雲氣如布席狀者此以步卒為伏也所見之地急防之姦賊雲氣第一百七十五白氣羣行徘徊結陣而来者他國人来欲圖亂我不可應之視其所往隨而擊之可得也或有黑氣臨我軍上如車輪行敵人深入謀襲營柵或有黑氣游行中含五色臨我軍上必有謀合諸侯而伐我諸侯必謀反敵軍敵軍當自敗或有黑氣如幢節之象出於營中上黑下黄敵人来求戰無誠實言信相及九日内必覺備之吉凡雲氣如是者敵之宻謀也敗兵雲氣第一百七十六軍上氣如死灰或如馬肝或如偃盖或如羣羊或如驚鹿或黑氣如人手皆敗徵也或黑如壊山壊一作敗隨軍軍敗將死隨我亦一作移當避之或雲氣白黄昏發連夜襲敵者軍士散亂擊之吉或軍上氣卑而一絶一敗在東發者灾深或雲氣五色雜亂而東西南北不定者軍欲敗或赤氣炎炎降于天者大將軍死衆自潰亂或黑氣如牛馬從霧中漸漸入軍者名曰天狗下食血急營于逺處避之或雲氣盖道濛蔽而晝㝠者立敗之徵也爨不暇熟急避之若雲氣或青或碎如瓦礫所臨之軍即敗也若雲氣或赤或白如人首頓如人卧匐地抵頭所臨之軍敗也當流血百餘里在吾而欲禳之者大將移營他處即吉也士卒令其歡心上騰可以解禍或雲氣如水士伍潰敗之兆也敵將潛兵襲我之後或夜雲氣長如引索垂下所臨之軍敗也或夜半雲氣濃黑者多陰謀色青白及蒼黑者皆反戾之兆也或黑雲如車輪轉而入軍者小人謀逆急察備之或雲氣狀如犬者其下多流血或雲氣黑色而黄色在上者士卒怯懦内亦有反亂之計也或黑雲如幡幢在氣中者或赤氣如血飛鳥在黑氣中者皆敗兆也或黑雲碎如羣豕或如羣牛馬或如羣驚鳥者皆敗兆也或雲氣如浮塵散漫者士卒謀反逆或赤如火之猛焰燭天而起者大敗流血或赤雲如人三三兩兩或行或坐者暴兵將至也或雲氣如焚生草煙所臨之軍大敗也或夜半雲氣濃黑者多陰謀其色青白及蒼黑者皆反之兆也或雲氣如焚生草煙所臨之軍雖前勇後當自退能以嵗月候而擊之可勝或赤雲氣漫漫而如垂盖者軍當自亂或赤雲兩向狀如八字將各有守尾鋭而復大者大戰流血先動者敗言先動而敗者謂有兩軍交刃之時之兆也或雲氣如懸衣敗兆也雲氣如轉蓬者敗兆也或兩軍相當敵上全無雲氣者擊之可破也或兩軍相當敵上雲氣極天如陣者此之謂横海氣力攻之可破也或兩軍相當望彼軍上有火照人者此失將士之心攻之可敗也或雲氣如羣鳥亂飛者敗兆也或雲氣毶毶如虎尾垂于軍上者軍欲降不然將有奸人為敵應或兩軍相當去十里内望見彼軍上氣白又髙後有青雲者立敗之兆也宜速鼓行而擊或雲氣蒼黑者敗兆也或雲氣如行牛或如鼓車或如羣虵亂走或黑雲如人牽牛皆敗兆也或雲如壊屋之狀兵敗將死或淡黑雲中有深黑雲黯黯而如星者謂之敗軍之氣兵大灾夫師動衆天以勝敗之氣告人者有以也當勝氣者不可恃之當修軍正一作君政精智慮嚴號令正賞罰此可以答天地之貺也茍或恃其勝氣而軍政不修荒怠敗度此可以反勝為敗也偶敗者氣詎能必敗也當以嚴敎令謹智慮責躬罪已恭答天譴此可變敗為勝也大將得不以勝敗之象立修徳之方乎虎鈐經卷十七
