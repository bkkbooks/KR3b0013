body:
  text: 虎鈐經卷八宋許洞撰結營統論第七十八六甲第七十九地勢第八十山勢第八十一四獸第八十二握竒營第八十三偃月營第八十四教弩第八十五教弓第八十六教旗第八十七校獵第八十八軍樂第八十九軍賜第九十大將軍員第九十一陳將軍員第九十二隊將軍員第九十三征馬第九十四牧放第九十五結營統論第七十八立營之法按八宫隂陽數置一作至之營居陽卦之上以九為法九十步九百步九里九十里量人數加之隂卦之上以六為法如九之法營門向陽以受生氣不飲死水不處死地天地丘墓間也不居地柱地柱者四下中之髙也不居地獄地獄者四髙中之下也不居天竈天竈者谷口也不居龍首龍首者山之端也大將軍居九天之上頓泊玉帳九天青龍也玉帳者建前之三辰也假令正月當居巳地是也已下類此推之如隨六甲所居則將軍居青龍旗鼓居蓬星士卒居明堂伏兵居大隂軍門居天門小將居地戶斬殺居天獄軍糧居天牢治罪居天庭軍器居華蓋此所謂立營居天道也六甲第七十九甲為青龍大將住出呼門戶解領行門神名號徐儀直戶神孫齊甲子神乙下蓬星古角過丙下明堂士卒亨丁下大隂伏兵利戊下天門師入行己下神戶小將位齊衆軒斷天獄庚治罪判斷天庭辛囚繫糧儲天牢壬癸下天倉安庫藏又為華蓋避敵兵地勢第八十凡立營之地非生氣不王非山不固營壘之法欲北據連山南憑髙岡左右襟帶地水東流故自乾山伏下旁通子丑寅卯之地入於巽宫未申酉戌地欲髙前欲有迎生平穩地勢欲支條脈散氣象欲鬱茂林叢聳四維阜隴欲如雞籠映起巽上欲水順流地欲順東南凡造壘之時先從戊己上起板築若或其地草木不生則去之鳥獸不集則去之古城古社則去之窑竈古墓則去之燋石砂礫則去之河水逆流則去之此六者營壘之大忌也山勢第八十一山如蟠龍旺案數重宛轉斜曲首尾相從山如鳳凰趐翼開張羣隊十萬帶挾隴岡前御印綬後有回翔山如飛龍攴翼逺通或驚或躍乍橫乍從臺嶺池間舞鶴連鴻山如母狗頭拳尾就腹內乳見項上連首山如生蛇或曲或斜後岡前谷隱馬藏車山如麒麟乍立乍蹲羣從數萬朝者數人山如卧牛屈膝拳頭三光照覆兩水分流屬帶林隴依附土丘山如伏龜四方無缺清泉東流亢陽下歇三門起髙一戶雙闕山如遊龍倚伏數重華蓋隱隱美草茸茸前如雀躍後如雞籠剛柔順俯八卦皆通山如舞鶴趐翼開拓胸臆嵂崒首尾盤礴如此者皆可以居之也四獸第八十二南有汙池為朱雀北有堆阜為𤣥武東有叢林為青龍西有大道為白虎四獸既具八卦既列乃立表測影以定子午之位立表法在前若夫朱雀無頂不可居也𤣥武折足不可居也白虎銜刀不可居也青龍悲哭不可居也强居之者軍覆將死握竒營第八十三外壘一軍一萬二千五百人以十人為火一千二百五十火幕數一如是幕長一丈六尺舍十人守地一尺六寸以三為竒以三千七百五十人為竒數餘八千七百五十人分為八陳陳有一千九百九十七分五銖守地一千七百五十尺八陳積卒守地一萬四千尺卒城二千三百一十二步餘二尺積步卒六里餘一百七十三步二尺以壘四面乘之一面得地一里餘二百二十步內壘得地一十四頃十七畝餘一百九十步四尺六寸六分以為外壘天陳居乾為天門地陳居坤為地門風陳居巽為風門雲陳居坎為雲門飛龍陳居震為飛龍門虎翼陳即陳居兊為虎翼門鳥翔陳居離為鳥翔門蛇盤陳居艮為蛇盤門天地風雲為四正龍虎鳥蛇為四竒乾坤艮巽為闊門離坎兊震為開門有牙旗遊隊列左右偏將軍居壘門禁出入外有遊軍兩端前有衝後有隊四隅有鋪中壘一竒兵三千七百五十人為中壘守地六十尺積步得二里餘二百八十步以壘四面乘之得二百五十步壘內地二頃餘一百步六纛旗鼓五麾金鼓府藏皆在中壘偃月營第八十四背山岡面陂澤前後險阻其地狹窄之營也凡偃月外營以四分幕一萬人以六千人守地九千六百尺積得前一千六百步積得四里餘一百六十步為營轉以六千四百尺得步一千六十六步四尺為弦弦置三門相去三里五十步一尺五寸營內有地一十五頃八十五畝五十八步四尺右置上弦門中偃月門左下弦門偃月中營營以二千五百尺守地四千尺得前六百六十步餘四尺積步得一里餘三百步四尺每幕加地四尺五寸四分每幕營中兩廂置土馬一十二匹大小如常馬被其鞍令士卒披甲胄槖弓矢佩刀劍持矛盾左右上下以便習事教弩第八十五凡弩古有黃連百竹八擔雙弓之號今有絞車弩中七百步攻城拔壘用之擘張弩中三百步騎用之凡臨敵用不過一二發故戰陳不便於用弩也弩不可離於短兵當别為隊攢箭注射則前無立兵對無橫陳復以陳中張陳外射畨次輪回張而復出射而復入如是則弩無絶聲敵無薄我矣夫置弩必處其髙爭奪山川守隘塞之口者非弩不克焉欲教之時乃下令曰張弩後丁字立當弩八字立髙揎手屈衫襟左手承撞右手迎上當心看張張有闊狹左䏶右膞還復當心安箭髙舉射敵逺擡弩頭敵在左右回身放敵在髙潔腳放敵在近平身放射訖却唱殺掣拗蝎尾覆弩在地焉此教弩之法也教弓第八十六凡射必中席而坐一膝正當垜一膝前竪按席稍吐下弰向前微令上傾向右然後取箭覆其手微拳令指第二節齊平以三指捻箭三分之一加於弓亦三分之一以左手頭指受之則轉弓令弦稍離身就箭即以右手尋箭羽下至闊以頭指第二指節當闊約弦徐徐送之令衆差池如鳯翮使當於心又令當闊羽向上弓弦既離身即易見箭之髙下取其平直然後擡弓離席目睨其的按手頥下引之令滿其持弓手與控指及右膊肘平如水准令其肘可措杯水故曰端身如幹直臂如枝直臂者非初直也架弦畢使引之比及滿使臂直是也引弓不得急急則失威儀而不主皮不得緩緩則力難為而箭去遲惟善者能之箭與弓弛齊為滿地平之中為盈貫信美而術難成要令大指知鏃至然後發箭故曰鏃無一作不上指必無中矢指不知鏃同於無目試之至也或以目視鏃馬上與暗中則乖此為無術矣故矢在弓右視在弓左箭發則靡其弰厭其肘仰其腕目以注之手以駐之心以趣之其不中何為也夫矢量其弓弓量其力無動容無作色和其肢體調其氣息一其心志謂之楷式知此五者為上德故曰莫患弓軟服當自逺莫患力羸恆當引之但力勝其弓則容貌和發無不中故始學者先學持滿須能制其弓定其體後乃射之初去地一丈百發百中寸以加之漸到於百步亦百發百中乃為之術成或升其的於髙或致其的於下或以禽獸為的也凡弓惡左一作右傾箭惡直𥜗音溥頥惡傍引頭惡腳垂一作既胸惡前亞背惡後偃皆射之骨髓病也故身前竦為猛虎方騰額前臨為封兕欲鬭出弓弰為懷中吐月平箭闊為弦上懸衡此皆有容儀之善也控弦有二法無名指壓小指中指壓大指頭指當弦直竪中國法也屈大指以頭指壓勾指外國法也其法力少利馬上漢法力多利步用然其持妙在頭指間世人皆以其指末齪弦致箭曲又傷羽但令指面隨弦直竪即脆而易中其致逺乃過常數十步古人以為神而祕之外國法不使大指過頭指亦為妙爾其執弓欲使把箭入厄後當四節指本節平其大指成即承鏃却其頭指使不礙則和美有聲而俊快也射之道備矣教旗第八十七凡教旗幟平原曠野登髙逺視處大將居其上南向左右各置鼓一十二面角十二具各樹五色旗六纛居前列旗次之而監軍使御史禆副次左右牙官隊如偃月形為後騎下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命十將左右决勝將總一十二將一萬二千人要兵創精新甲馬幡幟分為左右廂各以兵馬使為長班布其節次陳間容陳隊間容隊曲間容曲以長參短以短參長回軍轉陳以後為前以前為後進無奔迸退無遽走孫子所謂紛紛紜紜鬬亂而不可亂渾渾沌沌形圓而不可敗者竒此之謂也以正合以竒勝聽音視麾乍合而乍離之便也每一陳分校四陳皆有五校五校各立將軍校尉以凖於古每校亦各有陳數其分布隊伍皆准圖之逐部兵器率以槍戰戈鉦居首隊而包於弓弩焉包於弓弩一作包弓弩於下左校以青龍旗表之右校以白虎旗表之中校軒轅大將所處左鼓右旗四陳皆同謂之一隊者二十五人一部者二十隊也每一校不常其部各列陳數應敵之勢貴戰鬬之際前後不相交亂也飛鶚陳前校出首騎者所以為重也前出一部為觜次四部為面餘五部包之於首左右校出騎兵者內以副身外以副項及首也夫鶚以搏擊為俊故陳欲觜爪之利焉重霞陳衝其不動即分兩穗從旁擊焉敵若驚亂前校騎兵兩穗進擊步士則不可輕進但在本處受戰若前衝騎退即前校騎兵進前校騎兵退即前衝騎兵進夫雲霞以開闔進退不常其法故前校其兵往來氤氲以象之也長虹陳及八卦陳皆有衝突外以出敵之不意內以衛大陳也夫長虹以為名者取陳形彎前扼敵之勢八卦以名之者取八面受敵之象也凡四陳逐部結陳之法橫七隊為首橫七隊為身橫六隊為尾步兵每一隊橫七十步首橫七十步厚十步身亦如之尾橫六十步厚十步身去首二步前後並同騎兵每一隊橫一百四十步厚六十八步首橫一百二十步厚二步身亦如之尾橫一百二十步身去首四步亦如之受戰之時大陳不可輒動敵衆未薄則大敵離於是三令五申白旗㸃鼓音動則左右廂齊合朱旗㸃角聲動則左右廂齊離合與離皆不離中央之地左廂陽回而旋右廂隂回而旋左右各復本位白旗掉鼓音動左右各雲蒸鳥散彌川絡野然而不失部伍之疏密朱旗掉角音動左右各復本位前後左右無差尺寸散則法天聚則法地如此則三合三離三聚三散不如法者使士罪之從軍令於是大將出五彩旗十二口各樹於左右陳前每旗用壯勇士五十人奪旗者勝賞而負罰離合之勢聚散之形勝負之理賞罰之信因是而教之校獵第八十八校獵一人守圍地三尺量其人多少以左右兩將為交頭其次左右將各主士伍為行列皆以金鼓旗為節制其初起圍張翼隨山林地勢無逺近部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其步卒槍幡守圍有漏獸者坐守圍吏大獸公之小獸私之以觀進止之節亦教戰一端也軍樂第八十九夫軍中作樂所以激揚壯氣和其心滔其憂而已故其樂但清厲峭拔雄壯之音至於彈弦鼓簧柔媚之音使人悲感怨懟者皆不可取焉其戲亦取壯猛而可觀者樂鼓杖笛觱篥鉦拍多少隨部伍用戲板橛角鴟馬騎飛石劒門斫刀搶牌獅子軍賜第九十錦袍金帶銀帶金壺瓶銀壺瓶金錢銀錢每一文重一兩所得敵人財帛所得敵人婦女酒食鞍馬弓箭玩好等皆充軍賜之物大將軍員第九十一大將軍一人智信義勇賢明公正者任副將軍二人一主軍糧一主馬糧智信仁勇忠義平直者任總管四入嚴勇諳識軍容者任二主虞侯二主押衙子將八人明行陳金鼓曉部署者任大將别奏八人傔十六人副大將總管别奏並同大將忠勇有才者任判官二人沉厚密謀者任兵會騎曹四人偏僻腐儒令掌禮儀賔客祭祀陳將軍員第九十二偏將一人勇猛果敢揮戈掉劒力敵百夫好勇者任副偏將二人子將四人明旌旗金鼓節令者任一侯二人多機謀能擒奸摘伏者任成房二人㸃平更漏無失紀舉偏將别奏六人傔一十二人副將奏同傔判官一人虞侯傔充子虞侯八人典二人隊將軍員第九十三押官一人經軍陳習戰對隊頭二人副隊二人主文書名目㸃簿酬功行賞知勞苦明部隊行列秉旗一人副旗二人勇者用枹鼓一人主昏明警進止吹角一人主收軍司兵一人主五兵利鈍提轄承拘一人主榷崖科惡口舌無情者任火長五人主樵採等征馬第九十四征馬副一人副大將擇能飬者已下並同總管二人副將子將八人軍隊子將押官五十人羣頭五百人善騎馬奔走者任馬子一千人軍外差能者御之牧放第九十五諸營各作異旗一放馬每隊作記旗放驢於外其馬中央令四面援馬放驢馬子並宜於驢羣四面圍繞驢羣知更牧狂賊偷馬例須一作倒傾奔走驢羣在外驅趂稍難以此防間亦甚允便營别即令别放諸軍不得相交非直發引之時不難忽有不虞追喚亦易諸行軍立營驢馬各於所管地界放牧如營側草惡便擇好處放仍與虞侯計會不許交雜各執本營認旗如須追喚見旗即知驢馬處所諭諸軍驢馬牧放不得連繫每軍營令定一官專撿校逐水草合羣牧放仍定一虞侯果毅專巡諸營水草令各分界牧放不得參雜虎鈐經卷八
