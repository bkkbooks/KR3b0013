body:
  text: 虎鈐經卷七宋許洞撰旗幟第六十九大將旗鼓第七十陳將旗鼓第七十一金鼓第七十二蠡角第七十三鼓角第七十四漏法第七十五傳箭第七十六測影第七十七旗幟第六十九旗幟者軍中之標表也以門旗為首竿上置金銅珠大纛深紅八幅樹大將牙帳前鼓坐其下五方旗各按方面將有事於戰陳大將齋戒潔心淨服俟天清星皎中夜立壇率諸將校宣祝文隨方面祭之大將之行先以五色旗導引之衝向方位甲乙日青旗丙丁日紅旗戊己日黃旗庚辛日白旗壬癸日黑旗五方旗所向在後或前後林藪嶮隘下斧钁斫伐開道舉青旗前有山峽髙峰深溪無避賊寇處復風火相逼即抽兵要逐風燒草以避賊舉紅旗前遇敵列陳即排列輜重引兵結陳擇髙勝地守隘以拒賊舉白旗前值山川地濡卑濕溪澗不平舉皂旗前平原大澤無他患害舉黃旗五色牙帳旗隨天地一作氣四時雲色舉之見青雲舉青旗他皆同此厭土以青旗厭火以皂旗厭金以紅旗厭水以黃旗厭木以白旗厭旌旗之上文以熊虎者象其猛也文以鵾雞者象其鬭也文以日月星辰者法天文也文以鬼神雲氣者如其變也坐罪人於白旗之下殺之於黑纛之下也初得敵人刳其心以祭旗塗其血以釁鼓為我之號者隨我所主焉故春秋傳曰晝施旌旗以威其目夜施火鼓以威其心是故旗幟之用大軍之本也大將旗鼓第七十纛六口槍二根以豹尾為創榼居帳門前五方旗隨六纛後在營亦在纛後嚴警鼓一十二面居大將帳前左右列六纛後角一十二具居鼓左右代金隊旗二百五十口尚色圖禽獸與本陳同五幅認旗二百五十口尚色圖禽獸與諸隊不同各因為認出居隊後恐卒伍交錯陳將旗鼓第七十一門旗不得用紅色嫌亂大將鼓一百二十五面恐設疑驚敵人用之甲五分七千五百領戰袍四分五千領槍十分一萬二千五百根縳一作傅筏牛肋牌二分二千五百面馬軍以圍伐牌一伐分攴弩二分弦三付兵一分二千五百張弩七千五百條弦二十五萬隻箭弓十分弦三付矢二十六萬隻一萬三千五百糧弓二萬七千五百條弦三十七萬五千射甲箭弓袋胡祿并張弓袋並十分一萬二千五百副佩刀八分一萬口陌刀二分三千五百口掊二分三千五百條馬軍及陌刀並付以鎚鉞斧一作為四支金鼓第七十二周禮六鼓樂人掌教六鼓以節樂和軍旅一曰銅鼓二曰鐃鼓一在軍中金之制有四司馬法曰卒長執鐃兩司馬長執鐸進軍鳴鐸退軍鳴鐃大戰之時擊鼓以進擊金以退一作止三曰錞周禮曰一金錞和鼓四曰鐲以節鄭玄曰鐲鉦也軍行鳴之以節鼓也五曰鐸周禮曰以金鐸通鼓鐸鈴也刁斗按黃帝大傳曰與蚩尤戰擊之以警夜也六曰鉦樂志曰鉦形如半鍾旁有小柄樂師持之以和樂節制鉦者進退用之有征之義也蠡角第七十三黃帝戰蚩尤吹角長六尺聲甚鳴後有涿鹿之敗帝問曰所吹何物蚩尤曰角也吹之則風霧俱集後以六尺曰角五尺曰蠡近世列陳金鼓之外餘無他聲號或陳形長為山谷所掩映慮不能照宜於陳兩稍為蠡角隨牌大小增之值敵攻稍則吹之為號中軍吹而應焉鼓角第七十四鼓角者大將之威德十萬兵已上大角二十四具大鼓六十四面五萬兵已上大角一十六具大鼓四十二面三萬兵已上大角八具大鼓二十四面一萬兵已上大角六具大鼓一十四面或深入敵境欲敵人畏謂我師旅大盛但多著之不用此法也動鼓角之時日沒前二刻先吹小角次吹大角一會十六聲三會計四十八聲為一曲畢暮擊鼓三會間第一會五十六聲六疊一間三間畢吹大角一十六聲引第二會鼓五十六聲六疊一間三間畢發鉦一百五十聲畢軍門掣鎖諸將各按部靜吏士無敢喧譁傳刁斗報更漏謹巡警曉起角在四更二點吹小角畢一作吹四更三點過吹大角引第一會鼓四十五聲六疊一間三間畢吹一作叫四更四點過吹大角引第二會鼓四十五聲六壘一間三間畢吹一作叫四更五點過吹大角引第三會鼓四十五聲六疊一間三間畢叫五更一點過吹泊五更四點轉鼓至天曉一十八轉叫五更五點過擊鉦一百五十聲絶聲擊鼓三百聲絶軍門鎖開大將軍嚴裝坐牙帳之上引諸將以次朝漏法第七十五木匱一枚八角髙二尺四寸闊二尺三寸雜色裝畫金銅鐶紉及蓋水匱三片共闊二尺四寸厚一寸五分布黑漆貯水生銅钁一口闊一尺九寸深一尺五寸重七十斤金銅引水龍一條長二尺六寸前腳踏虛雲朵一枚重二十斤龍腹中熟銅飲水渴鳥一條內空長四尺八寸圍一寸五分力士柱二枚各長六尺圍一尺二寸五分并腳下卷荷坐水雕獅子四箇裝裭畫力士柱頭鍍金寶珠二枚及鐵澀一枚一作抆闊二寸五分長三尺六寸金銅釘鉸水稱一梁身長五尺六寸徑一寸五分金銅鐶連鎖長一尺四寸金銅象鎚一枚連鎖九寸共重七斤半一作平凖竿一條長六尺竿身八楞圍八寸五分向本上雕一隻腳踏蓮花坐向下卷雲座金銅鐶紉及曲尺金銅工正一枚長一尺五寸熟銅鍍金壺一枚面闊一尺一寸深七尺金銅連鎖三條各長二尺二寸及連金銅小蓋一枚闊三寸五分共重一十四斤四兩銅觜一枚重十八銖大鼓一面闊一尺一寸深七寸蟠龍繞腔彩畫鉦一面厚四分銅水斗一枚平凖竿一條皆以約漏刻也傳箭第七十六每時有八刻二十分一刻六十分一日十二時合一百刻冬至前三日改第一箭晝四十刻日出辰時一刻夜六十刻日入申時八刻每更一十二刻每點二刻二十四分後三日改第二箭晝四十一刻日出辰時半刻夜五十九刻日入酉時半刻每更一十一刻四十八分每點二刻二十二分小寒初日改第三箭晝四十二刻日出卯時八刻夜五十八刻日入酉時一刻每更一十一刻三十六分每點二刻一十八一作九分後九日改四箭晝四十三刻日出卯時七刻半夜五十七刻日入酉時一刻半每更一十一刻二十四分每點二刻一十六分大寒後三日改第五箭晝四十四刻日出卯時七刻夜五十六刻日入酉時二刻每更一十一刻一十二分每點二刻一十四分立春前三日改第六箭晝四十五刻日出卯時六刻半夜五十五刻日出酉時二刻半每更一十一刻每點二刻一十二分後六日改第七箭晝四十六刻日出卯時六刻夜五十四刻日入酉時三刻每更一十刻四十八分每點二刻九分雨水初日改第八箭晝四十七刻日出卯時五刻半夜五十三刻日入酉時三刻半每更一十刻三十六分每點二刻七分後第九日改第九箭晝四十八刻日出卯時五刻夜五十二刻日入酉時四刻每更一十刻二十四分每點二刻四分驚蟄後三日改第十箭晝四十九刻日出卯時四刻半夜五十一刻日入酉時四刻半每更一十刻十分每點二刻二分春分前三日改第十一箭晝五十刻日出卯時四刻夜五十刻日入酉時五刻每更一十刻每點二刻後六日改第十二箭晝五十一刻日出卯時三刻半夜四十九刻日入酉時五刻半每更九刻四十八分每點一刻五十七分清明初日改第十三箭晝五十二刻日出卯時三刻夜四十八刻日入酉時六刻每更九刻三十六分每點一刻五十五分後九日改第十四箭晝五十三刻日出卯時二刻半夜四十七刻日入酉時六刻半每更九刻二十四分每點一刻五十二分穀雨後三日改第十五箭晝五十四刻日出卯時二刻夜四十六刻日入酉時七刻每更九刻一十二分每點一刻五十分立夏前三日改第十六箭晝五十五刻日出卯時一刻半夜四十五刻日入酉時七刻半每更九刻每點一刻四十八分後六日改十七箭晝五十六刻日出卯時一刻夜四十四刻日入酉時八刻每更八刻四十八分每點一刻四十五分小滿初日改第十八箭晝五十七刻日出寅時半刻夜四十三刻日入戌時半刻每更八刻三十六分每點一刻四十二分後九日改第十九箭晝五十八刻日出寅時八刻夜四十二刻日入戌時一刻每更八刻二十四分每點一刻四十分芒種後三日改第二十箭晝五十九刻日出寅時七刻半夜四十一刻日入戌時一刻半每更八刻一十二分每點一刻三十分夏至前三日改第一箭晝六十刻日出寅時七刻夜四十刻日入戌時二刻每更八刻每點一刻三十六分後六日改第二箭晝五十九刻日出寅時七刻半夜四十一刻日入戊時一刻半每更八刻一十二分每點一刻三十八分小暑初日改第三箭晝五十八刻日出寅時八刻夜四十二刻日入戌時一刻每更八刻二十四分每點一刻四十分後九日改第四箭晝五十七刻日出卯時半刻夜四十三刻日入戌時半刻每更八刻三十六分每點一刻四十三分大暑後三日改第五箭晝五十六刻日出卯時一刻夜四十四刻日入酉時八刻每更八刻四十八分每點一刻四十五分立秋前三日改第六箭晝五十五刻日出卯時一刻半夜四十五刻日入酉時七刻半每更九刻每點一刻四十八分後六日改第七箭晝五十四刻日出卯時七刻夜四十六刻每更九刻一十二分每點一刻五十分處暑初日改第八箭晝五十三刻日出卯時二刻半夜四十七刻日入酉時六刻半每更九刻二十四分每點一刻五十二分後三日改第九箭晝五十二刻日出卯時三刻夜四十八刻日入酉時六刻每更九刻三十六分每點一刻五十五分白露後三日改第十箭晝五十一刻日出卯時二刻半夜四十九刻日入酉時五刻半每更九刻四十八分每點一刻五十七分秋分前三日改第十一箭晝五十刻日出卯時四刻夜五十刻日入酉時五刻每更十刻每點二刻後六日改第十二箭晝四十九刻日出卯時四刻半夜五十一刻日入酉時四刻半每更十刻十二分每點二刻二分寒露初日改第十三箭晝四十八刻日出卯時五刻夜五十二刻日入酉時四刻每更一十刻二十四分每點二刻四分後九日改第十四箭晝四十七刻日出卯時五刻半夜五十三刻日入酉時三刻半每更一十刻三十六分每點二刻七分霜降後三日改第十五箭晝四十六刻日出卯時六刻夜五十四刻日入酉時三刻每更一十刻四十八分每點二刻九分立冬前三日改第十六箭晝四十五刻日出卯時六刻半夜五十五刻日入酉時二刻半每更一十一刻每點二刻一十二分後六日改第十七箭晝四十四刻日出卯時七刻夜五十六刻日入酉時二刻每更一十一刻一十二分每點二刻一十四分小雪初日改第十八箭晝四十三刻日出卯時七刻半夜五十七刻日入酉時一刻半每更一十一刻二十四分每點二刻一十六分後九日改第十九箭晝四十二刻日出卯時八刻夜五十八刻日入酉時一刻每更一十一刻三十六分每點二刻一十八分大雪三日改第二十箭晝四十一刻日出辰時半刻夜五十九刻日入酉時半刻每更一十一刻四十八分每點二刻二十一分測影第七十七先定南北使正樹八尺表竿為勾卧一丈四尺腹中歷氣日中視之影之尺寸若與歷合則吉不合則凶冬至十一月中律中黃鍾管長九寸徑三分影長一丈三尺小寒十二月節影長一丈二尺四寸三分大寒十二月中氣律中大吕管長八寸三分影長一丈一尺二寸立春正月節影長九尺八寸雨水正月中氣律中太簇管長八寸影長八尺一寸七分驚蟄二月節影長六尺六寸七分春分二月中氣律中夾鍾管長七寸四分影長五尺三寸七分清明三月節影長四尺二寸五分穀雨三月中氣律中姑洗管長七寸一分影長三尺二寸六分立夏四月節影長二尺五寸三分小滿四月中氣律中仲吕管長六寸五分影長一尺九寸九分芒種五月節影長一尺六寸九分夏至五月中氣律中㽔賔管長六寸二分影長一尺五寸小暑六月節影長一尺六寸九分大暑六月中氣律中林鍾管長五寸九分影長一尺九寸二分一作九立秋七月節影長二尺五寸三分處暑七月中氣律中夷則管長五寸六分影長五尺三寸七分白露八月節影長五尺七寸秋分八月中氣律中南吕管長五寸三分影長六尺二寸三分寒露九月節影長六尺一作八六寸七分霜降九月中氣律中無射管長四寸九分影長八尺一寸七分立冬十月節影長八尺九寸小雪十月中氣律中應鍾管長四寸七分影長一丈二尺二寸大雪十一月節影長一丈二尺四寸三分夫周天三百六十五度四分度之一為十二次中外共同亦至十二國王侯之所度日一日行一度月一日行十三度月節遲疾平行九道故二十八日行三百六十度餘日逐日度合朔一歲十二月行十三周天與日同夏至日在井去極近冬至日在斗去極逺日陽用事則進北而影短月陽用事則退南而影長測法極逺近以影而知以定南北也虎鈐經卷七
