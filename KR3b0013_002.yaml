body:
  text: 虎鈐經卷二宋許洞撰辨將第六論將第七出將第八軍令第九船戰第十歩戰第十一辨將第六國家行師授律生殺之柄大將所主將者國之腹心三軍之司命也可不慎於選乎茍欲命將預以精誠辨其可否者有四一曰貌二曰言語三曰舉動四曰行事其一曰貎凡眉上雙骨横起而隆巘者語言而不純者目反仰視者方坐内多虚驚者此六者人有其一斯人常藴不臣之心不可使之也豐下鋭上神氣安詳者重徳而善安衆人也目黑多白少㸃睛深而神氣與形相副者機度沉厚不可以詐動人也目睛熒朗五岳相照燕頷虎頥者心機疾速此勇而有斷人也龜背虎臆㸃睛深而朗徹瞻視詳諦而神骨聳峭者雄壯有智慮人也是五者人有其一可使之也至若神氣重濁骨相不正頭薄面淺頸大腹細目睛昏懵㸃睛近上視顧不正此皆志氣淺劣智識庸鄙人也其二曰言語人有言肆而目駭視者心懐異圗也言枝蔓而不經者心有隠也矜大人善言唯恐不至者黨人也言錯綜而無歸者心躁競也方言而他視者心不誠也言卑而色下者心有所屈也方言而四顧者其辭妄也言人之短而視不定者誣罔人也言多以私事為擾者顧妻子之人也言大而理不精者其學虚也色悦而徐徐順人意者佞媚人也矜己善而斥人不善者崛彊人也言欲發而却縮者含蓄人也言無公私必及利者貪人也色卑而言多諂者志下劣人也事曲而言直氣悖而言順心鄙而言大事不詳而彊能理矯而彊正者此姦詐人也是十有六者人有其一不可使也言大而意精至者有識度人也言希而出必中者志節人也言動而必及國家者忠孝人也言奪而不迃者壯直人也辭寡而意懇者正公人也言多及軍吏之私者善拊恤人也言及陣敵喜動色者好勇人也言及細微而能剖析是非者有智人也言迂闊而卒近於理者識深見逺人也言少而事詳者大度人也語氣和而神色相稱者善納衆人也言徐徐而事備者性緩而有徳人也言速而事當性急而不暴有識人也是十三者人有其一皆可使之也其三曰舉動行有狼顧者行與坐忽如驚恐者非時召語而手足紛拏者方食而不覺棄匙筯者方行而首侷口目輒斜動者行而唯恐有人逐者欲坐而頻四顧如有所駭者方言勃氣上騰神色自得者待下多卑恭而不實者覩事已覺如不知而目它視者是十者有其一此皆心不誠實多蓄異人也不可使之也行欲如大輅足動而身不摇也坐欲如山岳形神俱定也卧欲如覆舟神氣安詳也此皆智度沉深大節崇徳人也是三者人有其一可使之也其四曰行事有人行事先己後人者好私人也事繁多而應用不當者無智人也作事不急於用者無益人也作事有首無尾者偽人也先急而後慢者卒衆庸人也事不求詳而輒為是者麄疎人也巧妙而無禆急用者浮艶人也所措捨魯鈍而不適用者愚人也利害章章而不能析之者無識人也臨事而懼者懦弱人也進退不決者無斷人也記一而忘二者神昩人也事虛而構架廣大以善為惡以惡為善者姦人也善候人之顔色隨所欲而言者佞人也是十四者人有其一不可使之也有事簡而用當者有喜怒之事不露於色者臨大事而神氣自若者此謂神有餘也人有微而不棄大而不煩者危事不懼美事不喜者事有衆惑而獨斷之者事有衆危而獨安之者事有難動而獨動之者事有難安而獨安之者此謂志有餘人也是十者人有其一皆可使之也是以知貌也者神之聚也言語也者神之發也舉動也者神之用也行事也者神之本也察其神則盡其為人之道也大矣况國之命將可不審於此乎論將第七萬機論曰雖有百萬之師恃吞敵在將者恃將也夫舉國之利器以授之茍非其人是輕天下將何以為謂小大者各有四焉八者皆無何足以謂之將乎其大者一曰天將二曰地將三曰人將四曰神將其小者一曰威將二曰彊將三曰猛將四曰良將凡興師舉衆列營結陣視旌旗之動審金鼓之聲揆日度時以決吉凶隨五行運轉應神位出入以變用兵敵人不測其所來以神用兵我師不知其所為動有度静有方勝負在乎先見持天地鬼神之心以安士衆此之謂天將者也所至之境詳察地理一作利山澤遠近廣狹險易林藪之厚薄谿澗之深淺若視諸掌戰陣之時前後無阻左右無滯步騎使其往來戈㦸叶其所用指揮進退皆順其情人馬無逼塞之困攻守獲儲蓄之利振野得水草之饒使人馬無飢渴之色陷死地而能生攻亡地而能存逆地而順用之順地而逆用之不擇險易皆能安而後動動而決勝者此之謂地將者也又若廉於財節於色疎於酒持身以禮一作公奉上以忠憂樂與士卒同獲敵之貨賂而不蓄得敵之婦女而不留納謀而能容疑而能斷勇而不凌物仁而不喪法匿一作原其小罪決其大過犯令者不諱其親有功者不忌其讐老者扶之弱者撫一作恤之懼一作驚者寧之憂者樂之訟者決之濫者詳之賊者平之彊者押之懦者隠之勇者使之横者殺之服者原之失者扶之亡者逐之來者爵之暴者挫之智者昵一作𣅿之䜛者逺之得城不攻得地不專敵淺以待變敵詭以順㑹逆勢則觀順勢則攻此之謂人將者也又若以天為表以地為裏以人為用舉三將而兼之此之謂神將者也行師之時無失天時無失地利無失其人無有勇怯聞敵而即行心無疑慮犯令者罪無大小必繩以刑敵聞之即畏一作降當之即破此之謂彊將者也師無多少敵無彊弱三軍順令若臂使指往復萬變出敵不意舉動如神匹馬單劔摧鋒先入使敵人失措懼而逺遁此之謂猛將者也夫能以威為表以猛為裏以彊居中兼三將而有之此之謂良將者也國之任將也得天將可以當違天之敵得地將可以當逆地之敵得人將可以當悖人之敵得神將可以當天下之敵舉無遺筭矣威將可附天將上能順天下壯威武所宜附也彊將可附地將上明地利下知進退所宜附也猛將可附人將上明人心利害下以精敢禦敵所宜附也良將可保四方曰雖有敏㨗之用然皆不可以獨用焉如是者將之體也出將第八王者既審定大臣之可否以將之於是居正殿召之曰今某地不臣願煩將軍應之社稷安危亦在將軍乃使太史氏擇吉日授之斧鉞王入太廟西面而立王操鉞持其首授之柄曰從是以上至天者將軍制之復操其柄授之以刃曰從是以下至地者將軍制之將既受命拜而報曰臣聞國不可以從外理軍不可以從中御二心不可以共濟疑心不可以應敵臣既受命專斧鉞之威臣不敢生還迺辭而行鑿㓙門而出是以將之行也不問妻子示其忠於國君之命將不敢輕其禮示其崇於用將之於外也君命有所不受唯逐便利國家是務其於己也潔其於人也至是故將拒諫則英雄散策不從則謀者去善惡等則賢愚混賞罰亂則綱紀散多喜則不威多怒則人心離多言則機泄多好則智惑寛則衆懈暴則衆怨將專權則下歸咎將自善則下無功將納䜛則正人離將好賂則士卒盜將内顧則士卒淫貶聲揮色所以自潔避嫌遠疑所以自持沉機逺慮所以不失委時順變所以建功恕物篤行所以歸愛昵善斥讒所以來遠先度後作所以應卒先信後言所以伏下信賞必罰所以正人明今鑑古所以照衆卑色貴人所以保終去私循公所以存國其神欲正其形欲端動欲如風取其順健也止欲如山鬭欲如雷電機欲如鬼神思欲如照影令欲如雪霜取其必殺也茍有此者可以當國之大命矣軍令第九大將既受命總專征之柄犒師於野畢而下令焉不從令者必殺之夫聞鼔不進聞金不止旗舉不起旗低不伏此謂悖軍如是者斬之呼名不應召之一作引不到往復愆期動乖師律此謂慢軍如是者斬之夜傳刁斗怠而不振更籌乖度聲號不明此謂懈軍如是者斬之多出怨言怒其不賞主將所用崛彊難治此謂横軍如是者斬之揚聲笑語若無其上禁約不止此謂輕軍如是者斬之掌器械弓弩絶弦箭無羽鏃劍㦸澁鈍旗纛凋敝此謂欺軍如是者斬之妖言詭辭撰造鬼神託憑夢寐以流言邪説恐惑吏士此謂妖軍如是者斬之姦舌利嘴鬭是攢非譖怨吏士令其不協此謂謗軍如是者斬之所到之地凌侮其民逼其婦女此謂姦軍如是者斬之竊人財貨以為己利奪人首級以為己功此謂盜軍如是者斬之將軍聚謀逼帳矚垣竊聴其事此謂探軍如是者斬之或聞所謀及軍中號令揚聲於外使敵聞知此謂背軍如是者斬之使用之時結舌不應低眉俛首而有難色此謂狠一作悢軍如是者斬之出越行伍争前亂後言語諠譁不馴禁令此謂亂軍如是者斬之託傷詭病以避艱難扶傷舁死因而逐遠此謂詐軍如是者斬之主掌財帛給賞之際阿私所親使吏士結怨此謂黨軍如是者斬之觀寇不審探寇不詳到而言不到不到而言到多而言少少而言多此謂誤軍如是者斬之營壘之間既非犒設無故飲酒此謂狂軍如是者斬之此令既立吏士有犯之者當斬斷之時大將以問諸將曰罪當斬遂令吏士挾於外斬之斬斷之後使𫝊令告諸吏士曰某人犯某罪適與諸將議當斬已處斷訖公等宜觀此以自戒是大將以禮行罰使士卒無寃死與衆有畏心矣故軍法者將之大柄也可不重乎是以吕䝉涕泣而斬鄉人穰苴立表而誅莊賈此皆先尊法令後收功名者也船戰第十夫水戰之時擂一通鼔吏士皆嚴肅再擂一通皷士伍皆就船整持一作治櫓棹戰士各一作為持兵器就船各一一作為當其所幢幡鼔角各一作為隨所戰船皷三通大小船以次發左不得右右不得左前後不得易越違令斬之步戰第十一夫步戰之法擂皷一通步騎皆裝再通騎上馬步結屯三通以次出之隨幡住一作往者結屯住一作往幡後聞皷音整陣斥候者視其地形廣狹從四角而立表制戰陣之宜諸部曲各一作為安部陣兵曹舉曰不如令者斬之若欲結陣對敵營先白表乃引兵就表而臨皆無諠譁明聴皷看旗旛麾前則前麾後則後左則左麾右則右麾不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進督兵者殺之督戰部曲將則㧞刃在後察違令不進者即斬之一部受敵餘部不進救者斬臨戰兵器弓弩不可離陣離陣伍長什長不舉發者與同罪無將軍令而妄行陣間者斬臨戰陣騎兵皆在軍兩頭前陷陣騎次之遊騎在後若步騎與賊對陣臨時見地勢便欲使騎獨進討賊者聞三皷音馳騎從兩翼進戰視麾所指聞三金音即還此謂獨進戰之時也步騎大戰進退自如法焉虎鈐經卷二
