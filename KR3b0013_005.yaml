body:
  text: 虎鈐經卷五宋許洞撰料地第三十七生地第三十八死地第三十九料山第四十料水第四十一料塵第四十二料敵陳第四十三料敵營第四十四料用天氣第四十五料用地形第四十六逆用古法第四十七料地第三十七用地之法考地之形勢有六焉一曰通二曰挂三曰支四曰隘五曰險六曰逺我可以往彼可以來曰通居通地利乘髙待敵後通糧運障其間道絶敵之潜來用戰則利也我可以往彼難以反曰挂居挂地先詳敵無備伏兵絶其歸路則利焉敵有備而出則自躓焉我出而不利彼出而不利曰支居支地若敵引兵而去是誘我也勿擊之待其自出薄我則擊之利焉守山谷之口界乎兩向峭絶曰隘我先居隘地整其營陳待敵絶衝突之患若敵先居之盈陳待之言盈陳者實降絶隘口如攻不盈則從其它攻之利焉處髙待下處安待危曰險居險地我先居之利以戰若敵先居之勒兵退乃見其利焉與敵相去營壘之遙曰逺地敵不先進但挑戰戰則不可進必有伏焉敵不戰而引退亦不可逐逐則不利故古人云用兵之道地利為寶此之謂也生地第三十八生地者謂左右前後非死絶之地通糧道進退皆利也生地雖曰兵家之利可以用者六焉若夫懸軍深入一可用也士馬精壯陳勢習熟二可用也將明令嚴三可用也我强敵弱四可用也大將夙著恩信吏士服從五可用也吏士樂戰六可用也其不可以用者有三焉士卒顧家者一不可用也前無利誘士卒退心二不可用也進則害退則利三不可用也兹生地之利害可不審乎死地第三十九死地者謂背山負水糧道生路皆絶也死地雖曰兵家之害可以用戰者四焉將之恩威未著吏士未服一也我兵與敵等我力戰則利畏戰則害欲令吏卒死戰者二也為敵所逼糧芻將竭三也前軍既破後軍尚固四也其不可以用者三焉彼衆我寡一也利害未審矯衆强為二也將心猶豫三也料山第四十山勢迫而障於近者勿營慮伏在側也山亞而繞林奮者勿營慮四周有伏也山回於路者不可妄行慮伏在前也山伏於後者速過急以兵守其後慮為敵所絶也左右前後皆山我頓軍於中者細究其往來之蹊路堙諸間道以兵守之凡諸山坂及野地有林麓近我我利而得之戰則為伏急則為藏守則為薪也茍能知山林之利害者鮮不勝也料水第四十一頓軍之地水流而清徹者食之上也水流而黃濁有沙者食之次也流之黑者食之下也水黃黑以膠徐投之可以清設或水停而不流者勿食水流而上源在敵者勿食水流而中有黑脈不定毒流者勿食食者死水多糞草者勿食食者病水上有人狗彘之尸者勿食如無水可食當於其側穿井以汲吏士營必以水暫憩必以水若將有所涉也水流而或盈或減者勿涉必有壅囊之機水止而為陂為沮洳限於路者勿涉必有澤淖之陷水在敵要地而無甲兵防之者未可即涉先令輕兵搜檢山谷﨑岸慮有伏焉欲奪敵之力者先奪其水得之上流者美莫大焉料塵第四十二敵之始來塵有條而散漫者曳薪也穗起而驚亂者塵車來也塵髙濃厚渾渾而起者騎兵來也卑而廣奮奮而起者步兵也兵少而塵散亂者部伍不肅也兵多而塵靜者部伍按行將之令整也塵埃左右前後起者使人無常法也軍動而塵埃不散漫條逹而起者軍止而塵亦止者此皆大將威德行部伍整肅故也列營結陳之時有塵飛起者隨所起處防之必有賊兵潜到臨賊以塵為候亦料敵取勝之術也料敵陳第四十三敵陳稍長心薄者我軍當自堅其稍先以徑兵力衝敵陳之心力困則益兵進之俟敵陳稍動而來救於心則退衝心之兵復堅我陳俟敵陳稍動則麾我兩稍之兵乘之若敵陳心實而稍圓不可輕擊俟變而後動焉若敵陳於死地部伍齊肅如一者此將賢而兵精也不可輕擊焉陳於死地部伍不肅多動多譁旗幟撩亂此皆將軍愚昧不能擇地利使士伍心動故也可迫而擊之必勝也若陳於生地人馬利於出入行列嚴整旌旗如畫金鼓應節人無喧囂此將有謀而善於得地利者也不可輕擊敵陳於生地令不嚴肅行列不整進退不節此蓋將內不能曉軍政外不能擇地利故也吏士之心必不固可放兵擊之必勝也若敵陳左右山峽而不能盈者可擊也列陳而不能順其地勢者可擊也是知善戰者莫不能此而能料其勝負也料敵營第四十四敵營糧道不通利者可守之敵營得髙燥之地而不顧泉水之利者可俟之俟之久則人馬多渴也敵營得泉水之利而地勢下濕者可逼之敵營地勢不順出入者可攻之敵營寬大而兵少者可薄之敵營圍密而兵寬者不可輕之敵營四周守備不均者隨其虛處以攻之敵營前後左右有出入之便水草之利者不可輕之此皆料陳法也料用天氣第四十五望氣者以氣勝敗告於大將觀敵之氣衰則進攻氣旺則止兵勿與戰此之謂順天時者彼之氣旺他人皆懼怯不敢進兵我獨勇而進焉反能必勝者何也在乎以智逆於氣而巳順任乎時者也夫五行之旺以日時為用靜為主動為客敵之勝氣有如門上樓如杵如枝或白赤為木我則俟金時自西擊之可克矣水日水時不可也水能生木故也敵上勝氣或赤如火光火烟之狀暈暈而起者木日木時不可也為木能生火也日為火亦俟水時自北擊之可克矣敵上勝氣如白粉者白為金水日金時皆不可也茍金日火時利自南方攻之可克矣敵上勝氣黃如土臺者土日金時不可也金日土時不可也金日金時土日土時皆不可也土日木時利自東擊之黃者土也臺者亦土也不言雲氣如水狀而及色黑者緣黑氣多為敗氣此不復用或敵人先據吉地我之頓軍稅駕逼近於凶神死氣之上不得利門而出者但觀我軍上雲氣及敵上雲氣形與色以五行相生相克用之敵氣能生我我則出師進戰我軍上氣能克敵亦利出師進戰不然則勒兵撫士戒嚴警備俟時而動焉不可妄也夫天下轉勝敗之氣由人用之而巳兵家萬變此其一也料用地形第四十六兵法曰散地無戰散地者境內地土也士卒顧家其意未專不可戰也輕地則無止入敵地尚淺士卒意未堅不可以進敵當自堅其心也爭地則無攻山谷隘險之口以弱勝强以少擊衆之地也交地則無絶俱可進退之地不可以兵絶之衢地則合交有路往來我可結交於諸侯也重地則掠深入敵境士卒意已堅固可以掠取財物圍地則謀士卒困於險隘鬭則兵弱持久則糧食乏絶則當用謀以免難死地則戰前有髙山後有大水糧食乏絶進退守備皆無所利當則曰死戰也許洞曰此八者古人用戰地之法若地協於用則用之不協於用則反之反之之謂何也曰若敵衆深入吾境營壁不完芻糧寡少守且不利詎可以散地而不戰乎在我當以必戰為約怯退示以必死擒獲示以必賞令立告諸吏士將軍之際後顧斬之臨敵而目不定足數移者斬之有憂色者斬之偃蹇者斬之相視而動目者斬之遺弓刀器械者斬之金鼓不應節者斬之獲一首級者亦厚賞之如是則有散地之用矣入敵地尚淺險則據而挑夷則守而應慮士卒心不固當擇左右前後背險絶面夷生路肅部伍嚴節制使人人有自戰是則有輕地之用矣山谷險隘敵人先得以控隘我勢我當屯師為大營廣陳務攻其懈其機狀如不密俾敵見之則泄謀矣欲敵人備在前隂出精鋭敢死者循間道或扼其糧運或搗絶其後凡間道必多險阻或有嵓崖峭壁之地則為懸梯竹索以陟登之或有深淵澗則為􅎆缶渡之覺敵內撓則自營陳中出精兵為應內外夾攻有爭地之用矣道路相錯我可以往彼可以來利設伏進戰戰佯北俟逐兵過半則舉號發伏衝擊之反徉北之師以應有交地之用矣頓泊之地徑逹四面當選腹心徑勇者各將步騎以扼四衝人數隨多少使之雖無交應有衝地之用矣致兵敵境凡屬守備者順時安之否則夷之資食所獲必賞吏士內以恱師人外絶敵所恃豈直深入然後用掠乎如是則有掠非止重地之用矣大兵將動先料其强弱觀其雲勢察地勢逆順審人心向背而後舉焉兵法曰䇿之而知得失之計候之而知動靜之理故得失之道利在先知謀勝於未勝慎失於未失者善有死地之危始謀於軍者必有後機之困矣設能反後機而逹先知必無圍地之患矣髙山大澤險阻峭壁沮洳溪徑斷絶無以生遁此乃智士用謀之地路也當宜用兵時出不意以衝寇敵而後擊之出竒奔衝或利用燧馬燧牛如田單楊璇之類是也或候夜昏詐為號直奔衝敵師混服飾軍伍辨認之類是也如止以死戰為期茍敵兵益壯我後不到則李陵有弓折矢盡之困矣戰極力斃當自隕陷能竭智用謀萬變不極則無死地之憂矣孫子曰戰貴地利然則地利者不可一用也但臨時觀其用何如爾兵貴以變設不能以變用兵雖得地利無益也逆用古法第四十七學兵用武率以古法為勢焉與膠柱鼓瑟無異爾未見決中者也兵家之利利在變通之機觀其逆順夫興師之際當先探敵將才不才設若敵將不能以兵法使衆惟以勇敢為己任我則順古法待之也或敵將善用古法我則逆用古法待之也夫用兵之竒莫竒於設伏設伏之竒莫竒於新智新智者非不師古也古而反之爾古人料敵以其始來戰陳未合先以賤而勇者挑之觀其號令旗鼓之整與亂士馬之强弱營陳之偏正行伍之齊肅散亂言語之喧譁緘默以定勝負焉是以古法曰若其衆喧旗亂其卒自行自止其兵或縱或橫其追北恐不及見利恐不得如此者將必無謀雖衆可獲矣許洞曰如古人以此取功茍人能料我當順其所料伏兵待之以詐示之俟彼出師則發伏攻之古法曰杖而立者饑也汲而先飲者渴也見利不進者勞也軍擾者將不重也旌旗動者亂也吏怒者倦也懸瓶不返其舍者窮寇也諄諄翕翕徐與人言者失其衆也數顧者失其羣也來委謝者欲休息也許洞曰觀古人以此料敵今則不然當令精鋭吏士分而伏於要衝使其勞倦傷殘者如饑渴失羣之狀或數搖動其旗或數驚擾其衆使吏士喧譁應敵人所料茍出師襲我則潜發所伏出其不意擊之古法曰敵始來到行陳未定可擊也跋涉長道後行未息可擊也行坂涉險半隱半出可擊也涉水半渡可擊也險道狹路可擊也旌旗亂動可擊也陳數動移可擊也許洞曰在我則不然如以行陳未定四面可設伏也長道移行未息中可設伏也山坂半隱半出長林土谷可設伏也涉水半渡則崖岓坡坂可設伏也狹路險道則前後可設伏也旗數亂動陳數動移前後可設伏也如或敵人敗走我師未敢逐之者防有伏也古法曰鳥起者伏也衆樹動者來也不如此未必伏與來也欲為疑兵也我已奔遁多令老弱者動其衆樹及驚鳥起之類也又曰無約而請和者謀也半進半退者誘也此亦大兵已潜遁恐後人逐者設此為疑也許洞曰料敵以事者多慮為勝反古之法也多中為竒用之於人也是以兵法如車之載其物則車之轉者由輪也及有車之用則東西南北者由人也故兵法不可執而用之也明矣虎鈐經卷五
