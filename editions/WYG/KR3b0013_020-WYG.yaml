body:
  text: 虎鈐經卷二十宋許洞撰誓文第一百九十五祭毗沙門天王文第一百九十六祭風伯雨師第一百九十七祭山川神文第一百九十八祭黄帝文第一百九十九祭蚩尤文第二百祭八神文第二百一祭當境神文第二百二禡牙旗神文第二百三禡門旗文第二百四禡五方旗文第二百五禡六纛旗文第二百六禡五兵文第二百七禡馬文第二百八釁鼓文第二百九誓文第一百九十五有虞氏戒于國夏后氏誓于軍敵人誓于軍門之外周人將交刃而誓所誓不同吾從周誓之誓曰惟天至仁亭毒萬物其有逆于道徳者激霆以震之惟神至幽游息六氣其有淫于禍亂者潛靈以殛之惟王至明順䘏九服其有悖于敎化者興師以察之此四主同條而共貫也是知軍一作君天下者揮長戈以賔不臣未為不善也滌穢滓以廣王化未為不嘉也今逆冦不庭亂常反徳吾為天子恭行天討誓剪大憝決垂元功即出一作即㓙門已即敵境咨爾衆士用命賞于祖弗用命戮于社生死榮辱在是一舉勿使自躓為邦之羞爾其勉之勉之祭毘沙門天王文第一百九十六維年月日某官謹以香燭蔬菓祭于毘沙門天王惟天王神靈通暢威徳奮震據大陰之正位降普天之妖魔左手擎塔尊神顯于西土右手仗戈一作㦸赫威游于北方一舉而羣魔駭再舉而沙界裂目激電以日暗髮聚藍而雲委卓犖萬古鬱稱元神今妖孽未除生靈塗地㓙聲逆氣溢天浮星皇帝命某帥領雄權剿戮羣黨大勲未立壯心徒奮天王受佛法印廣揚神通尚能卷大地于掌中納須彌于芥子今此小醜豈不能怯伏惟降慈悲心救衆生苦開大神力神兵右迴左旋剪滅賊衆脱苦惱于刀兵之刼發濟拯于風火之輪則某也䖍心皈依實在此日尚饗祭風伯雨師文第一百九十七年月日具官某謹以牲牢一作羊香酒之奠祭于風伯雨師之神惟神箕畢之精陰陽之粹也動息無間逰潛太虚大塊噫氣鼓天地以發籟飛龍在天合雲雷而作解茫茫禹跡民其賴之今某出師有期惟靈是禡冀神陰嘉一作佳祐以賛我師旅或則駕舟楫濟巨川神其施九竅之怒號或則陟嶔岑歴險阻神其減十期之霶霈然後蕩妖氛之氣如塵颺空掃兇頑一作妖之血為波注海大事茍濟敢忘𤣥貺尚饗祭山川神文第一百九十八年月日具官某謹以牲牢香酒之奠祭于山川當境之神始疏山濬川所以應天文裂地紀限中外宣風雨雷也惟神者必靈有祈者必應盖山川為之府而神靈為之主也禍淫福善神其掌之故聖人列于典禮國家配於羣望所冀發善者之福祐殱不善之屍骨惟神景天地之命為山川之靈監我懇誠賛我兵力使收功於須臾馘元惡于頃刻尚饗祭黄帝文第一百九十九年月日具銜某謹致祭于黄帝之神惟神天資懿睿首弄兵戎一作戍敷演三才披攘九極陶精頥一作積粹嶷立夐古雖蹈迍之不腆寔一作實伊聖之有作方今天人合發中外稱忠隠幽干黄屋之尊告廟起白旄之命惟神素章元聖開闢往世驅一作馳逐兇慝一作逆揄揚天功綿歴千載一作祀光靈不泯陰垂嘉祐以賛我師旅収闢土地誅鋤鯨鯢幽明合誠幸享多福尚饗祭蚩尤文第二百年月日具官某謹以致祭于蚩尤之神惟神雄材一作才自任命世特立卓絶萬古鬱為人豪在昔一作官炎靈不御土一作御徳丕熾公鄙自天之職纂即戎之緒足􅀢九土手掉五兵而奮臂一呼四溟飛水瞪目再顧兩曜暗光吁氣而煙霧蒸吹蠡一作角而風雨作金虎亦病神龍亦屠然公之丙靈實一作寶萬萬世不冺冀垂嘉祐賛衛我師獲虜樹勲戴答戴一作以作貺尚饗祭八神文第二百一年月日具官某謹致祭于八方之神兩儀設象八卦成文中合粹氣結為神靈聖君則之以奠萬民悠悠姦醜敢有不賔逆天返道罹殃道迍吾今有告神順所聞天門地户人門鬼門震靈一作雷洞洞火靈焞焞水澤之神聚類合鱗茫茫太白靈氣詵詵掃殄兇悖廓清妖氛一作氣明靈之神鑒之尚饗祭當境神文第二百二年月日具官某謹備酒牢奠祭于當境山川之神惟神受天明命辨位司民禍淫福善神之恒徳今姦醜肆暴聚謀不軌汚瀆我境土擄掠我生一作士庶尚未伏鎖授一作誅報首豈神禍淫之道耶俾我元戎肅壇命將提戈逺征大憝未誅元勲未輯豈神福善之道耶今某䖍統大軍以涉靈境固當饗我血薦潛助其力賛應天之兵誅悖道之冦則神正直之方于是乎在尚饗禡牙旗文第二百二年月日具官某謹禡于牙旗之神昊天有命澤祐元王純精播祉𤣥徳勝光蕞爾醜黨取一作敢謀亂常麏驚黔首䑕嚙邊疆天子命我仗鉞専征耀我威武討彼不庭嘗聞天地福謙鬼神害盈善終其祐惡殄其生咨爾一作示陰祗固將郊靈召太乙呼雷公馳白虎走青龍𤣥龜鎮後朱雀前衝濯蕩狡冦掃除妖虹兵不血刃告厥成功神其知之鑒兹予衷尚饗禡門旗文第二百四年月日具官某謹禡于門旗之神惟神奠兵作元揚靈戎首闢向方之正位立㓙器之宏規指顧師徒予實賴汝今醜黨尚肆妖氛未清是致伐鼓建牙聲唬秉律藉神陰祐俾建殊功誠宜磨五兵之䖍比三軍之氣納邊徼之地載扇華風鏁鯨鯢之屍盡為京觀神其聴之尚饗禡五方旗文第二百五年月日某謹禡于五方旗之神惟神稟命昊穹實司所職體國經野正位辨方前指則摧撲兇頑當位則表列師旅伊靈有用由古賴諸我國家自奠丕基遐宣惠政鯨霄鼇柱總八極以天臨木口金鈐震九疆而雷動方資廣被孰敢不賔何邊鄙之遊魂釁妖氛而背惠伊宗既興於嘯聚在予載掌于車徒戎事有征馘元無爽冀神垂祐陰賛六師奮朱雀以前驅命𤣥龜以後殿青斾鼓蒼龍之氣素旌宣白虎之威黄龍鎮中為我軍主誠宜内順指顧外威姦雄一揮而龍塞生塵窮兇罄覆載鼓而狼居破膽敗冦靡奔掃大憝于陬隅耀殊勲于簡牘廓清萬里藉神之靈尚饗禡六纛旗文第二百六年月日某謹禡于六纛之神夫行殺氣于北方表戎事者大纛是故以黑為飾順其位也為君之表嚴其令也師徒撙節右在于誠宣我大用威被元兇所當者皆摧所指者皆靡則神順成之功斯亦至矣尚饗禡五兵文第二百七年月日某謹禡于五兵之神天道不諂助厥元王我作五兵以征四方靈星為衆刃名大房角星示本弓名曲張二宿主弩曰逺望熒惑主矢曰徬徨彼長㦸名大將賴參星而抑揚今則么麽聚臭孛彗騰光流血如水傷骨成岡茍不剪滅孰為忠良咨爾五兵為天大刑大𤣥之垂象方子之淳精順我動使以撲不庭明靈之神鑒之尚饗禡馬文第二百八年月日某謹禡于馬神東方蒼龍實曰天駟考星史而立象垂休觀大易則乾文取譬懿伊馬之用功為邦家之大利何倥偬之邊陬聚兇頑之黨類列旗幟而星蕃掉戈矛而蝟起將耀武于三軍當載揚于六轡所賴者穹昊儲禎明神効祉苟芻飲之叶宜庶陰靈之不昧尚饗釁鼓文第二百九年月日某謹釁于鼔神三軍之威職在震動鼓旗之用靈為鬼神塗血致誠古之常典以聲為度兵之令儀進退周旋實在于爾用誠致饗神其鑒兹虎鈐經卷二十
