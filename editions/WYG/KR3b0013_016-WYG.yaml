body:
  text: 虎鈐經卷十六宋許洞撰分野統論第一百五十六老人星第一百五十七大火第一百五十八析木第一百五十九星紀第一百六十𤣥枵第一百六十一諏訾第一百六十二降婁第一百六十三大梁第一百六十四實沉第一百六十五鶉首第一百六十六鶉火第一百六十七鶉尾第一百六十八分野統論第一百五十六易曰天垂象聖人則之又曰仰以觀乎天文俯以察乎地理此皆前聖人洞吉㓙興亡之道然而天文地理兵象之要畧得不審而用之哉行師之際五星伏没遲順兩曜盈虧薄食飛流示變孛彗為妖既知之矣必審必詳所居躔度焉其躔度既詳之矣必審所管分野焉茍如是方可以精别灾異順其舉動而已矣今臣輒上據天文下推地理以别十二分野外以觀星辰之變内以備山川之用天地之間燦然在目其圖其狀以視於来者焉虎鈐經卷十六
  hash: sha256:5b7bc74b329e9d6b9b5ee0da29b891ada437cd7e571b85a54d9e0a108fab581d
