body:
  text: 虎鈐經卷十五宋許洞撰五星統論第一百五十木星第一百五十一火星第一百五十二金星第一百五十三水星第一百五十四土星第一百五十五五星統論第一百五十嵗星之行也太陰在四仲則嵗行三宿太陰在四孟及四季則嵗行二宿二八十六三四十二行二十八宿十二嵗而周天也熒惑之行常十月入太微受制而出行列宿司無道出於無常也太白之行常以正月甲寅見營室與熒惑俱晨出東方二百三十日而入入二十五日而復出西方二百三十日而入入二十五日而復出東方出以辰戌入以丑未也辰星之行也常以二月春分見奎婁五月夏至見東井一作西八月秋分見角亢十一月冬至見牽牛出以辰戌入以丑未二旬而入辰候之東方也戌候之西方也鎮星之行也常以甲辰元始建斗嵗鎮一宿二十八宿一作嵗而周天也凡木星與鎮星合則為内亂與辰星合則為變謀與熒惑合則為飢為旱與太白合則為白衣之㑹及為水熒惑太白合則為死喪用兵者㓙與鎮星合則為憂與辰星合則軍困先舉兵者大敗鎮星與辰星合則有覆軍亡師與太白合則為疾病為内亂一作兵辰星與太白則為變謀為兵憂矣凡嵗星熒惑鎮星太白與辰星鬬皆大戰之象兵不在外與一作興内兵搆亂一曰火與水合為淬與金合為鑠一作燦不可舉事用兵土與金合國亡木合國飢與水合為癰疽不可舉事用兵木與金合鬬國有内亂同舍為合相陵為鬬二星相近者其殃大二星相逺者無傷也犯者七寸以内光芒相及也陵者相過也凡五星所聚之宿其國當王於天下從嵗星以義從熒惑以禮從鎮星以重重者以威重者也從太白以兵從辰星以法三星若合是謂驚立絶行其國内外皆興兵人民飢饉改立王公四星若合是謂大盪大盪者盪滌也其國兵喪並起五星若合是謂易行有徳受慶一作立王一作正者奄有天下主時泰五星大其事立五星小其事不立凡五星色皆圜白為喪為乾旱色赤而中不平為兵青為水黒為多疾黄吉五星皆角而赤兵大起黄有爭地之役角白喪角青亦興兵黑潦五星同色天下偃兵百姓安樂夫太白主中國而辰星主外國也凡五星早出為盈晩為縮盈為客縮為主人五星盈縮必有天應五星入大將軍興兵吉五星犯畢兵起用兵之道不能先徴五星之休咎是舉其師一作兵與敵也木星第一百五十一木星者東方之宿也木之精也所臨之地必有一作施福祐天子布徳人君之象也其下為太和之神以逆行為不軌為賊殃其木星小則多病大則喜一作加以臨之宿為有禮有福茍無禮則無福所見之分野不依位而見其色光芒動搖謂之怒此則無禮也故有殃其精所居之地或為婦人或為近臣揚其殃禍亂其人民歌謠異語興動盛衰凡木星出若非常之處青黄之色勃勃然有光芒三角者名曰攝提亦名應星亦名重華若角邊見者名重華久住有灾過則無灾兵喪應之木星所臨之舍國不可伐伐者受禍可以征一作往伐人凡木星之行也趨舍為盈退舎為縮盈則其國有兵無傷縮則其國有憂而將死軍敗設若所去焉則失地所到焉則得地亦曰當居不居國亡所居一作到之國昌已居之而東西去者㓙不可舉事用兵利以安靜中度吉凡木星守亢則天下兵起乘昴陰國有憂敵人死入畢邊兵起犯畢及附耳兵亦起犯參伐兵起經栁兵起守軫兵起入五星兵起守羽林兵起犯參旗兵起火星第一百五十二火星者南方之宿火之精也為執法之星嵗一周天其形焰其行速與諸星遲逆不同所臨之地主兵飢喪亂妖孽常以十月入太微宫受制取無道之國勾曲芒角動搖為㓙一云東西南北其行無有常定下為風伯神一名罰罰者其形類留彗勃勃赤焰如火見於分野有憂國人飢亂父不父子不子兵甲起征伐不息其精在無道之國化為童兒著赤衣在於㕓一作蘆里敎為歌謠使國人相惑或為異鳥飛入軍營皆有灾異此星在五星中最為妖惡灾異甚於諸星或逆行一舍二舎為不祥居之三月所臨之分國有灾五月受兵七月國半亡地九月大敗亡且夫火星之精氣也為亂為賊為飢為喪為兵所居之國當受殃若角動繞環之及乍前乍後乍左乍右者灾愈甚若火星臨敵我利之可以力攻之臨我則勿妄動熒惑出則有大兵入則兵散周旋止息乃為死喪冦盜也臨其地則亡地以戰則不勝東行疾則兵聚於東方西行疾則兵聚於西方其南為丈夫喪其北為女子喪火星天子理也故曰雖有明天子必視火星所在凡鶉火之時宜背午地他皆倣此火犯土木主大戰金星摶之亡偏將火環金星偏將死與金星相違而鬬破軍殺將入金申上出者破軍殺將客勝下出所在不利先起犯左右角及守亢兵起入房馬貴入糠兵起犯南斗星破軍殺將火入女及入危兵起守昴敵人不寧匃奴破在三年犯畢右角大戰左角小戰犯附耳及角兵起犯參兵起犯東井一星將軍野戰死犯鬼兵起守七星外有兵起大乘張及與張合兵大㓙守張舍大將驚犯翼邊兵起入軫兵起火行河南界邊兵起犯太微宫門之右大將亡左小將亡金星第一百五十三金星者西方之宿金之精也嵗行分方主義主將䇿主姦謀主誅伐將軍之象也其精下為風伯雨師所在之宿止其分野其芒色搖動可以隨形見灾以出入不時為㓙其星日出則没日入色大一作木甚光一作火大者表帝王之徳正也若合伏不伏合見不見不依常道者此主君一作君之失政臣下用權之兆也或見非常之處芒角七鋒色多似赤者名曰七公亦曰殷公亦名太公一作心表帝王革政大喪之兆也或出東方不依伏没其精名啟明亦名大相乃在左右大臣不赴一作附君心也萬姓蒼皇一作黄流移異國兵革伏起其星凡一作九鋒色白暈其精伏於昴酉四十五日若依位而見則灾消明更見於非常其名大囂亦曰木華亦曰爽易芒角所臨之國其大灾有七一曰大水二曰大火三曰芒散四曰兵聚五曰大兵六曰大飢七曰賢聖飛騰出境蟲獸食人天下大亂日南方金星居其北者曰盈王侯不寧用兵進吉退㓙日北方金星居其南者曰縮王侯有憂用兵退吉進㓙當出不出當入不入為失舎不有破軍必有死亡之兆一曰天下偃兵野有兵者所當之國大㓙當出不出未當入而入天下偃兵未當出而出當入而不入天下起兵所當之國亡其當期一作斯而出也其國昌出青一作東為東方入黑為北方出白為西方入赤為南方所居久其國利疾過則其鄉㓙入七日而後復出將軍戰死入十日而後復出相死入又復岀王者惡之已出三日岀三日而後微一作没没三日而乃復盛出是謂火一作央伏其下國有軍將死已入三日又復微出出三日乃復盛入其下國有憂師雖衆敵人食其糧用其兵虜其帥出西方失行外國兵敗出東方失行中國兵敗一曰出早為月食晩為天矢為彗星將發其國出東為徳迎之吉金星出而留桑榆間疾其下國行遲而下也正出舉國平正出桑榆上者餘二千里上而疾未盡其日過三天疾其對國分天為三在酉戌間過其一也經天下當革主日陽也金星陰星也日出則星亡晝見於午上為經天是謂亂紀金星晝與日爭明彊國弱女主昌且金星者兵象也出而髙用兵吉淺㓙金星庳淺吉深㓙行疾用兵疾吉遲㓙行遲用兵遲吉疾㓙有芒角敢戰吉不敢戰㓙左右進退順角所指吉逆之㓙動搖為躁國以靜吉金星出則兵出入則兵入赤角戰白角喪黑憂青有木事黄有土事有年金星猶憂軍也而熒惑憂也故火星從金星軍憂離散金星出畢之陰有邊兵起出畢之陽有征伐之事當其行火星還之破軍殺將也辰星者殺伐之氣戰鬬之象也與金星俱出東方皆赤而外國敗中國勝與金星俱出西方皆出而角中國敗外國勝五星分天之中積于東方中國利積于西方外國用兵者利辰星不出則金為客辰星出則金星為主辰星與金星不相從雖有軍不戰若辰星出東方金星出西方辰星出西方金星出東方為格野雖有兵不戰辰星入金中五日乃出及入而上出者破軍殺將客勝下出者客亡辰星抵金金星不去者將死正旗出破軍殺將客勝下出客亡地視旗所指以命破軍其繞環金星若與鬬大戰客勝主人吏士死水星與金鬬可撼劍撼劍者其間可容一劍也小戰客勝居金星前三日軍罷出金星左小戰摩金星有數萬人戰主人吏士死出金星右去三尺許軍急約戰凡金星所出所直之辰其國得位得位者所直之辰順其色而角者勝其色害者敗隨地而敗向也鄭色黄而未蒼小敗宋色黄而赤黒角者小敗楚色赤黄小敗燕色黒黄先小敗移却則勝之金星白比狼赤比心黄比參右肩青比參左肩黑比奎大星色勝位行勝色太白行得其度則勝色也行其度盡勝之凡金星與月相火有兵拔城偏將戰與月俱出守城者敗與列宿相犯小戰與五星相犯大戰金星在南南軍勝在北北軍勝出東方背之吉逆之㓙西南亦如之金星守北斗三十日敵人来侵入羽林兵起入昴及入畢敵人死滅金星之光戰敗將死金星變色隨方色戰吉若青則東克餘亦如之入月客兵敗將死色白而角可與戰金星之出也初大後小兵弱初小後大兵彊金星與木星一東一西害王侯一南一北刀伏藏犯畢左角右將死右角大戰將死陵房色赤兵起勾芒大戰不勝將鬬死金星出入而留守於尾兵起於野將士滿道入斗將戰死犯河鼓敗軍殺將犯牽牛時矢衆守牛甲兵犯房一作危亦兵起入室暴兵滿道將死犯東壁大兵起守奎外兵入國犯塞守婁征無功守胃兵起敵人死四夷多憂驚犯畢邊兵欲毁犯畢右角敵人大戰入畢口馬貴軍傷犯觜兵起犯參邊將起左右廂大將憂犯參伐兵起犯井將軍惡之入井兵起犯輿鬼兵起入栁兵起益地守栁大將死犯星大將入塞入翼天下兵起犯軫其國兵大起水星第一百五十四水星者北方之宿水之精也出於仲月天下和平若仲月不見則灾變生大飢陰陽錯亂國家傾危冬温夏涼害人傷物主制王刑偏將軍之象也其精下為先農之神出入以辰戌丑未一名細一作扭極其時宜效不效為㓙其光青白輝輝然者此帝王之為徳及一作正也如此星見多夜雨晝晴者臣下用陰謀其上也至于偏裨他皆放此其星若不見四仲見於四孟之月者其神一名鈎星光芒勃勃然如片雲大如景星燦爛似月所見分野人多流亡迭相嚙食白衣聚㑹兵起吞併九州十年大荒其變如此審詳候之其久而不没聚光兩角變彗勃勃然者象海鯨魚死易王迎新之象其神又名㸑星芒急輝輝然其芒角五鋒狀如厲劍形于一作於萬物也出早為月蝕晩為彗星一時不出其時不和四時不出天下大飢失其時而出一作為當寒反温當温反寒當出不出是謂一作以擊卒兵大起也與他星遇而鬬天下大亂凡水星入月主敗兵與金星合而出破軍殺將客勝視所指以命破軍環金星大戰客勝守房敵敗守婁兵起犯畢夷傷主人克勝出昴北敵人死守畢昴邊兵起守參伐南敵人入塞入井則兵進出井則兵退犯鬼兵起入婁兵起守栁中馬貴守張兵起入翼兵大起犯五軍兵起留心兵起四方土星第一百五十五土星者中央之宿土之精也若見於四季表主之盛衰也其神隠於太微或下于人間為妖異為艷女起亂亡破國家為妖言惑亂人心或為近臣間鬬忠良若其星光潤鮮明見井鬼之間伏没依常道則正道不失不依常道則三綱錯亂夫此星之色本黄而光明獨鋒在上如火焚一作炎之狀四面衆光細而附上毳然即土星之本體土星所居國吉未當居而居之若已去而還復居之國得土地當居不居既已居之又東西去之國失土居其宿久則福一作禍厚居其宿易則福薄之當所居不失舍其下國不可伐其盈為王不寧縮有軍不復其失次上二三宿曰盈有主命不成不乃大水失次下二三宿曰縮有后戚其嵗不復不乃天裂若地動凡犯左角大將戰死守右角兵起守糠兵大起入天廟兵大起守虚有客兵至不過五日自去守奎入奎有邊兵起入婁亦如之入胃客兵敗主兵不用入昴敵人死入畢為亂入觜兵起逆行守參敵兵起守井越兵起入胃舎七星兵起負海大張守張多盜賊與土工兵起入軫兵發事自敗入天庫兵起守南河界外國兵起出東掖門為將軍寶事出西掖門為將軍受事西出受刑虎鈐經卷十五
