body:
  text: 虎鈐經卷三宋許洞撰兵機統論第十二軍謀第十三敎戰第十四先謀第十五先勝第十六勝敗第十七知姦第十八奪恃第十九襲虚第二十任勢第二十一使間第二十二分守第二十三兵機統論第十二臣聞兵者隂也隂之德以虚為用而應於體也月者太隂之精氣也朔望不常何也盖由以虚為變也兵者既為隂類則其機宜常虚含變以法月也能以虚含變應敵動必利矣觀乎天文之風雲星辰有吉㐫者天之示於人也善用兵者得其吉象不可恃之恃之者㐫得其㐫象不可懼之懼之者怯茍知天象之吉㐫者是虚其機以應天者也觀乎地理山川險易有生死存亡之途者地之利於人也善用兵者於地理無生死存亡觀彼我之勢察去就之情何如然後順其事而用之茍知地理之險易者是虚其機以應地者也觀乎人事彊弱利害有勝敗之勢者事皆係於人也善用兵者能以變合於事事合於時時合於理無彊弱無利害則敗勢可以為勝勝勢可變而為敗茍知人事之勝敗者是虚其機以應人者也是故善戰者雜於㐫而難可釋雜於吉而勢可壯吉㐫交雜而能不惑於用者此可以上不畏天矣雜於險而事利雜於易而事難險易交雜而能常處其變者此可以下不畏地矣雜於一作其利而敵見其害雜於害而我敗一作馭其利利害交雜而能不屈於敵者此可以中不畏人矣知此三者而用兵其盡三才之變乎自古兵法及臣所著之書其間申明利害者特直指其形貌言爾以臣所謂能審一時之機者其在天也無吉㐫其在地也無險易其在人也無利害軍謀第十三用兵之道先正其禮次淵其謀次擇其人然後詳天地之利害審人心之去就行賞罰之公慎喜怒之理擇進退之地張攻伐之權明成敗之圖度主客之用能愛人之主者可使人捨生而赴死能親人之身者可使人捐身而犯難是故先親於人俾人然後親之先勝於敵就敵然後勝之故用兵必以糧儲為本謀畧為器彊勇為用鋒刅為備禄位為誘斬殺為威彊弱相援勇怯相間前後相趨左右相赴逺近相取利鈍相蔽歩騎相承長短相用長兵短兵之用也敵欲堅陣我則突其不意敵欲直衝我則備其所從攻必先攻其所寡擊必先撃其所動薄者可突長者可截亂者可惑疑者可脇夫軍之為政也勞在乎役無度怨在乎賞不均弱在乎逼迫窮在乎絶地離在乎將失道懼在乎將無勇饑在乎逺輸渴在乎窮井軍之為逸也樂在乎安静利在乎賞罰當其死在乎軍檢正成其功在乎戰陣詳如此者戰陣之術也軍之即於戰陣也從生擊死從實擊虚從整擊亂從利擊害從逸擊勞從有餘擊困窮山陵之戰不仰髙不逐深不衝隘不逺追水上之戰不違風不逆流林中之戰不連翼不相馳草上之戰不渉深平陸之戰不逺離此戰法之利也軍之禁也不節語言必泄不峻令行必亂不行賞士必怠行伍紊亂由於昩暗一作旺在明察以正之晦夜驚怖在鎮静以嚴之是以知陣之嚴整軍之表也軍吏畏愛將之裏也軍之所親將之所存非智賢孰能與此乎敎戰第十四諸敎戰陣每五十為隊從營纒槍幡至敎場左右廂各依隊次解幡立隊伍相去各十歩分布使均其駐隊塞空去前隊二十歩列布訖諸營士卒一時即向大將麾下聽令每隔一隊定一作一戰隊即出向前各進五十歩聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時􅎄槍張弓捲幡抜刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時跪膝籠槍坐目看大將黄旗耳聽皷聲黄旗向前亞皷聲動齊喝嗚乎並去聲齊向前到中間一作界一時齊唱聲殺齊入賊退敗訖可趂行三十歩審知賊徒喪敗馬軍從背逐北聞金鉦動即須息却行膞上架槍側行回身本處散立第一聲絶一時􅎄槍便解幡旗第二聲絶一時舉槍第三聲絶一時簇隊一看大將處兩旗交即五隊合為一隊即是二百五十人為一隊其隊法及捲幡舉槍簇隊鬭戰法並依前一看大將處五旗交即十隊為一隊即是五百人合為一隊其隊法及捲幡舉槍簇隊鬬戰法如前聽第一聲角絶即散二百五十人為一隊如此凡三度即敎畢諸士卒一時聽大將賞罰進止第三聲角絶即從頭引隊伍還軍先謀第十五用兵之要先謀為本是以欲謀行師先謀安民欲謀攻敵先謀通糧欲謀疏陣先謀地利欲謀勝敵先謀人和欲謀守據先謀儲蓄欲謀彊兵先謀正其賞罰欲謀取逺先謀不失其邇茍有反是而用兵者未有不為損利而趨害者也是故聖王之兵先務其本本壯則末亦從而茂矣茍能知利害之本謀以禦敵雖有百萬之衆可不勞而克矣先勝第十六孫子曰勝兵先勝謂先定必勝之術而後舉也何謂必勝許洞曰先務三和次務三有餘次務三必行何謂三和曰和於國然後可以出軍和於軍然後可以出陣和於陣然後可以出戰國不和則人心離軍不和則敎令亂陣不和則行列不整不先務此三和之道我其可戰耶何謂三有餘曰力有餘食有餘義有餘也力無餘則困於鬭食無餘則怠於時義無餘則吏士怨不務三有餘之術師其可動耶何謂三必行曰必行其謀則奸機不成必行其賞則好功者不愛其死必行其罰則有過者不歸咎不能務三必行之道人其可用耶是以知善務和者公無私捨小惠務大惠善務有餘者力諸事而不自怠善務必行者興勇斷去猶豫之謂也舉是九者務令預定之於前則萬變千機然後動乎其中矣率此以禦敵未有不勝者也故曰勝兵先勝者勝在我也其在大易曰先天不違之義也勝敗第十七用兵之術戰勝不可專專勝有必敗之理戰敗不可不專專敗有反勝之道戰勝而敗者有五急難定謀狐疑不决一敗也機巧萬端失於遲後二敗也機事不宻三敗也似勇非勇似怯非怯四敗也主將不一五敗也此五者皆戰勝而反敗也戰勝而欲必勝者定謀貴决機巧貴速機事貴宻進退貴審兵權貴一也勢敗而反勝者有四吏士饑割所愛啗之割所愛者謂在急難之中殺所乘駿馬愛妾以啗吏士也衆有飽之用矣吏士恐懼奮身先之衆有勇之用矣期應不到殺其所昵所昵者謂所嬖倖或子弟諸姻同在軍中若有主守者犯命則先殺之也衆有懼之用矣人有疑惑隂為鬼詐鬼詐者謂詐為狐鳴將星亮之類也或假托卜筮百端不一衆有天之用矣天謂天所授也如是者以敗為勝也勝敗之術非勇決神智安能行之耶知姦第十八敵使來目數動色數異而言肆者刺客也敵未困而請和者謀也敵卑辭厚幣者驕我也使雖頻來為寇不止者侮我也厚貨啗我左右者欲搆我宻謀也使來言語辨利欲兩國休解者將掩我不備也使言語崛彊者欺我也敵使有此七者宜細詳之將為挾之謂謁見之時以操兵者挟輔而見謀者反其謀謂偽詐之却掩其不備也驕者反其驕拒其辭幣使敵人信我為驕也侮者凌之舉兵其無禮搆者示之佯不知而反示之以虚事也將掩不備復之佯聴其說反掩其不備也欲者誅之誅無禮以威敵留使者不可久久則知我微不如殺之是以知姦之道兵之本也不可不審奪恃第十九敵無恃不可以為宼欲審者豫審而奪之敵之為梗或以彊或以隘或以勇或以緩之謂也奪彊以氣奪隘以動奪勇以威奪緩以誘夫敵以力有餘而加於人我則以緩伺其力衰而乗之此奪氣者也敵以嶮地壁守或盈隘而陣我雖士民豐逸不可以彊取守者以利暢其心否則俟動則攻之陣者以勢逼其敵否則俟動隨而衝之此奪隘者也關塞營壘糗糧所搤預於要路伏兵絶之必力奪其輜重敵可使饑此奪緩者也人逸馬良恃彊輕戰可據隘設伏示弱以誘此奪勇者也不知四奪不足以語竒也兵術萬途不可專一先能奪其所恃則彼力衰半矣襲虚第二十襲虚之術有二焉一曰因二曰誘何謂因曰敵兵所向我亦佯應之别以精兵潜出虚地或攻其壘或斷其後或焚其積聚也何謂誘曰欲敵之要地則不攻而佯攻其隣大其攻具盛其師旅以誘敵兵敵兵到則勿與戰復與壁守潜以精銳襲所出兵之城而掩其内此二者皆襲虚之道也任勢第二十一兵之勝敗非人之勇怯也勇者不可必勝怯者不可必敗率由勢焉耳勢之任者有五一曰乗勢二曰氣勢三曰假勢四曰隨勢五曰地勢勢之敗者有三焉一曰挫勢二曰支勢三曰輕勢凢新破大敵將士樂戰威名隆震聞者駭懼迴其勢而擊人者此之謂乗勢者也將有威德部伍嚴整士有餘勇名譽所加懾如雷霆此之謂氣勢者也士卒寡少盛其皷張其旗為疑兵使敵人震懼此之謂假勢者也因敵疲倦懈怠襲擊之此之謂隨勢者也合戰之地便其干戈利其歩騎左右前後無有陷隠此之謂地勢者也用兵者乗此五勢未有不能追亡逐北以建大功也又若累戰累北吏士畏於戰敵此之謂挫勢者也挫勢者言曾於敵人挫辱故言勢不利也將無威德謀慮賞罰不當吏士之心率多離散此之謂支勢者也吏士諠譁不循禁令部伍不肅此之謂輕勢者也凡用兵有此三者未有不敗軍殺將者焉是故乗一作王勢在我可以指揮進攻矣任一作王勢在敵我當有道反能擊之若夫敵有乗勢而到者未可與戰堅壁固守待之曠日久敵心必緩於始到矣俟其攻無所拔掠無所得敵之衆心益以慢矣當於中夜潜令驍勇襲其營壘攻其無備乗其亂出精兵兩道擊之地勢便則兩道出不便則一道出壁中皷噪應之如此則可以破其敵者矣敵有恃氣勢而到者可以後潜精兵偽示以老弱敵進攻則發伏擊之必勝矣何謂也許洞曰乗勢加人者止用勇敢疾速為務鮮能精謀慮彼見老弱必輕進樂一作揲凌之堅陣以俟一皷不勝鋒必挫反為我乗矣敵有以假勢而列旗皷之盛埃塵之多者旗皷或虚設埃塵或曳薪預料敵國兵如國有十萬之衆侵伐之地不及五萬之師矣降之不溢三萬矣國有百萬之衆侵伐之地不及五十萬之師矣降之不溢三十萬謂其各有屯授之地及死亡之所或敵兵不能盡到侵伐之地以此料之百萬之國其衆來者有百萬六十七十八十九十萬之旗皷與號令者必不溢四十萬矣餘皆疑兵也十萬之國其衆來者有四萬五萬之旗皷與號令者此必不溢三萬矣餘皆疑兵也敵國大小敵衆多寡皆以此類數知之也是以知旗皷多者其兵少矣不可怖但以精兵出其不意必敗矣或敵探我動静者為我所知即詐示以疲倦懈怠使知之敵必隨勢而來預於諸間道及通衢隂伏銳兵俟之先令細人宻探敵人舉兵之期然後設伏以待亦可過半則邀擊之敵得地勢以薄我未可與戰堅壁觀之持久則衆心怠夫得敵有挫勢者可以自外擊之敵有支勢者可以自内擊之内攻為用間益其敵心然後擊之也敵有輕勢者可以突之掩不備也此隨敵三敗勢攻之也以此言之是故多勝者非彊也多敗者非弱也率由勢爾夫水之柔弱方圓任性而能蹶一作寢隄漂石者水之勢也火之剛一作測炎亘天而起者火之勢也薪木既灰而滅影者木之勢也故用兵之道既知水火之旺敗則盡於勢之用矣使間第二十二周禮巡國傳謀反間也用間之道聖人以用兵決勝不可不間用間決中不可不宻茍非大智孰能臻於是乎故間之行也觀事而舉其術有八焉其一曰兩國相拒兵扼其境詐為疲困畏懼潜漏其言厚貨啗敵所愛倖因以所求中之次使使者致玉帛子女與駿馬精佩之飾以求和解覺其驕慢隂選精兵分道早夜兼進以乗不備此以使者為間者也其二曰獲敵生口以所謀漏一作泄之謀皆虚者非實也俾得聞焉隂緩使遁去令敵得所謀而信之我行則不然也此以敵人為間者也其三曰敵來間我詐為不知也及事示之敵得偽事我則出不意而擊之此反求來言以為間也其四曰敵以間來厚賂之令反其言以間敵此反以來人為間也其五曰與敵人戰佯為小敗亟引兵深壁示以懼色乃選言語鄙鈍無智慮者使於敵令盛張皇我使之彊盛俾敵知為間者必以我為懼以彊詞來間也既行即舉竒兵隨而襲擊之此以明間而為間者也其六曰敵有内寵令心腹者以金寳饋其家使潜搆敵情此以内嬖為間者也其七曰敵有謀臣則潜行賂敵親信搆䜛於内外以事應䜛者言使君臣相疑自相殘害此以䜛人為間也其八曰求敵所委信者副其所欲隂求其動静言語者此以鄉人為間者也是以知間者兵家之要妙也茍非賢智莫能用之故用間之道在乎微宻潜誠此良將之所注意也分守第二十三守備不可以間善守者如環使敵不得其間而入焉夫人之治身者血脈徃來通暢於四肢則安寜矣或一脈不來一氣不通未有免於病者是以善用兵者雖困屯急難則如首尾相顧而不窮斯為妙矣虎鈐經卷三
