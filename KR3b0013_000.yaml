body:
  text: 虎鈐經兵家類提要臣等謹案虎鈐經二十巻宋許洞撰洞字淵夫呉興人咸平三年進士為雄武軍推官免歸㝷召試中書改烏江縣簿坐事變姓名隠中條山龔明之中呉紀聞謂洞平生以文章自負所著詩篇甚多歐陽修嘗稱為俊逸之士者是也是書巻首有洞進表及自序大意謂孫子兵法奥而精學者難於曉用李筌太白隂符經論心術則秘而不言談隂陽又散而不備乃演孫李之要而撮天時人事之變備舉其占凡六壬遁甲星辰日月風雲氣候風角鳥情以及宣文設奠醫藥之用人馬相法莫不具載積四年書成凡二百十篇分二十卷名曰虎鈐經大都彚輯前人之説而叅以己意惟第九卷所載飛鶚長虹重覆八卦四陣及飛轅寨諸國為洞自創耳其四陣統論自以為逺勝李筌所纂其間亦多迂濶誕渺之説不足見諸施行然孝漢書藝文志兵家者流有兵權謀兵形勢隂陽諸類凡七百餘篇葢古來有此専門之學今漢志所録者久已亡佚而洞獨能掇拾遺文撰次成帙不可謂非一家之言録而存之亦足以備一説也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:9f1976ba843fd212165806f04b828fe4087e1d2c97bec7b2f5460cc1ea9cd602
