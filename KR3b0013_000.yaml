body:
  text: 虎鈐經兵家類提要臣等謹案虎鈐經二十卷宋許洞撰洞字淵夫吳興人咸平三年進士為雄武軍推官免歸尋召試中書改烏江縣簿坐事變姓名隱中條山龔明之中吳紀聞謂洞平生以文章自負所著詩篇甚多歐陽修嘗稱為俊逸之士者是也是書卷首有洞進表及自序大意謂孫子兵法奧而精學者難於曉用李筌太白隂符經論心術則祕而不言談隂陽又散而不備乃演孫李之要而撮天時人事之變備舉其占凡六壬遁甲星辰日月風雲氣候風角鳥情以及宣文設奠醫藥之用人馬相法莫不具載積四年書成凡二百十篇分二十卷名曰虎鈐經大都彚輯前人之說而參以己意惟第九卷所載飛鶚長虹重覆八卦四陳及飛轅寨諸國為洞自創耳其四陳統論自以為逺勝李筌所纂其間亦多迂濶誕渺之說不足見諸施行然孝漢書藝文志兵家者流有兵權謀兵形勢隂陽諸類凡七百餘篇蓋古來有此専門之學今漢志所録者久已亡佚而洞獨能掇拾遺文撰次成帙不可謂非一家之言録而存之亦足以備一說也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f04110dbf3333ba18aa03df0503c22a53e2793db6da7c9d0f0a3a57936dfd62c
