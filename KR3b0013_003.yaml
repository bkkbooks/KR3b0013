body:
  text: 虎鈐經卷三宋許洞撰兵機統論第十二軍謀第十三教戰第十四先謀第十五先勝第十六勝敗第十七知姦第十八奪恃第十九襲虛第二十任勢第二十一使間第二十二分守第二十三兵機統論第十二臣聞兵者隂也隂之德以虛為用而應於體也月者太隂之精氣也朔望不常何也蓋由以虛為變也兵者既為隂類則其機宜常虛含變以法月也能以虛含變應敵動必利矣觀乎天文之風雲星辰有吉凶者天之示於人也善用兵者得其吉象不可恃之恃之者凶得其凶象不可懼之懼之者怯茍知天象之吉凶者是虛其機以應天者也觀乎地理山川險易有生死存亡之途者地之利於人也善用兵者於地理無生死存亡觀彼我之勢察去就之情何如然後順其事而用之茍知地理之險易者是虛其機以應地者也觀乎人事彊弱利害有勝敗之勢者事皆係於人也善用兵者能以變合於事事合於時時合於理無彊弱無利害則敗勢可以為勝勝勢可變而為敗茍知人事之勝敗者是虛其機以應人者也是故善戰者雜於凶而難可釋雜於吉而勢可壯吉凶交雜而能不惑於用者此可以上不畏天矣雜於險而事利雜於易而事難險易交雜而能常處其變者此可以下不畏地矣雜於一作其利而敵見其害雜於害而我敗一作馭其利利害交雜而能不屈於敵者此可以中不畏人矣知此三者而用兵其盡三才之變乎自古兵法及臣所著之書其間申明利害者特直指其形貌言爾以臣所謂能審一時之機者其在天也無吉凶其在地也無險易其在人也無利害軍謀第十三用兵之道先正其禮次淵其謀次擇其人然後詳天地之利害審人心之去就行賞罰之公慎喜怒之理擇進退之地張攻伐之權明成敗之圖度主客之用能愛人之主者可使人捨生而赴死能親人之身者可使人捐身而犯難是故先親於人俾人然後親之先勝於敵就敵然後勝之故用兵必以糧儲為本謀略為器彊勇為用鋒創為備祿位為誘斬殺為威彊弱相援勇怯相間前後相趨左右相赴逺近相取利鈍相蔽步騎相承長短相用長兵短兵之用也敵欲堅陳我則突其不意敵欲直衝我則備其所從攻必先攻其所寡擊必先擊其所動薄者可突長者可截亂者可惑疑者可脅夫軍之為政也勞在乎役無度怨在乎賞不均弱在乎逼迫窮在乎絶地離在乎將失道懼在乎將無勇饑在乎逺輸渴在乎窮井軍之為逸也樂在乎安靜利在乎賞罰當其死在乎軍檢正成其功在乎戰陳詳如此者戰陳之術也軍之即於戰陳也從生擊死從實擊虛從整擊亂從利擊害從逸擊勞從有餘擊困窮山陵之戰不仰髙不逐深不衝隘不逺追水上之戰不違風不逆流林中之戰不連翼不相馳草上之戰不涉深平陸之戰不逺離此戰法之利也軍之禁也不節語言必泄不峻令行必亂不行賞士必怠行伍紊亂由於昧暗一作旺在明察以正之晦夜驚怖在鎮靜以嚴之是以知陳之嚴整軍之表也軍吏畏愛將之裏也軍之所親將之所存非智賢孰能與此乎教戰第十四諸教戰陳每五十為隊從營纒槍幡至教場左右廂各依隊次解幡立隊伍相去各十步分布使均其駐隊塞空去前隊二十步列布訖諸營士卒一時即向大將麾下聽令每隔一隊定一作一戰隊即出向前各進五十步聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時捺槍張弓捲幡拔刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時跪膝籠槍坐目看大將黃旗耳聽鼓聲黃旗向前亞鼓聲動齊喝嗚乎並去聲齊向前到中間一作界一時齊唱聲殺齊入賊退敗訖可趂行三十步審知賊徒喪敗馬軍從背逐北聞金鉦動即須息却行膞上架槍側行回身本處散立第一聲絶一時捺槍便解幡旗第二聲絶一時舉槍第三聲絶一時簇隊一看大將處兩旗交即五隊合為一隊即是二百五十人為一隊其隊法及捲幡舉槍簇隊鬭戰法並依前一看大將處五旗交即十隊為一隊即是五百人合為一隊其隊法及捲幡舉槍簇隊鬬戰法如前聽第一聲角絶即散二百五十人為一隊如此凡三度即教畢諸士卒一時聽大將賞罰進止第三聲角絶即從頭引隊伍還軍先謀第十五用兵之要先謀為本是以欲謀行師先謀安民欲謀攻敵先謀通糧欲謀疏陳先謀地利欲謀勝敵先謀人和欲謀守據先謀儲蓄欲謀彊兵先謀正其賞罰欲謀取逺先謀不失其邇茍有反是而用兵者未有不為損利而趨害者也是故聖王之兵先務其本本壯則末亦從而茂矣茍能知利害之本謀以禦敵雖有百萬之衆可不勞而克矣先勝第十六孫子曰勝兵先勝謂先定必勝之術而後舉也何謂必勝許洞曰先務三和次務三有餘次務三必行何謂三和曰和於國然後可以出軍和於軍然後可以出陳和於陳然後可以出戰國不和則人心離軍不和則教令亂陳不和則行列不整不先務此三和之道我其可戰耶何謂三有餘曰力有餘食有餘義有餘也力無餘則困於鬭食無餘則怠於時義無餘則吏士怨不務三有餘之術師其可動耶何謂三必行曰必行其謀則奸機不成必行其賞則好功者不愛其死必行其罰則有過者不歸咎不能務三必行之道人其可用耶是以知善務和者公無私捨小惠務大惠善務有餘者力諸事而不自怠善務必行者興勇斷去猶豫之謂也舉是九者務令預定之於前則萬變千機然後動乎其中矣率此以禦敵未有不勝者也故曰勝兵先勝者勝在我也其在大易曰先天不違之義也勝敗第十七用兵之術戰勝不可專專勝有必敗之理戰敗不可不專專敗有反勝之道戰勝而敗者有五急難定謀狐疑不决一敗也機巧萬端失於遲後二敗也機事不密三敗也似勇非勇似怯非怯四敗也主將不一五敗也此五者皆戰勝而反敗也戰勝而欲必勝者定謀貴决機巧貴速機事貴密進退貴審兵權貴一也勢敗而反勝者有四吏士饑割所愛啖之割所愛者謂在急難之中殺所乘駿馬愛妾以啖吏士也衆有飽之用矣吏士恐懼奮身先之衆有勇之用矣期應不到殺其所昵所昵者謂所嬖幸或子弟諸姻同在軍中若有主守者犯命則先殺之也衆有懼之用矣人有疑惑隂為鬼詐鬼詐者謂詐為狐鳴將星亮之類也或假托卜筮百端不一衆有天之用矣天謂天所授也如是者以敗為勝也勝敗之術非勇決神智安能行之耶知姦第十八敵使來目數動色數異而言肆者刺客也敵未困而請和者謀也敵卑辭厚幣者驕我也使雖頻來為寇不止者侮我也厚貨啖我左右者欲搆我密謀也使來言語辨利欲兩國休解者將掩我不備也使言語崛彊者欺我也敵使有此七者宜細詳之將為挾之謂謁見之時以操兵者挾輔而見謀者反其謀謂僞詐之却掩其不備也驕者反其驕拒其辭幣使敵人信我為驕也侮者凌之舉兵其無禮搆者示之佯不知而反示之以虛事也將掩不備復之佯聽其說反掩其不備也欲者誅之誅無禮以威敵留使者不可久久則知我微不如殺之是以知姦之道兵之本也不可不審奪恃第十九敵無恃不可以為寇欲審者豫審而奪之敵之為梗或以彊或以隘或以勇或以緩之謂也奪彊以氣奪隘以動奪勇以威奪緩以誘夫敵以力有餘而加於人我則以緩伺其力衰而乘之此奪氣者也敵以嶮地壁守或盈隘而陳我雖士民豐逸不可以彊取守者以利暢其心否則俟動則攻之陳者以勢逼其敵否則俟動隨而衝之此奪隘者也關塞營壘糗糧所扼預於要路伏兵絶之必力奪其輜重敵可使饑此奪緩者也人逸馬良恃彊輕戰可據隘設伏示弱以誘此奪勇者也不知四奪不足以語竒也兵術萬途不可專一先能奪其所恃則彼力衰半矣襲虛第二十襲虛之術有二焉一曰因二曰誘何謂因曰敵兵所向我亦佯應之别以精兵潜出虛地或攻其壘或斷其後或焚其積聚也何謂誘曰欲敵之要地則不攻而佯攻其鄰大其攻具盛其師旅以誘敵兵敵兵到則勿與戰復與壁守潜以精鋭襲所出兵之城而掩其內此二者皆襲虛之道也任勢第二十一兵之勝敗非人之勇怯也勇者不可必勝怯者不可必敗率由勢焉耳勢之任者有五一曰乘勢二曰氣勢三曰假勢四曰隨勢五曰地勢勢之敗者有三焉一曰挫勢二曰支勢三曰輕勢凡新破大敵將士樂戰威名隆震聞者駭懼回其勢而擊人者此之謂乘勢者也將有威德部伍嚴整士有餘勇名譽所加懾如雷霆此之謂氣勢者也士卒寡少盛其鼓張其旗為疑兵使敵人震懼此之謂假勢者也因敵疲倦懈怠襲擊之此之謂隨勢者也合戰之地便其干戈利其步騎左右前後無有陷隱此之謂地勢者也用兵者乘此五勢未有不能追亡逐北以建大功也又若纍戰纍北吏士畏於戰敵此之謂挫勢者也挫勢者言曾於敵人挫辱故言勢不利也將無威德謀慮賞罰不當吏士之心率多離散此之謂支勢者也吏士喧譁不循禁令部伍不肅此之謂輕勢者也凡用兵有此三者未有不敗軍殺將者焉是故乘一作王勢在我可以指揮進攻矣任一作王勢在敵我當有道反能擊之若夫敵有乘勢而到者未可與戰堅壁固守待之曠日久敵心必緩於始到矣俟其攻無所拔掠無所得敵之衆心益以慢矣當於中夜潜令驍勇襲其營壘攻其無備乘其亂出精兵兩道擊之地勢便則兩道出不便則一道出壁中鼓噪應之如此則可以破其敵者矣敵有恃氣勢而到者可以後潜精兵僞示以老弱敵進攻則發伏擊之必勝矣何謂也許洞曰乘勢加人者止用勇敢疾速為務鮮能精謀慮彼見老弱必輕進樂一作揲凌之堅陳以俟一鼓不勝鋒必挫反為我乘矣敵有以假勢而列旗鼓之盛埃塵之多者旗鼓或虛設埃塵或曳薪預料敵國兵如國有十萬之衆侵伐之地不及五萬之師矣降之不溢三萬矣國有百萬之衆侵伐之地不及五十萬之師矣降之不溢三十萬謂其各有屯授之地及死亡之所或敵兵不能盡到侵伐之地以此料之百萬之國其衆來者有百萬六十七十八十九十萬之旗鼓與號令者必不溢四十萬矣餘皆疑兵也十萬之國其衆來者有四萬五萬之旗鼓與號令者此必不溢三萬矣餘皆疑兵也敵國大小敵衆多寡皆以此類數知之也是以知旗鼓多者其兵少矣不可怖但以精兵出其不意必敗矣或敵探我動靜者為我所知即詐示以疲倦懈怠使知之敵必隨勢而來預於諸間道及通衢隂伏鋭兵俟之先令細人密探敵人舉兵之期然後設伏以待亦可過半則邀擊之敵得地勢以薄我未可與戰堅壁觀之持久則衆心怠夫得敵有挫勢者可以自外擊之敵有支勢者可以自內擊之內攻為用間益其敵心然後擊之也敵有輕勢者可以突之掩不備也此隨敵三敗勢攻之也以此言之是故多勝者非彊也多敗者非弱也率由勢爾夫水之柔弱方圓任性而能蹶一作寢隄漂石者水之勢也火之剛一作測炎亘天而起者火之勢也薪木既灰而滅影者木之勢也故用兵之道既知水火之旺敗則盡於勢之用矣使間第二十二周禮巡國傳謀反間也用間之道聖人以用兵決勝不可不間用間決中不可不密茍非大智孰能臻於是乎故間之行也觀事而舉其術有八焉其一曰兩國相拒兵扼其境詐為疲困畏懼潜漏其言厚貨啖敵所愛幸因以所求中之次使使者致玉帛子女與駿馬精佩之飾以求和解覺其驕慢隂選精兵分道早夜兼進以乘不備此以使者為間者也其二曰獲敵生口以所謀漏一作泄之謀皆虛者非實也俾得聞焉隂緩使遁去令敵得所謀而信之我行則不然也此以敵人為間者也其三曰敵來間我詐為不知也及事示之敵得僞事我則出不意而擊之此反求來言以為間也其四曰敵以間來厚賂之令反其言以間敵此反以來人為間也其五曰與敵人戰佯為小敗亟引兵深壁示以懼色乃選言語鄙鈍無智慮者使於敵令盛張皇我使之彊盛俾敵知為間者必以我為懼以彊詞來間也既行即舉竒兵隨而襲擊之此以明間而為間者也其六曰敵有內寵令心腹者以金寶饋其家使潜搆敵情此以內嬖為間者也其七曰敵有謀臣則潜行賂敵親信搆讒於內外以事應讒者言使君臣相疑自相殘害此以讒人為間也其八曰求敵所委信者副其所欲隂求其動靜言語者此以鄉人為間者也是以知間者兵家之要妙也茍非賢智莫能用之故用間之道在乎微密潜誠此良將之所注意也分守第二十三守備不可以間善守者如環使敵不得其間而入焉夫人之治身者血脈往來通暢於四肢則安寧矣或一脈不來一氣不通未有免於病者是以善用兵者雖困屯急難則如首尾相顧而不窮斯為妙矣虎鈐經卷三
