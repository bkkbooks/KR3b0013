body:
  text: 虎鈐經卷十宋許洞撰相人第一百二金瘡統論第一百三治金瘡方第一百四疫氣統論第一百五治疫氣第一百六治皸瘃第一百七禳厭第一百八相馬統論第一百九馬忌第一百十馬毛利害第一百十一治馬金瘡第一百十二治馬雜病第一百十三相人第一百二凡欲擢用先須辨人形神肌骨之貴賤且人神隠於中形藏於身氣發於外先觀其形夫山有美玉草木滋茂人有貴相氣色豐潤人雖處下品顔色形神器度動止與衆殊也相有七等也一曰看骨二曰看神氣三曰看肉四曰看色五曰看文理黑子赤子六曰看毛髮七曰看星文人相有十成一曰神氣清二曰五岳齊三曰笑語美媚四曰聲色深沉五曰鬚髪無間六曰詞語穏重七曰接對無偽八曰不欺信行九曰為事正直十曰風骨合度此謂十成之相也十成之人其可信乎經曰七成八成臣中一作子尊貴位極人臣也凡欲相人先視其頭頭者五臟之主四體之父百骸之母頭面之間有五嶽有四瀆有四骨四瀆鼻江口河目淮耳濟四骨龍骨神龜驛馬伏犀平滿為頰髙成為岳入耳曰顴骨入鬢曰驛馬耳際為將軍左目後骨為日角右目後骨為月角圓為龍宫鼻上天中曰伏犀次兩邊溝外神龜額間後為中子中子下髙為龍角骨主三公台輔之骨腦後為玊枕此骨一十六般並應頭面之主且玊枕之相自兩耳上中平為百嵗前頭後腦前為星堂後為玊枕也其一車軸枕其二六字枕其三連珠枕其四仰月枕其五覆日枕其六八兩背日枕其七上下相背月枕其八如環日枕其九十字枕其十一字枕其十一左稍枕其十二右稍枕其十三垂露枕其十四雞子枕其十五犀口枕其十六懸枕如此者皆公侯之相也又若人之形也魂居肝魄居肺志居脾精居命神居心故心有五輪則目亦有五輪五行各以居其位且一作祗觀其目則知其心矣是以心圓者上也鈴次之破梯者主奸詐如月形者為盜如弓形者主非命夫心圓者主事無虚妄之情其目多正視主忠孝慈惠心鈴形者屬火能辯明昏禮義目視重大回顧有常聰明智慧心破梯者目視瞬息髙下主多作盜言詞虚妄無信心月形者目視百迴髙下屬水水流急而還少信行不忠孝殆貶流在外而死心如弓形者目視左右髙下方回兼露白精必死逺方為子殺父為臣殺君至若解尻如鬼神有形而無骨莽蒼無色黄髮亂竪口葉舌尖胸淺語薄似嘆不嘆似顛不顛面毛半茸若有塵灰腦髪倒垂鶴頭露結忽行後視神采昏蔑骨法不正如是者皆極賤人也金瘡統論第一百三人為兵器所傷出血者甚渇者不可即與飲食恐簇毛在吻須乾食食肥膩之物無所妨害貴解渇而已不可多食粥則血沸出人心死矣所忌者有八焉一曰嗔怒二曰喜笑三曰大言四曰勞力五曰妄想六曰熱羮粥七曰飲酒八曰醎酸此八者犯之未有不死者矣夫金瘡不可治之者有九焉一曰傷腦户二曰傷天倉三曰傷臂中跳脉四曰傷脾中陰股五曰傷心六曰傷乳七曰傷鳩尾八曰傷小腸九曰傷五臟此九者皆死處也又曰金瘡不可治之者有四焉一曰腦膸出二曰腦破而咽喉中沸聲啞目直視三曰痛不在瘡處者此謂傷經絡也四曰出血不止前赤後黑或自肌肉腐臭寒冷堅忍其瘡難愈此四者皆不可療矣除此之外復胗其脉脉虚細者生數實者死沉小者生浮大者死其所在傷處出血過度而脉微緩者生急疾者死矣治金瘡第一百四金瘡方右五月五日平旦使四人岀四方於五里採一方草木莖葉每種各半把勿令脱漏一事日午時切碎𢷬令極爛仍先揀好石灰一斗同杵之復選大實樹三兩株鑿作十竅令可受藥内藥於竅中𦂳裹之畢即以麻皮係之用麻𢷬石灰密泥不令洩氣更以皮纒定令牢到九月九日午時取岀陰乾百日藥成𢷬之曝令極乾更𢷬用絹羅之凡有金瘡傷所出血用藥封裹勿令轉動十日即瘥矣不膿不腫不畏風若傷後數日始得藥須先用温水洗令血出即傅之此藥大驗如神須多合之金瘡之要無出此者治金瘡中風痓口不語方赤箭一兩桂心三分防風三分去蘆頭巴豆二分去皮及心然後研之極爛用紙裹壓又法用呉茱萸半兩湯浸七遍焙乾微炒天南星三分泡令烈白附子半兩泡烈硃砂一兩水飛過乾姜一分泡烈附子三分去尖皮臍泡烈乾蝎半兩生用右件搗羅為末用釅醋三升熬成膏丸如桐子大每服三丸不計時候熬蔥酒下服後汗出為效金瘡辟風止痛方當歸半兩剉微炒川椒半兩去目及閉口者微炒出汗澤㵼半兩芎藭一兩附子一兩去皮臍右件搗藥羅為末若金瘡有岀淤血以温酒調下一錢日三服止金瘡出血不止方龍骨一兩剉微炒芎藭一兩熟乾地黄一兩鹿茸半兩塗蘇炙令微黄色先須去毛鳥樟根三兩突厥白一兩右件搗羅為末傅在瘡上血即止如服以温酒調下二錢日三服金瘡内漏方金瘡通内血者為内漏而脇脹者不能食死瘀血摶在於腹内腹牢大脉沉者死耳以方䖟虫三十枚去翅及足微炒桃仁一兩湯浸去皮尖雙心麩炒微黄桂心一兩半川大黄三兩剉碎微炒水蛭三十枚微炒黄右件為末每服二錢用童子小便一鍾煎至五分温和滓服日五服夜三服如卒無小便用水并酒代之服訖然後以胡粉散傅上瘡胡粉方粉二兩乾姜二兩生栗子二分陰乾去皮為末傅瘡上即痊矣出箭頭方蜣蜋自死者一枚狗子三枚婦人髪灰少許右先將蜣蜋去壳取其白肉與二味同研如泥用生油塗中箭處則如膏藥俟肉作痒即以兩手蹙之其箭自出出骨中箭頭方雄黄一分蜣蜋一分研石灰末一分牛糞火燒之令赤色葳靈仙一分朝桂䑕一枚去頭取血右為末入䑕血并煉蜜和丸如黄米大内瘡口中其箭鏃不拘逺年自出出肉中箭頭方巴豆一枚去皮膩粉一分砒霜少許磁石半兩細研蜣蜋一枚右為末以雞清和丸如菉豆大先以針撥開瘡㿍用生男子乳汁化一丸撥在破處上用醋麵紙封貼常痒痒極不可忍其鏃自出也多年者兩上當年者一上即出箭鏃出後服食方牡丹半兩鹽半兩白芨半兩右為末毎於食前以温酒調下二分中途箭方蘆根一兩藍葉一兩紫檀半兩石灰末二兩以牛糞火燒令赤右為末不拘時候以藍葉汁調下一錢粥飲下亦得中毒箭後皮肉瘀腫方梨母子一斤爛研去核鹽麩子五兩𢷬之爆乾更𢷬用絹羅之凡去粗漬菉豆三兩炒熟石灰末三兩牛糞火燒令赤藍子五兩黄連三兩去鬚獨顆栗子三兩生用黑豆三兩炒熟大黄五兩赤芍藥三兩右為末煉蜜調為膏每服以温酒下一茶匙日三四服刀槍破腹腸胃突出方磁石三兩燒紅醋淬七次搗碎研如粉滑石三兩鐵􅀈三兩右為末傅槍腸胃上後將磁石末用粥飲調下一錢一日三四服腹又縫補方又若皮肉斷裂剥取新桑白皮作線縫之以新桑白皮褁之又以桑白皮汁塗之極妙小療但以桑白皮褁之如筋斷後亦封於上可以續之付毒箭及馬汁方䖟虫取大首者去翼於端午日收之陰乾為末每服一錢撥破瘡口以藥傅之然後醋麵糊紙靨子貼之即出毒也又方石灰末二兩以牛糞火燒令赤色蜜陀僧一兩黄栢半兩剉膩粉一分右為末每用先以鹽水洗瘡後用藥傅之日一換之疫氣統論第一百五結營須相山川卑濕之地其濕燉毒氣腫襲人口鼻者則山瘴之瘧癘生焉又若寒暑之氣不節夏寒冬燠或夏傷於大暑熱氣盛藏於皮腹之間加以士卒之衆衆之氣相蒸為温臭則時疫生焉抑又所蒸之地士卒不便水土之性温涼之氣致陰陽二氣紊亂於腸胃間則霍亂吐㵼生焉斯之三者衆處生疾之地十有五六焉故臨戎之先得不預備之乎治疫氣第一百六時氣方疫用茵陳二兩大麻仁五兩研如膏豉五合炒乾常山三兩梔子二兩芒硝三兩細研鼈甲二兩塗醋汁令去裙襕杏仁二兩湯浸去皮尖雙仁麩炒微黄色巴豆一兩去皮心炒令黄紙裹壓去油細研右為末合匀煉蜜和搗五六百杵丸如桐子大每服粥飲下三丸或吐或痢或汗或不吐痢或不汗再餌之若更不吐痢以熱粥飲投之觀其症候加減霍亂吐㵼方桑葉一握楄一作篇竹一握右細剉末用水一大盞服山瘴瘧方常山三兩烏梅二十七枚甑帶三寸獨顆蒜一枚以酒二大盞作二服初一服先未發時喫次一服臨欲發時服如不發即止温瘧方麻黄一兩去根節牡蠣粉一合一作分蜀漆甘草犀角屑知母各半兩右為末用水二大盞慢火煎一盞半去柤分為三服早起午初夜服之治皸瘃第一百七士卒涉水蹈氷蒙犯霜雪寒風一切凌凍所苦或失於飲食肌體虚勞故頭目手足皸瘃也治手足皸瘃血出方猪胰洗之立止手足皸瘃方右取川椒四合以水煑之去滓漬頃岀令燥須臾後浸乾即塗羊猪腦膸尤妙涉水冒霜手足凍裂方又取菱葉濃煎汁熱洗之即愈手足凍裂成瘡方右以羊膸熬成膏油入炒黄丹攪匀令搽塗之三五次即愈手足指節皸裂欲隨落方莱州青石作器物者以刀子細刮取末欲落指節相柱文縷微連便以石灰末厚覆其上以帛子繫纒之其痛即止其指十日即復安矣禳厭第一百八厭敵兵法中夜設於北斗下致酒脯焚香為祭藉用白茅用五色綵為幣大將北面再拜禱祝以所祈之事三奠而止伐陰木之枝為六甲符符中書六甲名祭罷以為六囊各盛一符即以本旬符囊繫於旗纛内勿令人覺之遂舉而出敵人當自駭走矣厭疫法大疫當取虜獲首級不計多少於上風焚之人疫大盛則有用此法疫少亦假用之令其烟氣衝襲一作疫者經時撒去可以辟厲氣矣厭王氣法敵之王氣久而不衰者觀其氣王於何方當六甲旬首正子時於營中月空上環三九步以朱畫八卦壇位成三界其内畫十二辰及月將之名東西南北相去數步取蒼狗白雞各一隻大將披素服右手仗劍左手按二畜北面立黙誦敵將名氏即斬之埋於氣旺之方深三尺氣衰則去之厭敵將法敵將之命厭於我命者謂五行細人宻搆其敵將之命也當令生年日月時也我即以所旺相之色可以克彼者隨所旺月日及時宻制克之所旺日時假令敵將火命王我則擇火日水時為黑道休省之勿令他人見戰陣當以皂旗為衝它者倣此伏鳥厭兵法夜伏兵於林薄慮禽鳥驚啼者當以方書十干之號十有二辰之號十有二月之號十有二嵗之號二十有八宿之號懸於林上則禽自不驚啼而兵可伏矣干謂從甲到癸辰謂從子到亥嵗月從攝提格到赤奮若星從角到軫也相馬統論第一百九夫馬之所生無毛者能行千里先舉一足者行五百里但數其筋得十即凡馬也十一十二者五百十三者千里過十三者天馬也一作枝毛起腕上者六百里腹脊上下平者百里五項圓者五百里眼中如童兒並坐者二百里腹下有横筋者五百里耳根下生角長一寸者三百里二寸者五百里三寸者一千里尿射過前脚者五百里頭如渇鳥者一千里如初生面七日不能行才行便能飲水者千里之駒也放尿舉足者亦然一作前腹下毛逆生者同芝蘭孔中有毛長一寸此駑馬也鼻中金字者金一作人十八嵗四字者八嵗八字者四嵗鼻上赤者二十嵗鼻上青者三十嵗鼻上如有公王字者二十五嵗眼圓有旋毛者三十嵗目下不滿而白睛多者此多驚也目白不深唇不覆面口小又淺不健食齒參差不相當雖遇齒欲得上鈎者好也凡馬頭欲如側搏耳欲得厚小左耳却害主右耳却不入陣眼圓欲得滿睛努一作弩肉滿身額前錐毛欲得濃盛鼻欲得大上唇欲得緩下唇欲得急口中欲得赤舌欲方大齒欲如鈎鋸面欲藏骨脽欲寛胸欲廣雙筋欲得分明蹄欲得圓膝欲得開腹欲得垂陰欲得小肚欲得方䏶肉垂足足後欲得無毛尾欲得毛散尾核欲得長齊於梁骨尾林欲得麄汗溝欲得深膊際横文欲得分明脊欲得平身欲得短毛欲得細而突一作笑如是者馬之要相也馬忌第一百一十石灰泥槽損馬不得繫馬於門上令落駒養獼猴於坊内辟患并去疥癬戊寅日及庚寅日不得作廏作之者不及一年凶丙寅日不可出入馬三年人馬俱死申日不宜取馬必死戊午庚子之日不取并忌入廏大敗凡養馬作廏之法當擇時日之良而知所忌之㓙矣馬毛利害第一百一十一若馬或白㸃入口者名的盧目下有横毛者名死泣旋毛在吻後者名御褐白馬黑騌鞍下有回毛者名負屍腋下有回毛者名挾屍左脇下有白毛直上者名白帶劒汗溝過尾根者踏殺人腮上有旋毛者名目圍或後足左右白者或馬渾白而四蹄黑者或從前膊外從項去到脥腮應有毛旋者或毛旋在項者或爪黑面白者已上馬毛病者不利主也或馬前兩甲膊後近低處毛旋者能行五百里後眼近前低處毛旋者行八百里後一作從前膊到喉中間有旋毛者名印綬能行千里兼益主也治馬金瘡藥第一百一十二馬中金瘡腸胃突出方芍藥黄耆當歸芎藭白芷續斷鹿茸黄芩細辛乾姜附子已上各三兩右為末先飲酒令醉服五分七日三服稍加到方寸立愈治馬雜病第一百一十三灌馬方春夏用白礬秋冬用鬱金芎藭當歸大黄升麻黄連細辛乾姜已上各一兩右為末入湯中以酒調灌之㗖馬方鬱金大黄甘草山梔子貝母白芍藥黄藥秦膠一作花黄栢黄連欵冬花知母桔梗􅀢本等分為末右用油并蜜和㗖之每服二兩治馬温方右以獺肝肚肉去糞煮汁灌之治馬肚熱結寒顫不食方黄連末二兩白蘚皮末一兩油五合以臈猪脂四兩白水一升半調下牽行抛糞立効治馬卒熱肚脹欲死方以藍汁二升并水二升同灌之立効治馬怠起方又取壁上多年石灰細研羅出用油調二兩灌之立効治馬黑方忽卧不起汗流如珠肉顫氣喘者嘗汗淡即死汗醎不死以人脚下汗襪以水二升洗取汁灌之立瘥治馬不進水草方芒硝一兩􅀈駱半升已上和鬱金散灌之并刺帶血出一升治馬傷水方又以蔥鹽油相和搓成團子内鼻中以捉馬鼻令不通氣又待眼中淚出即止治馬傷食方右以生蘿蔔三五箇切作片子啗之立効治馬喉中腫方軟物褁刀子露一刺咽喉令便瘥又方以乾馬糞置瓶中將頭髪盖之以火燒烟出薰馬鼻中立瘥又方以猪脊邊脂伴髮燒薰鼻中立効治馬草結方以白礬末分為二兩服毎服和水飲後即啗之神効又方以手捻令銷如不銷火燒掃箒柄築之効㸃馬眼方青鹽黄㽔仁馬牙硝已上各等分細研用蜜煎以磁瓶盛水漫㸃之治馬疥瘡黄臭方臈月猪脂煎髪令銷及熟塗之立効治馬瘡方以齒莧石灰同搗令匀𢷬作餅子候晒乾復搗為末先水以口含洗淨用藥貼之治駒兒肚㵼方以藁本為末將大麻子研汁調三錢灌下便効次將黄連末麻子解之腸藥方莨菪子烏頭芫花茱萸扣眷蒼术木鼈子葶藶子右等分為末每柤用半兩以醋麵椒蒜煎為膏治之虎鈐經卷十
