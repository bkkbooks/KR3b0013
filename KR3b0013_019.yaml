body:
  text: 虎鈐經卷十九宋許洞撰時加占烏情第一百九十運加占烏情第一百九十一雜占烏情第一百九十二時加占烏情第一百九十三六甲占烏情第一百九十四時加占烏情第一百九十巳酉為寬大之日時加巳酉烏鳴其上直王相吉為長吏休廢囚死有酒食時加寅午鳴其上有酒食辭讓時加丑戌鳴其上有酒食詞訟口舌時加卯亥鳴其上有酒食時加辰未鳴其上有酒食婦人口舌時加申子鳴其上有酒食寅午為亷貞日時加廉貞烏鳴其上王相有長吏休廢囚死有諫諍責讓一作釀時加巳酉鳴其上有逺客時加申子鳴其上有爭財物事時加辰未鳴其上有陰私口舌時加丑戌鳴其上有酒食時加亥卯鳴其上以酒食起爭丑戌為公正日時加公正烏鳴其上王相有長吏公正之事休廢囚死者有來慰問事時加巳酉鳴其上有公正酒食賜與時加寅午鳴其上有公正慶賀事時加辰未鳴其上有使一作吏士來説陰私事時加申子鳴其上有吏一作人來作公正事時加亥卯鳴其上有士來説賊相殺事辰未為姦邪日時加辰未烏鳴其上王相長吏來刑姦詐休廢囚死口舌事時加寅午鳴其上謙讓人説姦訟事時加巳酉鳴其上有酒食陰私事時加丑戌鳴其上有吏捕姦邪私事時加申子鳴其上有陰謀鬬爭劫盜事時加亥卯鳴其上有賊兵劫申子為貪狼日時加申子烏鳴其上王相有言羣盜攻劫休廢囚死有盜賊事時加巳酉鳴其上有酒食攻劫事時加寅午鳴其上有善人説攻劫事時加丑戌鳴其上有文書追盜賊事時加辰未鳴其上有婦人説羣賊事時加亥卯鳴其上有羣賊攻奪事亥卯為陰賊日時加亥卯烏鳴其上王相羣賊大戰休廢囚死有鬬事時加巳酉鳴其上有酒食相傷事時加丑戌鳴其上有使逐賊相傷事時加寅午鳴其上有婦人姦私相傷事時加辰未鳴其上亦如之時加申子鳴其上賊自攻劫凡隂賊日有烏鳴羣飛及飄風從四季上來時加四季皆為閉關搜索之事運加占烏情第一百九十一烏從子上來大將不可震威武敵來勿與戰必不利丑上來者不宜出戰兵進戰內有隂謀將發細察備之寅上來者吉音至卯上來者利進戰大將有祿慶之事辰上來者有吉信至營六步忽見牛羊大吉見死物凶巳上來者不利戰陳兩軍俱傷午上來不利出兵未上來戰鬬主吉客凶申上來不利出兵酉上來利出兵有喜戌上來吏士有異心潛備之亥上來不利戰此十二辰位占烏之情也常以怪字居甲上占之假令甲子旬即在子上是也又若烏從四散併來到營上居惡聲而止住之者賊兵已入境矣急飛過者賊勇鋭疾如雷電速為之備但疾與戰我可以勝鷙鳥飛來將軍牙帳上搏擊者有賊不可出戰三足鳥飛來營前後謂之災飲烏也賊將來至營中者凶急備之赤烏入營者防姦人刺客羣鳥三三五五營上往來無聲而四散者吏士有逃潰之心鸛鵲急來營上作巢而鳴速移營避之大水至烏至營按干蒙難者吏士謀大將即有禍速避之鳥鵲忽來炮上作巢者吏士謀大將潛驗之方戰之時有白烏狀如鷹鸇飛赴者赴敵者并力擊之大勝兆也自敵來赴我者凶急退軍勿戰雜占烏情第一百九十二出師之日烏于軍前逆飛者征無功在左則吉在右則凶逆軍而作惡聲查查者大凶兆也或從右發聲和順自大將後而過左復聲者大兵有慶之兆也烏及相呼于一作子者吉也烏于軍前一足卓立地者進必一作不有冦在枯卉上鳴者凶振迅疾飛視顧周陳而不止者前賊也烏來牙旗上立者急移營避之其地不祥烏立牙帳上作惡聲者有吏士潛謀逆速搜驗之必得姦狀烏來鼓角上鳴者將軍吏士心雄益奮也器械上鳴者即有戰陳也繞營而飛鳴者所來之處賊兵至也凡烏之來大將宜别令一人候之此皆能通天地鬼神之情者也時加占烏情一百九十三登明方鳴者凶神后大吉功曹等方者大衝天罡太乙方者勝光小吉傳送方者吉從魁河魁方者凶更看神與月將相克假令登明是凶神在寅卯申酉即相生為吉也假令傳送是吉神在寅卯巳午即相克為凶也他皆倣此宜細認方位辨其吉凶六甲占烏情第一百九十四六甲旬圖在第八卷但以圖按其方可也烏在上鳴者賊聞不來與戰大吉鳴者合有吉音無他戰陳鳴者喜信之兆也鳴者防慎在內當有細人潛為賊應不然有謀叛者察防之鳴者軍無他戰鳴者有賊信者當有戰陳鳴者聞賊不來急備之不利戰凶兆也鳴者亦慎之或有小盜必殺之不然當有大驚鳴者防吏士亡遁鳴者將有戰之事主吉鳴者有賊信者鳴者防內有姦人潛為賊應謹備之夫占烏之法立營之地非烏所巢而有烏來鳴方可論占若叢林羣烏之所栖泊而嘲囂無常者不足占也虎鈐經卷十九
