body:
  text: 虎鈐經卷十九宋許洞撰時加占烏情第一百九十運加占烏情第一百九十一雜占烏情第一百九十二時加占烏情第一百九十三六甲占烏情第一百九十四時加占烏情第一百九十巳酉為寛大之日時加巳酉烏鳴其上直王相吉為長吏休廢囚死有酒食時加寅午鳴其上有酒食辭讓時加丑戌鳴其上有酒食詞訟口舌時加夘亥鳴其上有酒食時加辰未鳴其上有酒食婦人口舌時加申子鳴其上有酒食寅午為亷貞日時加㢘貞烏鳴其上王相有長吏休廢囚死有諫諍責讓一作釀時加巳酉鳴其上有逺客時加申子鳴其上有爭財物事時加辰未鳴其上有陰私口舌時加丑戌鳴其上有酒食時加亥夘鳴其上以酒食起爭丑戌為公正日時加公正烏鳴其上王相有長吏公正之事休廢囚死者有来慰問事時加巳酉鳴其上有公正酒食賜與時加寅午鳴其上有公正慶賀事時加辰未鳴其上有使一作吏士来説陰私事時加申子鳴其上有吏一作人来作公正事時加亥夘鳴其上有士来説賊相殺事辰未為奸邪日時加辰未烏鳴其上王相長吏来刑奸詐休廢囚死口舌事時加寅午鳴其上謙讓人説奸訟事時加巳酉鳴其上有酒食陰私事時加丑戌鳴其上有吏捕姦邪私事時加申子鳴其上有陰謀鬬爭刼盜事時加亥夘鳴其上有賊兵刼申子為貪狼日時加申子烏鳴其上王相有言羣盜攻刼休廢囚死有盜賊事時加巳酉鳴其上有酒食攻刼事時加寅午鳴其上有善人説攻刼事時加丑戌鳴其上有文書追盜賊事時加辰未鳴其上有婦人説羣賊事時加亥夘鳴其上有羣賊攻奪事亥夘為陰賊日時加亥夘烏鳴其上王相羣賊大戰休廢囚死有鬬事時加巳酉鳴其上有酒食相傷事時加丑戌鳴其上有使逐賊相傷事時加寅午鳴其上有婦人姦私相傷事時加辰未鳴其上亦如之時加申子鳴其上賊自攻刼凡隂賊日有烏鳴羣飛及飄風從四季上來時加四季皆為閉關搜索之事運加占烏情第一百九十一烏從子上來大將不可震威武敵來勿與戰必不利丑上來者不宜出戰兵進戰内有隂謀將發細察備之寅上來者吉音至夘上來者利進戰大將有祿慶之事辰上來者有吉信至營六步忽見牛羊大吉見死物㓙巳上來者不利戰陣兩軍俱傷午上來不利出兵未上來戰鬬主吉客㓙申上來不利出兵酉上來利出兵有喜戌上來吏士有異心潛備之亥上來不利戰此十二辰位占烏之情也常以恠字居甲上占之假令甲子旬即在子上是也又若烏從四散併来到營上居惡聲而止住之者賊兵已入境矣急飛過者賊勇銳疾如雷電速為之備但疾與戰我可以勝鷙鳥飛來將軍牙帳上搏擊者有賊不可出戰三足鳥飛來營前後謂之灾飲烏也賊將來至營中者㓙急備之赤烏入營者防姦人刺客羣鳥三三五五營上往來無聲而四散者吏士有逃潰之心鸛鵲急來營上作巢而鳴速移營避之大水至烏至營按干䝉難者吏士謀大將即有禍速避之鳥鵲忽來礮上作巢者吏士謀大將潛騐之方戰之時有白烏狀如鷹鸇飛赴者赴敵者并力擊之大勝兆也自敵來赴我者㓙急退軍勿戰雜占烏情第一百九十二出師之日烏于軍前逆飛者征無功在左則吉在右則㓙逆軍而作惡聲查查者大㓙兆也或從右發聲和順自大將後而過左復聲者大兵有慶之兆也烏及相呼于一作子者吉也烏于軍前一足卓立地者進必一作不有冦在枯卉上鳴者㓙振迅疾飛視顧周陣而不止者前賊也烏來牙旗上立者急移營避之其地不祥烏立牙帳上作惡聲者有吏士潛謀逆速搜騐之必得奸狀烏來鼓角上鳴者將軍吏士心雄益奮也器械上鳴者即有戰陣也遶營而飛鳴者所來之處賊兵至也凡烏之來大將宜别令一人候之此皆能通天地鬼神之情者也時加占烏情一百九十三登明方鳴者㓙神后大吉功曹等方者大衝天罡太乙方者勝光小吉𫝊送方者吉從魁河魁方者㓙更看神與月將相克假令登明是㓙神在寅夘申酉即相生為吉也假令𫝊送是吉神在寅夘巳午即相克為㓙也他皆倣此宜細認方位辯其吉㓙六甲占烏情第一百九十四六甲旬圖在第八卷但以圖按其方可也烏在上鳴者賊聞不来與戰大吉鳴者合有吉音無他戰陣鳴者喜信之兆也鳴者防慎在内當有細人潛為賊應不然有謀叛者察防之鳴者軍無他戰鳴者有賊信者當有戰陣鳴者聞賊不来急備之不利戰㓙兆也鳴者亦慎之或有小盜必殺之不然當有大驚鳴者防吏士亡遁鳴者將有戰之事主吉鳴者有賊信者鳴者防内有奸人潛為賊應謹備之夫占烏之法立營之地非烏所巢而有烏来鳴方可論占若叢林羣烏之所栖泊而嘲囂無常者不足占也虎鈐經卷十九
