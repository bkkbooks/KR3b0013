body:
  text: 虎鈐經卷六宋許洞撰水戰第四十八水利第四十九水攻第五十過水第五十一尋水脈第五十二火利第五十三火攻第五十四守城第五十五築城第五十六城壕第五十七防城第五十八反浸第五十九弩臺第六十烽火臺第六十一望樓第六十二馬鋪第六十三遊奕第六十四守城具第六十五攻城具第六十六地聽第六十七失道第六十八水戰第四十八凡水戰之具船闊狹長短大小載人多少以米為則一人重米二石則人數積而可知也棹篙櫓帆席絙繩索沉石調度與常船殊樓船上建樓三重列女牆戰格樹幡幟開弩窗矛穴炮車置礨木鐡汁狀如守城王濬伐吳作大船長二百四十步建飛簷閣道可以奔馬馳車忽遇大風則人力不能制甚不便戰鬬然為水軍不可不設以張形勢蒙衝以牛皮蒙覆船背兩廂開製棹孔前後左右有弩窗矛穴敵不得近矢石不能敗此不用大船務於疾速非戰船也鬭艦船上設女牆可蔽半身牆下開製棹孔船內五尺建棚於女牆上重列戰格上無覆背前後左右樹牙旗金鼓此戰船也走舸舷上重列女牆棹夫多戰卒選驍勇精鋭者往反如飛鷗乘人之不及旗幟金鼓列之於上此戰船也逰艇小艇舷無女牆船上置槳牀左右隨艇大小長短四尺一牀計會進止回軍轉陳其疾如飛虞候居止之非戰船也海鶻頭低尾髙前大後小如鶻之狀左右置浮板如鶻趐翼雖風波漲天無有傾側覆背上左右張生牛皮為城建牙旗金鼓如常法江海之中戰船也水利第四十九兵法曰以水佐攻者強善用水者其道有四一曰因二曰逆三曰賊四曰絶因水之用其道有二或絶中流而柵我得上遊因風之利可以鼓棹縱火順流衝之絶柵而過風轉則止又若敵在下士馬逆流我得上遊可以攻之此二者所謂因者也逆水之用也則為崇隄以障其下注溢於內然後引之以灌所謂逆者也賊水之用也敵所以賴水也當潛以水攻審地理隂為畎澮導之他處竭敵所賴所謂賊者也絶水之用也或以薪木土石實舟泛之於上别為長渠泄之或為沙囊於上流以壅其水欲水行則以決囊所謂絶者也用水之道有其地非所用而必用反為所害順則善矣水攻第五十凡量水之髙下水平槽長二尺四寸兩頭及中間鑿為三池橫闊一寸八分縱闊一寸三分深一寸二分池間相去一尺五寸間有通水梁闊三分深一寸三分三池各置浮木闊狹微小於池箱厚三分上建立齒髙八分闊一寸七分厚一分槽下置轉關腳髙下與眼等以水注之三池浮木齊起眇目視之三齒齊平則為天平準或十步或一里乃到數十里因力所及置照板度竿以白繩計其尺寸則髙下丈尺分寸可知照板形如方扇長四尺下二尺黑上二尺白闊三尺柄長一尺人可持度竿長二丈尅作二百寸二千分每寸內十尅隨所向逺近髙下置竿以照板映之眇目視之三浮木齒及照板以度竿上尺寸為髙下遞而往來尺寸相乘則山淵水源髙下淺深可以分寸度矣過水第五十一罌筏一凡縳罌甕為筏甕間闊五寸深受二石米力勝一人底以繩勾連之編槍於上形長勿方前置拔頭後置板稍左右棹之槍筏槍十根為一束力勝一人四千一百六十六根六分為一筏去鑽創束為魚鱗次橫括而縳之可度四百一十六人為三筏計用一萬二千五百根渡人一千二百五十人十渡則一軍濟矣挾絙以善水者繫小繩於要處先浮渡水次引大絙於兩岸立大橛及繫於樹急定絙使人挾絙浮渡大軍可分為十道渡之浮囊以渾脫羊皮吹氣令滿繫其孔束於兩腋下浮而渡尋水脈第五十二無水之地擇地有黃羊糞者必有水砂滷甘潤者下有水細草蒙茸與無水處不同者亦如之火利第五十三將有天時之用先知其日日者謂春丙丁夏戊己秋壬癸冬甲乙此日有大風雨故也次順其風我得上風則放火燒下風一作起馬攻城寇寨風助順利為飛火飛火者謂火炮火箭之類也相守不動利於姦火姦火者囚其人焚其積聚甲兵也兩陳相合御風之便揚一作􅀈塵鼓煙利為燧牛以俟之若敵於上風放火我亦縱火為解火法敵燒門縱火恐火滅我使積薪以互外火亦此類也凡入敵境郡邑窮匱城隍頽靡山川非設險之地而非敵所恃者則存之茍拔敵所恃之邑皆火之以絶其望焉敵境之林木茂草皆火之故火為兵之大利也火攻第五十四月對一作在東壁南箕翼軫之夕則設火候風以焚之四宿日多風利火攻以驍騎夜銜枚縳馬口人負薪及束煴懷火直抵敵營一時舉火營中驚亂急則乘之靜而不動勿攻火獸以艾煴置瓢中開四孔繫野豬獐鹿項下針其尾端望敵營而縱之奔走入草內則火起火鳥以胡桃空中實艾開兩口復合之繫野雞項下針其尾而縱之飛宿於草上則火發守城法第五十五城不守者大而人少小而人衆糧寬而柴水不供壘薄而攻具不足土疏地下溉灌可沒人戶疲悴修緝未就凡此類者速徙之營壘髙厚城堅溝深糧食衆多地利險阻所謂無守無不守也故曰善守者敵不知其所攻築城第五十六凡築城下闊與髙倍上闊與下倍城髙五丈下闊二丈五尺上闊一丈二尺五寸髙下闊狹以此為凖料工上闊下加闊得三丈七尺五寸半之得一丈八尺七寸五分以髙五丈乘之一尺之城積數積數一作積利得九十三丈七尺五寸每一工日築土二尺計工約四十七人一步五尺之城計役二百三十五人百步之城計工二萬三千五百人三百六一作九十步計工八萬四千六百人率一里則十里可知也其出土負簣並計之於工內矣城內面别穿井四所置水車大甕二十口竈千所却敵上建候樓以跳板出為櫓與四外烽戌晝夜瞻視以備警急城壕第五十七鑿壕之法面闊二丈深一丈底闊一丈以面闊二丈加底闊一丈積數約半得之得數一丈五尺以深一丈乘之鑿壕一丈得數一十五丈每工日出三丈計工五人一步五尺計工二十五人十步計工二百五十人百步計工二千五百人三百六十步計工九千人率一里則百里可知也防城第五十八城上一步一作里一甲卒十步加五人以備雜供之要五步有伍長十步有什長五十步百步皆有將長文武相兼量才授任而統領精鋭驍勇或十隊或二十隊三十隊大將副將各一作為領隊巡城曉諭激勸赴役城上分四隊别立四表以為攻城之候焉若敵欲攻之處去城五六十步即舉一表橦梯逼城舉二表敵若登梯舉三表欲攀女牆舉四表夜則舉火如表法城上四隊之間各一作為置八旗若須木檩拯板舉蒼旗須灰炭稕鐡舉赤旗須礧木樵葦舉黃旗須砂石磚瓦舉白旗須水湯不潔之物舉黑旗須皮氊麻索鍱鐡鍬鑊斧鑿舉雙兔旗須戰士鋭卒舉熊虎旗須戈戟矢弓刀劒舉鷙旗當主之官隨色而供城內老少丁女除營食外皆令應役於城上分為八隊使識文字者點檢常旗物與八部也反浸第五十九我城若居卑下之地敵人擁水灌城速築牆壅諸門及陷處更於城內作圍周匝視水髙下而闊築牆外取土髙一丈以上立於城牆內取土而薄築之精兵備守不得容雜色人如有泄水之處即十步為一井井內潛通引泄漏城中速造一作結船一二十隻募解舟楫者載以弓弩鍬􅀈每三十人自暗門穴銜枚而出斫營敵覺即急於城上鼓噪決其堤堰即以精鋭急出助之弩臺第六十髙下與城等去城百步每臺相去亦如之下闊四丈髙五丈上闊二丈下建女牆內通暗道安屈膝梯人上便卷收之中設氊幕置弩手五人備乾糧水火烽火臺第六十一髙山四顧險絶處置之無山亦於孤迥平地置之築羊馬城髙低便常以三五為堆臺髙五丈下闊二丈上闊一丈形圓上建圓屋覆之屋徑闊一丈六尺一面跳出三尺以板為之上覆下棧屋上置突竈三所臺下亦置三所並以石灰飾其表裏復置柴籠三所流火繩三條在臺側近上下用屈膝梯上收下垂屋四壁開覩賊孔及安視火筒置旗二口鼓一面弩兩張炮石礨木停水甕乾糧麻煴火鑽火箭蒿艾狼糞每晨及夜平安舉一火聞驚覺舉二火見煙塵舉三火見賊燒柴籠如每晨及夜半平安烽火不來即烽子為人所捉一烽五人為烽子遞如更刻觀視動靜一人為烽率知文書符牒轉遞望樓第六十二牙帳前立百尺竿上置板屋四面開門狀如斗令人上望賊賊有所攻隨其方面以小白旗招之衆賊往來聚散逺近皆審而視之以告於下馬鋪第六十三每鋪相去三十里於要路山谷間牧馬兩匹與逰奕計會有事警急煙塵入境即報探設土河於山谷口當賊路橫斷闊二丈深二尺以細沙土填平每日檢行掃令平淨人馬入境即知足迹多少遊奕第六十四軍中選驍勇諳山川泉井者充之常與土河烽鋪計會文牌日夕選一作邏候於亭障之外捉生問事其軍中虛實舉用勿使遊奕人知其副使子將並用久在軍中行人一作善騎射者充之守城具第六十五雜物守城之時其什物五穀糗糒魚鹽布帛醫藥工巧戎具鍛冶秸稿茆荻蘆葦灰炭柴薪松樺蒿艾脂臘麻皮氊毯荆棘芘蘺釡􅀈盆甕礨木槌鑿刀鋸長斧長刀一作弓長錐長梯短梯大鈎連鎖但人所用之物一一預備仍令修緝不得損壞雜備城上八隊之間安轉關小炮一作磯二機關大炮一雲梯撞炮等間先從城身用木跳出為重女牆髙於土女牆五寸以上以板覆之隨事緩急而開閉之敵若以大石擊牆樓石下之處出跳空中懸生牛皮或氊毯等袋以乘其石城內人家咸令置水防火先約先一作但失火者斬火發之處多恐姦人放火但令近便主當八部官人領老小婦女救之火起所部急白大將大將領親信左右人救火城中有卒驚及雜人城上不得輒離職掌亂走街巷違者斬之敵若推輪排來攻先以手炮打手炮既衆所中傷必多來者被傷則力不齊矣懸門懸板為門也鐡􅯍之如棧板用之懸鍾板繞城於敵柵上上皆懸板受敵之時則板起發矢突門於城中對敵營自鑿城內為暗門多少臨事令五六寸勿穿或於中夜於敵初來營列未定精騎從突門躍出擊其不意塗扇以泥泥城門可厚三尺備火鑿門門為敵所逼先自鑿門扇十數孔出強弩射之長矛刺之敵且不得近門塗棧以泥塗門上木棧可厚五寸備火芘籬戰格於女牆上跳出㧻去牆三尺著橫檢㧻安轄以荆栁編為之長一丈闊五尺懸安㧻端以遮矢石布幔以復布為幔用弱竿懸於女牆外去牆七八尺禦炮石之勢則矢石不復近牆矣連梃如打禾連枷狀打女牆外城上人叉竿如槍刃為兩岐用叉飛梯及人鈎竿如槍兩旁有曲創可以鈎人長柄鈎城上以木為棚容兵一隊作長柄鐵鈎隨要便以為之備若敵攀女牆踊身待其身出衆鈎齊拾掣入城中百刀錐斧助之若敵以木驢攻城我用鐵蒺䔧下而敦之其法以熟鐵為之闊徑一尺二寸四條縱橫如蒺䔧形以生鐵汁灌其中央重五十斤上安鼻索鎖擲下敦訖以轆轤拗上若木驢有牛皮并泥敦著即夆速以火炬灌油燒之鐵菱狀似小鐵蒺䔧要路撒之串鐶敵若推䡴車攻城我以粗鐵鐶并屈桑木為之用索相連遇䡴頭適到速以鐶串䡴頭於其旁便處令壯士牽索則䡴車畨倒弓弩齊射自然敗走眯敵石灰粳粃因風一作羅於城上擲之以眛敵目因以鐵汁灑之轉關橋梁拾一作為橋梁端著橫括拔去括一作橫橋轉關人馬不得渡皆傾水中轉關牆凡攻城之兵禦捍矢石頭戴蟸帽側視不便衣甲重厚進退又難前既不得上城退則師逼迫人衆煩閙我作轉關女牆騰出城外轆轤墜鐵索索頭安鴟腳當聚閙處擲下撥人木弩以黃連桑柘為之弓長一丈二尺中經七寸兩弰三寸絞車張之大矢一發聲如雷吼積木備礨木徑一尺小頭六七寸長五尺候敵人上城則擲下礨之積石備炮一作炮石大小隨身下捉敵人地探於城四隅穿井各深二丈令覆載新甕於井中坐而聽城外賊到內有孔穴地道并聞甕中辨逺近矣地聽於城內八方穿井各深二丈以新甕用薄皮鞔口如鼓令聰耳者於井中枕甕而聽則去城五百步悉知之既審其處我則隨地鑿穴迎之若相遇以乾艾一石燒令煙出乃用板於穴口封之勿令煙泄更以鞴鼓之則敵人焦灼矣警火每城四面夜間設有警火油囊盛水於城上擲安火上囊敗火滅救火用水筒敵若縱火焚樓楪以粗竹長一丈鎪去節以生薄皮為盛令貯水二三石將筒內於袋內急縳如濺筒令壯士三五人撮水口急蹙之救火每門常貯兩具無竹即以木合桶漆之而用并小濺筒二十一作百具助之門內常以甕貯水添用燕尾炬縳葦草為炬分為兩岐如燕尾狀以油蠟灌之加火縱城墜下使人騎木驢而燒之松明炬以松木為之燒令明直縋下隨城照之恐敵人乘暗上城脂油燭炬燃脂秉燭於城四衢要路門下晨夜不得絶明用備非常行爐鎔鐵汁爐舁行於城上以灑敵逰火鐵箱盛火加脂臘鎖鎚城下燒穴孔中人毒井守城之時城外有井先沉之以毒藥陷馬坑孔長五尺闊一丈深三尺坑中埋鹿角槍竹籖坑如亞字相連狀如鈎鎖覆以芻草茆禾加土種草令生苗蒙覆其上軍城礨壁要路皆設之拒馬槍以木徑二尺長短隨時十字鑿孔縱橫安檢長一丈鋭其端可塞城中門巷要路木柵為敵所逼不及築城壘或因山河險隘多石少土不任板築則建立木為柵方圓髙下隨時深埋木根重復彌縫其闕內重柱為閣道外重柱長出四尺為女牆皆泥塗之又於閣道內柱上布板木為棧立闌干行於柵上懸門擁牆濠塹拒馬一如守城法攻城具第六十六橨榅車四輪車上以繩為脊犀革蒙之內可藏十人填隍推之直抵城下可以攻掘金木火石所一作俱不能敗飛雲梯一大木為牀牀下置六輪上立雙牙牙有檢梯節以長一丈二尺有四桄桄相去三尺勢微回遞互相檢飛於雲間以窺城中有上城梯首冠雙轆轤枕城而上拋車以大木為牀下安四獨輪牀上建雙陛陛間橫括中立獨竿竿著桔橰其竿髙下長短大小以城為凖竿首以窠盛石大小多少隨竿力所制人挽其端而投之其車推輪逐便而用之亦可埋腳著地而用之其旋風四腳亦隨事而用轉軸車車上定十四石弩弓以鐵鈎繩連轉行軸轉引弩持滿弦推牙上弩為七衢中衢大箭一鏃創長七寸廣五寸簳長三尺圍五寸以鐵鍱為羽左右各三箭次小於中箭其牙一發諸箭齊起及七百步所中城壘罔不崩潰樓櫓亦顛墜謂之車弩尖頭木驢以木為脊長一丈徑一尺五寸下安六腳下闊而上尖頭髙七尺內可容六人以濕生牛皮蒙之蔽其下移至城下木石鐵火皆不能敗用攻其城土山於城下起土為山乘城而上地道鑿地為道行於城下因以攻城往往建柱積薪於柱間而焚之柱折而城崩板屋以八輪車上樹髙竿竿上安轆轤以繩挽板屋上竿首以窺城中板屋方四尺髙五尺有十二孔四面列布車可進退圍城而行於營中逺望謂之梁車言如鳥巢也木幔以板為幔立桔橰於四輪車上懸帳逼城其間使趫卒敵之蟻附而上矢石亦不能敗又火箭以小瓢盛油灌矢端射城樓櫓板木上瓢敗油散因以箭鏃內簳中射油散處火立燃復以油瓢續之則樓櫓盡焚磨杏子中空以艾實之繫雀足上加火於薄暮羣飛入城礨中栖宿其積聚廬舍須臾火發鐵钁鋤钃钁短柄著鋼鐵以塹鋤其城將軍炮置四柱長短為之其下四面著橫括半之則前及左右著括後其下著其頂上左右亦著轉輪致竿其竿隨架所宜為之其絙索之類隨其炮之大小增減竿稍懸繩置窠窠中盛炮其架編全竹為衣以禦敵矢石狗蹲炮前置兩長柱中著橫括如前炮狀竹衣亦然旋風炮左右著二方木括亦如之鑿一孔通貫下括左右前後皆可運轉埋之於地其頂轉輪著竿如前狀此炮不用衣地聽第六十七令少睡者枕空葫蘆卧有人馬行三十里外東西南北皆響見於葫蘆中失道第六十八夜失道以北斗建為正以四時定之然後知四方之路矣如本路則放老馬以從之虎鈐經卷六
