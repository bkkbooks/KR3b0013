body:
  text: 虎鈐經卷十三宋許洞撰占相兵臨利害第一百三十三占兵已交勝負第一百三十四占伏兵第一百三十五占疑左右伏兵第一百三十六占偷城及虜掠第一百三十七占疑有人謀己第一百三十八占灾危第一百三十九占野地立營正宿第一百四十占度關梁探賊第一百四十一占相兵臨利害第一百三十三金匱經曰戰不戰視勾陳勾陳克日則戰與刑克必戰甲子日刑在東方𫝊送與從魁為勾陳臨甲又相克必戰鬬勾陳上下相克亦鬬又曰軍出時大吉小吉臨日辰兩解不戰他神臨日辰皆合戰又說曰斗加孟神在內宜止加仲神在門兩相傷加季神在外宜出戰必大勝占兵已交勝負第一百三十四金匱經曰敗不敗視六害說者曰酉戌相害子未相害午丑相害巳寅相害辰卯相害申亥相害假令本命在子而小吉為白虎加之此為見六害以此將兵今日敗將能此者可校之戰矣龍首經曰先起為客後起為主先起不可下克上後起不可上克下謂初陳一作𫝊也辰勝神將主人勝神將勝辰客勝說曰一作假令三𫝊終始見前三五後二四一作之有氣天一之神臨主帥行年本命或用起天一而治一作值有氣之鄉𤣥武一作都立四死之地則戰勝矣若𤣥武臨日辰而遙克時勿戰必不利矣用戰起雄吉春寅夏巳秋申冬亥用戰起雌凶春申夏亥秋寅冬巳一云都將旺相而臨囚死賊勝都將囚死而臨旺相討賊者勝審察之說曰決勝敗者勾陳克都將官軍勝都將克勾陳賊軍勝都將三相加臨囚死亦賊勝說曰將軍年克勾陳白虎大勝不然者勾陳克𤣥武以攻之必勝說曰將勾陳所軍神往攻所制之神勝所攻之勝神與勾陳并氣自下制其所臨之辰是為敵降必有大攻說曰初起者欲勾陳下克上後起者欲勾陳上克下辰勝將將勝神主人勝神克將將克辰客人勝干克支客勝支克干主人勝占伏兵第一百三十五卯子甲巳臨日辰必有伏兵此神旺相與殺并大凶必血戰伏兵必發不與殺并伏兵不敢發也說曰以聞事時斗加季有伏兵說曰干傷者有伏兵支傷者無伏兵支干俱傷必有伏兵戰必不勝大凶占疑左右近地伏兵第一百三十六若疑賊有伏兵在左右近處欲知所在者於斗下求之說曰大吉過日辰賊已出界不過未出界占偷城及虜掠第一百三十七說曰以月將加時勝光𤣥武不可行襲人城壘虜掠之事以𤣥武所畏為厄㑹木神為𤣥武則庚申辛酉勿須行占疑有人謀己第一百三十八正時說曰日上神為己身辰上神為他人日上克辰上神有怨恨又言辰上克日上神將見騰蛇白虎魁罡或在辰上見者事成非辰上見者不成但有意說曰欲知他人有所謀假令七月時加寅七月甲死於申今復遇庚二生一作壬金逢一死木是二人欲殺一人他皆倣此占灾危第一百三十九吉辰與良將并臨日辰及行年勾陳制所欲出之辰之用起陰𫝊出陽者可出必克免難金匱經曰傷不傷觀陰陽說曰今日是乙丑加一為不傷將得天后為重不傷吉神后加丑從一作可魁加一為傷人為前二重傷皆凶也占野地立營正宿第一百四十金匱經曰怖不怖視五墓怖懼墓加日辰亦不寧說曰聞有敵兵士卒行疲日晚欲停此宿運式占之遇三刑加日辰必不可停敵欲來攻三刑者卯辰巳也說曰絳宫時宜正明勿留也已止宿未定而心動眼瞤若吏士虛驚者以月建此三字住一云將加時魁罡加日辰急去之夜必有賊來攻一云大吉日急去不可止一云辰上見大衝有風雨見神后太乙有盜賊說曰絳宫時宿利在中明堂時利在前玊堂時利在後也一云大吉干日急去不可宿說曰辰巳見卯夜有風雨子巳加卯有盜賊帶旺相氣即來帶死囚氣即不來說曰安營止宿以月將加時魁罡加日軍夜驚騰蛇白虎臨日辰軍載驚一云魁罡加日大將死占度關梁探賊第一百四十一金匱經曰凶不凶視破衝說曰行年在嵗月日時破衝下皆凶也日辰上神見旺相宜進反此宜止說曰命在一處日辰上罡光明急去勿住也說曰聞此賊干傷或支傷勿度或占度支干俱吉說曰欲入賊營視二門天罡六合大常大衝勝光臨之可行若出入見勾陳朱雀騰蛇白虎勿行必為賊所擒虎鈐經卷十三
