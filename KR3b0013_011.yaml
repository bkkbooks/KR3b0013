body:
  text: 虎鈐經卷十一宋許洞撰天時統論第一百十四出軍日第一百十五四戰圖第一百十六孤虛第一百十七九勝第一百十八地兵第一百十九黃幡豹尾第一百二十遊門第一百二十一八卦第一百二十二五姓第一百二十三天罡第一百二十四雷公第一百二十五十二將第一百二十六三九第一百二十七天時統論第一百十四天時者兵家之主也若夫星辰變見雲氣聚散六壬旺相遁甲休咎風露雷雨之所動作陰陽晦明之所啓閉鼙鼓之震響禽鳥之示情通天地鬼神之心開勝敗休咎之兆者其道何也臣切謂天地之道大正也夫陽為實陰為虛實有常而虛不常也法其實者政令之謂也政令一定之象也法其虛者權智之謂也權智應變之象也動以虛實為用者天地之正一作身道也是以知政令權智之所設能應於天地者此之謂大順也或天地示其災變我以順應之示其吉祥亦以順應之是以順應正也如能以順應正行師豈有敗乎然雖黑一作雲氣出壘赤氣臨軍六窮起風三刑生霧皆為敗象當其時茍能觀其凶變修政謹身卜地遷營應天揆日恭受譴戒一作怒而警省焉此可以易凶為吉矣斯乃以順道應天者也臣今所列時日雲氣厯象之間其占候既不一在乎用兵者因其時擇而用之也若能善服人心以順天地之情和陰陽之性使災咎不見率由政令權智之得其道也又何暇審占天時以為候哉出軍日第一百十五月殺月虛日利命將出征又曰十二月中各有出軍吉凶日正月戊辰丙子庚午辛卯戊子壬辰丙辰丙申二月丁卯辛卯此是九醜日它月皆不犯三月甲子乙丑戊辰己巳丙辰庚申四月丁卯己卯辛卯癸卯一作丑五月丙申戊戌庚戌庚申壬戌六月辛未己未癸未庚寅丙申辛卯壬寅庚申七月乙丑乙酉己酉丁巳癸丑八月庚午癸酉壬午丙午戊午九月癸酉乙酉丙申丁酉壬寅己酉甲寅十月己酉甲寅已上用皆吉十一月十二月九醜八魁無翹大禍反激天賊天門四不出六絶血忌大敗諸日今悉刪而去之不在此十二月吉日一作月中唯犯九醜大凶一説云天乙絶氣日不可出軍攻戰正月初六二月七三月八四月九以次周十二月一説云六窮日不可出軍初四十九二十八一説云天門日亦謂之往亡不可出軍正月初七日二月十四日三月二十一日四月八日五月十六日六月二十四日七月九日八月十八日九月二十七日十月十四日十一月二十一日十二月三十日若有急難擇時吉辰而動不用此日可也四戰圖第一百十六孤虛第一百十七一人已上用時孤虛萬人已上用日一作月孤虛日內如或賊不在虛上我已得其便地即用旬孤虛若復逼迫不得用孤虛之位背建向破假令卯為建則酉為破是也用日孤虛子日亥孤巳虛丑日子孤午虛寅日丑孤未虛卯日寅孤申虛辰日卯孤酉虛巳日辰孤戌虛午日巳孤亥虛未日午孤子虛申日未孤丑虛酉日申孤寅虛戌日酉孤卯虛亥日戌孤辰虛用時孤虛以時為主方位並同旬孤虛甲子背戌亥擊辰巳甲戌背申酉擊寅卯甲申背午未擊子丑甲午背辰巳擊戌亥甲辰背寅卯擊申酉甲寅背子丑擊午未背者為孤擊者為虛也用孤虛之時須觀年月所建一作見兵刃如山何可為敗如或賊在虛久戰而不敗者切不可引退但併力擊之必勝矣故兵法曰背孤擊虛一女子當五丈夫此之謂也九勝法第一百十八黃帝曰行兵要背天目向地耳甲子旬天目在庚午地耳在戊辰甲戌旬天目在庚辰地耳在戊寅甲申旬天目在庚寅地耳在戊子甲午旬天目在庚子地耳在戊戌甲辰旬天目在庚戌地耳在戊申甲寅旬天目在庚申地耳在戊午地兵法第一百十九愚謂地兵者六丙耳丙為天氣故不可觸也太公曰凡行兵向陳勿可犯地兵將軍忌之甲子旬地兵在寅甲戌旬地兵在子甲申旬地兵在戌甲午旬地兵在申甲辰旬地兵在午甲寅旬地兵在辰黃幡豹尾第一百二十凡戰背豹尾向黃幡吉午戌嵗黃幡在戌豹尾在辰子辰嵗黃幡在辰豹尾在戌卯未嵗黃幡在未豹尾在丑酉丑嵗黃幡在丑豹尾在未也遊門第一百二十一出兵攻敵常須遊門正月天門在申百死在酉二月天門在酉百死在戌三月天門在戌百死在亥四月天門在亥百死在子五月天門在子百死在丑六月天門在丑百死在寅七月天門在寅百死在卯八月天門在卯百死在辰九月天門在辰百死在巳十月天門在巳百死在午十一月天門在午百死在未十二月天門在未百死在申八卦第一百二十二一日從艮擊坤二日從震擊兑三日從巽擊乾四日從離擊坎五日從坤擊艮六日從兑擊震七日從乾擊巽八日從坎擊離一日十一二十一日同前例擊之每到十日二十三十日並軍忌不可用之五姓第一百二十三角德在巳陽子陰午生氣卯死酉刑禍申羽德在申陽子陰午生氣子死午刑禍丑徵德在寅陽午陰子生氣午死子刑禍未商德在亥陰子陽午生氣酉死卯刑禍午宫德在巳陽子陰午生氣子死午刑禍亥以生氣擊死氣以陰擊陽天罡第一百二十四舊説曰天罡加孟神在內加仲神在門加季神在外凡有所用以天罡加地户可以入山林設伏兵以天罡加天門可以攻敵以天罡加酉隨便伏匿可以探敵事他人不覺知以天罡加子天地所通吉候也天罡加丑天地不一作小通以為吉事不可以私忿興兵征伐逺行三十里止合吉一作凶天罡加寅天地慶悅舉小事吉天罡加卯天地開格不可舉衆天罡加辰天地初呼不可侵人關界守巳地則敵人不能攻之天罡加巳天地神祐無憂患但進兵入敵境逢敵則止營勿與即戰天罡加午天地初起而縱橫之時凶天罡加未天地小通宜小心行賞賜撫將校慎兵馬如是吉反是凶天罡加申天地不逺揚兵堅壁設備吉天罡加酉天地關無路若出兵中道奔亡遇敵即敗大凶宜守營自備天罡加戌天地返逆吏士謀殺主將主將備之天罡加亥天地迫無路行者止占戰鬬天罡加孟孟謂寅申巳亥是也利力戰加仲仲謂子午卯酉是也主客傷加季季謂辰戌丑未是也利客勿迎戰從去之占卒聞敵出軍加孟不出加仲半出加季全出占卒聞敵罷軍加孟不罷加仲及季俱罷占聞憂加孟不足憂加仲小憂加季大憂雷公第一百二十五雷公者六庚耳庚為天刑故不犯又庚乃百神聚之方攝殺六律曰雷公將軍在午遊庚領十二月將及風伯雨師其所在之處羣居嚮應而到若出軍布陳立營則雷之所處慎不可犯之主敗軍殺將也甲子旬六庚在午甲戌旬六庚在辰甲申旬六庚在寅甲午旬六庚在子甲辰旬六庚在戌甲寅旬六庚在申十二將第一百二十六用起天一以將兵大捷一作樓闢地千里敵畏服用起六合以將兵主得子女玊帛用起青龍以將兵大勝得敵之邦國府庫用起太陰以將兵士卒怯怖用起天后以將兵不戰自敗用起太常以將兵無功用起騰蛇以將兵士卒驚駭上下相尅多傷用起朱雀以將兵士卒驚恐或妄作口舌用起勾陳以將兵士卒敗車馬折傷用起玄武以將兵軍多亡遁戰不利用起白虎以將兵師敗無救援用起天空以將兵士卒死亡為敵所欺詐説曰天一者人皇之靈也上潛精而為星在紫微宫下遊十二次則居己丑主慶賀事治大吉小吉臨甲乙寅卯假令天一治大吉小吉而臨甲乙寅卯是也餘皆例此凶神將騰蛇者飄風之精也居大陽之丁巳雷公六律曰天一奉車都尉凶神也一作而大小殺並主憂驚朱雀者一作星月之精也居大陰之丙午雷公六律曰天一羽林下為霹靂凶將也主刑戮口舌六合者大陰之精也居少陽之乙卯吉將也雷公六律曰天一光祿大夫主和合吉事勾陳者雷電之精也居大陽戊辰雷公六律曰天一大將軍也凶將也主戰鬬多傷敗青龍者大陽之精也居少陽之甲寅雷公六律曰天一左丞相吉將也主喜慶事天后者水之精也居大陽之癸亥雷公六律曰天一綵女也吉將也主敝匿事大陰者金之精也居少陽之辛酉雷公六律曰天一御史中丞吉將也主陰私事也玄武者北方七星之精也居少陰之壬子雷公六律曰天一之後將也凶將也主逃亡離别盜賊若與風伯雨師二神并必有盜賊大常者土之精也居少陰之己未雷公六律曰天一大常卿吉將也主財帛白虎者西方七星之精也居少陰之庚申雷公六律曰天一廷尉也凶將也主囚禁骸骨天空者斗魁之精也居少陰之戊戌雷公六律曰天一宜師一作司直凶將也主欺詐事三九第一百二十七一九命榮衰安怨成壞一作敗友親二九業榮衰安怨成壞一作敗友親三九貽榮衰安怨成壞一作敗友親大將軍將有事即預揆已所生之日以月將推之為命宿一室二奎三胃四壁五參六鬼七張八角九亢十心十一牛十二虛第一命宿次榮衰安怨成壞友親之類一九之法次以業宿為準前三九周二十七宿而推之假令大將生於五月五日胃宿為第一命宿二昴為榮三畢為衰四觜為安五參為怨六井為成七鬼為壞八栁為友九星為親次為二九之法十張為業宿復起之為首餘皆以類推之訖於三九他皆倣此也設或值命業宿直日宜舉號命一作令數習士馬建立營寨吉榮宿值一作吉日攻之取戰吉衰宿值日所作凶安宿值日移兵遷寨吉餘凶怨宿值日惟利結交於諸侯及延納賔客餘凶成宿直日設權詐及禳厭吉壞宿值日宜大舉師旅討伐叛逆及鎮厭呪詛皆吉友宿及親宿直日備藥餌治軍病犒勞宴賞此三九之用也茍欲求其直日之法即以二十八宿本直之日配於大將軍命業胎宿之次以定吉凶之後以七元甲子起之第一虛宿直大陽受日房星昴直示大陽受日他皆倣此是謂天元甲子第二奎宿直木星受日斗角井所直同是謂地元甲子第三畢宿直大陽受日危心張所直同是謂人元甲子第四鬼宿直金星受日牛亢婁所直同是謂鬼元甲子第五翼宿直火星受日亢觜室所直同是謂江元甲子第六氐宿直土星受日女宿昴胃所直同是謂河元甲子第七箕宿直水星受日軫參畢壁所直同是謂海元甲子以二十八宿所直之內足以見九宿之日假令三月一日為鬼元甲子即翼宿直火星受日二日乙丑軫宿直水星受日三日丙寅即角宿直木星受日以類次之凡七元起於天元終於海元周而復始茍欲知其七元甲子之資次當以長厯推之凡見所直之宿可以配於三九也行師者能以三九用日五行用時孤虛用地雲氣星辰用天沉機用人未有不建百世之功者也虎鈐經卷十一
