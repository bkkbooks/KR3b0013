body:
  text: 虎鈐經卷十二宋許洞撰六壬𫝊課第一百二十八遁甲遊都第一百二十九五行勝負第一百三十戰位第一百三十一八宫第一百三十二六壬𫝊課第一百二十八凡用六壬若占利害之時先以月將加正時假令正月占以正月合神登明為月將卯時占以登明加卯他皆例此若占今日今時而行四課之法何謂四課假令今甲子先視甲上所見神為第一課號曰日之陽次視神本位上所見之神為第二課號曰日之陰次視子上所見之神為第三課號曰辰之陽次視此神本位上所見之神為第四課號曰辰之陰此謂四課四課既畢見有相克取以發課故金匱經曰用兵當知刑克之忌猶克也凡四課之内上克下者正月甲子日寅時用勝光是也又有下克上者二月丁巳日午時用從魁是也兩俱克者皆下以克上為用上以克下為體也下克上者用兵之家憂深上克下者憂淺自兩上克下以此為用三月庚午日河魁是也自有俱比以涉害深者為用四月戊辰日丑時勝光是也自有涉害俱深以先見者為用五月己酉日戌時用勝光是也自有上下俱不相克以遙相克為用也金匱經曰交俱不入當獨立此謂遙見相克也假令正月甲辰日寅時即以正月合神登明加甲上甲日見登明水木不相克辰上見大吉二土不相克登明本位亥上見𫝊送是金遙克甲木即以𫝊送此謂遙見克他皆倣此自有俱遙見克者以比者為用自有俱比以遙克見用自有日遙克神神遙克日兩俱見以神克時日為用無神克者乃取日克神為用自有兩遙克者亦以比為用自有俱比以此先見者為用先見為先後辰課四課者上下又無遙相克者當以仰伏視之此法為用何謂仰伏視之説者曰西方白虎宿有昴星主天獄也剛日當從地下星仰望天上隨所見神仍以為用柔日當從天上昴星伏視地下所見辰以此神本位為用假令仰見大吉即以大吉為用假令伏視地下見午以天上勝光他皆倣此所謂仰伏視為用也昴星不可全信以日辰上審之剛日中𫝊辰後𫝊日柔日中𫝊日後𫝊辰自有八専曰唯有兩課見有相克亦涉害深為用無克日剛日從日上陽神順數柔日從辰上陰神逆數皆及三神為用何謂八専甲寅庚申己未丁未癸丑辰同也假令正月甲寅日寅時以月將加時申上寅上見登明此謂地上二神也共見天下一神假令正月甲寅日卯時以月將加卯上寅上共見河魁此謂一神臨二神河魁本位上見勝光不相克即以河魁為用無相克乃用逆之之數焉順數法假令正月庚申日戌時庚與申共見從克從河魁本位上見河魁皆不相克庚剛日當從庚申上起從魁順數之及三神到戌上登明即以登明為用也逆數法假令正月己未日戌時以月將加戌己未共見𫝊送𫝊送本位申上起河魁皆不相克柔日當從𫝊送𫝊送本位申上起從魁為始逆數到午上得小吉為用自有伏吟時剛日用日上神柔日用辰上神皆前刑而後克前破而後衝以為三𫝊金匱經曰剛以日柔以辰不共言無相克也剛日起日上神柔日以辰上神為用凡伏吟皆前刑後克前破後衝何謂刑用寅刑巳用子刑卯之屬也何謂破午無刑破子刑卯亥無刑破巳刑申之屬也辰無刑破丑酉無刑破子是也自有反吟時剛日以日一作月衝為用柔日以辰衝為用皆載衝而後刑為三𫝊何謂四衝假令甲子日甲衝辛辛上見天罡以為用天罡而又反衝河魁此為載衝然後刑未何謂辰衝假令乙丑日丑衝丙丙上見登明為用用登明而後破功曹又辰衝大乙此謂載衝然後刑申一云反吟猶有課課發卦而後前衝後刑玊厯詳之凡加臨四課式反伏二吟皆須知發課之神即三𫝊也何謂三𫝊假令小吉臨寅為用即小吉為第一𫝊小吉本位見神后神后即第二𫝊神后本位見太乙太乙即為第三𫝊所以三者象三正四者象四時能於𫝊課以求相克之神斯足以見用兵之利害矣集一作利靈經曰用式之時朝向南暮向北避嵗月二建説曰甲乙日日入時丙丁日夜半時戊己日平旦時庚申日巳時壬癸日晡時已上不可占也一云正月五月九月卯二月六月十月子三月七月十一月酉四月八月十二月丑已上以天罡加之増減式法遁甲遊都第一百二十九璧玊經曰𤣥女言寧可與人妻奴不可示人遊都欲知敵人必決遊都之法甲己日大吉乙庚日神后丙辛日功曹丁壬日太乙戊癸日𫝊送皆以月將加時聞賊時遊都加日辰敵即到臨一辰一日到臨二辰後二日到臨三辰已過矣勿憂都旺相克日辰㓙益甚囚死不克日辰無以患説者曰吏神姦神一名遊都吏在天一前姦在天一後姦在後加日辰在我家年止謀我身又説曰以吏為遊都以賊為虜都其法同加日皆不可出軍也甲己之日吏神丑賊神未乙庚之日吏神子賊神午丙辛之日吏神寅賊神申一作巳盜神亥丁壬之日吏神巳盜神申賊神亥戊癸之日吏神申盜神巳賊神寅説曰申子辰功曹為天賊亥卯未太乙為天賊巳酉丑登明為天賊寅午戌𫝊送為天賊説曰遊都將者總䕶天賊天殺諸將若加臨辰則立到臨好鄉則不戰有降兵卒臨所畏大戰父子不相親中外不相信臨東方兵㓙南方兵威不可加臨西方利勒兵賜將士臨北方利禦敵凡為將皆須知是遊都將不能知是者與士伍同耳若欲都將之術甲己之日大吉乙庚之日神后丙辛之日功曹丁壬之日太乙戊癸之日𫝊送説曰都將凡臨日辰而相克者賊来疾速加季制吏亦為来一作求四孟神不来一作求若在天一前一辰一日来一作求二辰二日来一作求三辰三日来一作求四辰無賊来後三辰為過去凡三都將所臨賊在其下説曰欲知賊消息往天耳聴之天耳者大吉小吉是也説曰正時占大白入熒惑賊来熒惑入大白賊不来丙丁為熒惑庚辛一作申為大白説曰天一加日今到天罡小吉太乙神后加日辰敵来至急又曰天罡加孟言虚加仲賊来至半道加季即到説曰已在前賊不知處者正時天目所臨賊在其下矣天目者春氐氐乙下夏栁栁午下秋胃胃辛下冬女女癸下一説神后為𤣥武加日時敵急到説曰宵聞敵三刑加日辰到急三刑者天罡大衝太乙也又占敵以月將加時天罡或如房屋或臨日辰不可出軍當逢剽掠説曰白虎勾陳加到巳地聞應有巳即為盜或甲日必有敵揚兵見血騰蛇朱雀但驚恐耳𫝊送加孟敵肇發加仲半道加季即到説曰占聞前後有奸賊欲知何所在者以月將加時看大吉大吉加子午賊在大衝下加丑未在太乙下加寅申在𫝊送下加夘酉在從魁下加辰戌在登明下加巳亥在大吉下勿避此等必有傷害聞有賊用月將加時便看大吉前在也正時大衝神后太乙加日賊在前加辰賊在後説曰甲己之日丑為吏未為賊乙庚之日子為吏午為賊丙辛之日寅為吏巳為賊丁壬之日巳為吏申為賊戊癸之日申為吏卯為賊占賊有氣其賊必来占死氣賊不到又此時言吉㓙以意消息之可也五行勝負第一百三十五行者順五行所直之時日以定主客之利害也金日金時無所害也行師不遇敵旗色上白報兵馬事来一作求虛聲也金日水時若值申子辰之日忌申子辰時當避之行師不遇敵旗色上黑報兵馬事来則不到見賊亦無戰自相休解金日火時若寅午戌日忌寅午戌時避之行師宜客為我利乘敵未動亟引兵擊之旗色上赤若敵先来攻我不與戰報兵馬事㓙急備之金日木時宜主我不可往旗色上白敵来堅陣待之與戰必勝報兵馬事大吉金日土時不遇敵亦無戰陣旗色上黄報兵馬事来勿憂若值子日子時避之火日火時無所害也不遇敵遇亦不戰旗色上赤報兵馬事来虛聲也火日水時宜客報兵馬事㓙急避之見敵若未動則我先引兵赴戰并力擊之旗色上黑若敵先来攻我我則堅壁固守不可應之火日金時宜主不利往敵来攻我我舉赤旗反往擊之必勝矣火日土時亡所害也見敵亦無戰旗色上黄報兵馬事来虛聲也火日木時亦相生不相克也更觀時之衰如何宜主敵来攻我則舉赤旗擊之報兵馬事一作来木日木時亡所害也不宜動作事多不就亦無戰陣報兵馬事虛聲木日火時宜客利速引兵赴敵旗色上赤一作黒若敵先来不可應戰報兵馬事㓙亦觀時之衰旺如何值巳酉丑日當忌巳酉丑時避之木日金時宜客利我速引兵擊之旗色上白若敵先来攻利固守勿與戰木日水時不遇敵遇亦自退旗色上黑報兵馬事来虚聲也木日土時宜主若敵来攻舉青旗擊之報兵馬事㓙一作吉水日水時無所害也不遇敵遇亦自散旗色上黑報兵馬事来虚聲也水日火時宜主慎勿先動若敵先来攻當舉黑旗放兵大擊之報兵馬事大吉水日金時見敵不與害旗色上白報兵馬事虚聲也水日木時旗色上青報兵馬事虛聲也水日土時不可動衆報兵馬事安靜勿憂夫土能克水水旺又能決土也更審時之衰旺如何若敵来乘土上旺勿與戰土衰則反舉黑旗擊之土日土時無所害也不可動衆旗色上黄報兵馬事虚聲也土日木時宜客利敵先動而擊之旗色上青若敵固守勿與戰報兵馬事㓙土日金時不遇敵遇亦無害報兵馬事虚聲也土日火時主不可動敵来攻勿與戰戰者少衰報兵馬事来小有焚燒驚恐土日水時先觀時之衰旺何如然後動靜焉土旺宜主水旺宜客敵来氣生勿與戰衰則擊之報兵馬事㓙甲子甲午金日甲子乙丑金時丙寅丁卯火時戊辰己巳木時庚午辛未土時壬申癸酉金時甲戌乙亥火時乙丑乙未金日丙子丁丑水時戊寅己卯土時庚辰辛巳金時壬午癸未木時甲申乙酉水時丙戌丁亥土時丙寅丙申火日戊子己丑火時庚寅辛卯木時壬辰癸巳水時甲午乙未金時丙申丁酉火時戊戌己亥木時丁卯丁酉火日庚子辛丑土時壬寅癸卯金時甲辰乙巳火時丙午丁未水時戊申己酉土時庚戌辛亥金時戊辰戊戌木日壬子癸丑木時甲寅乙卯水時丙辰丁巳土時戊午己未火時庚申辛酉木時壬戌癸亥水時己巳己亥木日甲子乙丑金時丙寅丁卯火時戊辰己巳木時庚午辛未土時壬申癸酉金時甲戌乙亥火時庚午庚子土日丙子丁丑水時戊寅己卯土時庚辰辛巳金時壬午癸未木時甲申乙酉水時丙戌丁亥土時辛丑辛未土日戊子己丑火時庚寅辛卯木時壬辰癸巳水時甲午乙未金時丙申丁酉火時戊戌己亥木時壬寅壬申金日庚子辛丑土時壬寅癸卯金時甲辰乙巳火時丙午丁未水時戊申己酉土時庚戌辛亥金時癸酉癸卯金日壬子癸丑木時甲寅乙卯水時丙辰丁巳土時戊午己未火時庚申辛酉木時壬戌癸亥水時甲戌甲辰火日甲子乙丑金時丙寅丁卯火時戊辰己巳木時庚午辛未土時壬申癸酉金時甲戌乙亥火時乙亥乙巳火日丙子丁丑水時戊寅己卯土時庚辰辛巳金時壬午癸未木時甲申乙酉水時丙戌丁亥土時丙子丙午水日戊子己丑火時庚寅辛卯木時壬辰癸巳水時甲午乙未金時丙申丁酉火時戊戌己亥木時丁未丁丑水日庚子辛丑土時壬寅癸卯金時甲辰乙巳火時丙午丁未水時戊申己酉土時庚戌辛亥金時戊寅戊申土日壬子癸丑木時甲寅乙卯水時丙辰丁巳土時戊午己未火時庚申辛酉木時壬戌癸亥水時己卯己酉土日甲子乙丑金時丙寅丁卯火時戊辰己巳木時庚午辛未土時壬申癸酉金時甲戌乙亥火時庚辰庚戌金日丙子丁丑水時戊寅己卯土時庚辰辛巳金時壬午癸未木時甲申乙酉水時丙戌丁亥土時辛巳辛亥金日戊子己丑火時庚寅辛卯木時壬辰癸巳水時甲午乙未金時丙申丁酉火時戊戌己亥木時壬午壬子木日庚子辛丑土時壬寅癸卯金時甲辰乙巳火時丙午丁未水時戊申己酉土時庚戌辛亥金時癸未癸丑木日壬子癸丑木時甲寅乙卯水時丙辰丁巳土時戊