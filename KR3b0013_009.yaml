  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0013_WYG_009-1a, image: WYG0727/WYG0727-0058a.png}
body:
  text: 虎鈐經卷九宋許洞撰四陳統論第九十六飛鶚陳第九十七長虹陳第九十八重覆陳第九十九八卦陳第一百飛轅陳第一百一四陳統論第九十六四陳圖者非古陳也臣切見李筌纂聚諸家陳圖但有形勢而已其部伍行列精微尺寸則莫能釋然其名既多其要則寡臣因辨古陳之法創造新意别為四陳之施可御而變因著論以明之論曰臣聞兵陳戰場止尸之所不能規度以固法何以取功决勝而定天下乎是故結陳之術不可疏疏則難應不可密密則難用首欲捷翼欲輕腹欲實尾欲正捷者不可使過輕者不可使凌實者不可使不應機正者不可使不知便即變今之所定四陳者十萬人之正陳也人數之多少臨時增減此非執蓋此十萬人為準則焉每一陳步兵七萬騎兵七萬以為常准但四陳更變各隨所便而用之爾每步兵一人占地兩步騎兵一人占地四步取其出入輕各受敵夫四陳我以之法若敵為彎陳我以飛鶚陳應之敵為直陳我以重霞陳當之敵為突陳我以長虹陳當之敵引兵四面圍我我以八卦陳當之此所謂應敵者也其隊校所動各飛敵之去就焉善結陳者先結人心何謂先結人心賞罰明也欲士伍應變之精熟在日月數習之不能教陳者是舉其師以與敵也夫孔子云以不教人戰是謂棄之此之謂也雖萬變之機不能精於陳戰之事與愚者同也然善戰者不陳騎兵也一部謂之五百步兵如騎之數飛鶚陳第九十七前校首騎三陳一十部合成五千騎一陳一部長一百四十步第二陳四部左右各祗一隊丈陳中並同長一里二百步計五百六十步第三陳五部長一里三百四十步計七百步前校項兵三陳步兵二十七部合一萬三千五百人第一陳九部長一里二百七十步計六百三十步第二陳并第三陳如之中校五陳步兵九十二部合四萬六千人第一陳二十一陳即部長四里三十步計一千四百七十步第三陳第四陳亦如之第五陳八部長一里二百步計五百六十步後校尾兵一直陳步兵二十一部合一作各一萬五百人長四里三十步計一千四百七十步左校爪騎二陳五部合二千五百騎第一陳二部長一里六十步計四百二十步第二陳長一百八十步右校爪騎亦如之左校翼騎四陳二十部一萬騎第一陳五部長一里三百四十步計七百步第二陳第三陳第四陳亦如之右校翼陳亦如之前校首騎三陳之中兩處各虛六十八步計一百三十六步在內虛實都厚三百四十步前校項兵三陳之中兩處各虛三十四步計六十八步一作一百三十步虛實都厚三百七十步中校五陳之中四處各虛三十四步計一百三十六步虛實共厚三百六步後校一陳厚三十四步右校爪騎二陳之中一處虛六十八步計二百四步虛實都厚一里一百一十六步左校翼騎亦如之前校之項前去首騎之末三百四十步中校之首去前校項兵之末一百七十步後校之首去中校之末自前校之首到後校之末并虛在內共厚四里三百二十步計一千七百六十步左校爪騎居中校左校相接之地中校稍前一百三十步右校爪騎所居之地亦如之左右校低於中校第二陳一隊與中校相去各一里四十步統成一大陳虛實共長八里二百七十步計三千一百五十步長虹陳第九十八前校三陳步兵三十七部合一萬八千五百人第一陳九部長一里二百七十步計六百三十步第二第三陳亦如之中校五陳步兵九十二部合四萬六十作千人第一陳一十九部長三里二百五十步計一千三百三十步第二陳二十一部長四里三十步計一千四百七十步第三第四陳亦如之第五陳一十部一里三百四十步計七百步後校一陳步兵二十一部合一萬五百人長四里三十步計一千四百七十步右校衝騎四陳八部合四千騎第一陳五部左右各抵隊長一里三百四十步計一千步第二陳亦如之第三陳六部長二里一百二十步計八百四十步第四陳亦如之左校四陳與右校同法前校三陳之中二處各虛三十四步計六十八步左內都厚一百七十步中校五陳之中四處各虛三十四步計一百三十六步虛實都厚二百六步後校一陳都厚三十四步左校衝騎四陳之中一處虛六十八步虛實都厚二百四步右校衝騎亦如之左校四陳之中三處皆虛五十八步計一百七十四步虛實都一里一百二十二步計四百八十二步右校亦如之中校之首去前校之末一百五十步後校之首去中校之末一百二十步自前校之首到後校之末虛實共厚二里六十步計七百八十步自後校之首左右校衝騎之末一百五十步自左校衝騎之首到右校之末虛實共厚一里三百一十六步計六百七十六步右校衝騎到左校之末亦如之左右校角各去中校角一十步計二十步在內左右校第一陳第二陳與中校齊頭以向中校巡各一部為準外府髙於中校六十步左右校角第三第四陳皆掩一百在中之後統成一大陳彎長七里二百三十步計二千七百五十步重霞陳第九十九前校衝騎三陳一十二部合六千騎第一陳六部左右各抵一隊長二里一百二十步計八百四十步第二陳亦如之前校四陳步兵三十五部騎兵八部兵四十三部計步騎各二萬一千五百人第一陳步兵九部步騎兵左右各二部計一十三部長五里一百一十三步計一千一百九十八步地各虛步并步騎二處相接四步在內第二陳步兵九部長一里二百七十步計六百三十步第三陳與第一陳同法第四陳步兵八部長一里二百步計五百六十步中校四陳步兵八十四部合四萬二千人第一陳二十一隊四里三十步計一千一百七十步第二陳第三陳第四陳亦如之後校一陳二十一部合一萬五百人長四里三十步計一千四百七十步右校四陳騎兵二十部合一萬騎第一陳五部長一里三百四十步計七百步第二陳第三陳第四陳亦如之右校四陳與左校同法前校衝騎二陳之中一處虛六十八步虛實都厚二百四步前校四陳之中三處各虛三十步計一百二步虛實都厚二百三十八步騎兵各虛六十八步厚薄同數中校四陳之中厚薄之數與前校同法無騎兵數校後一陳後三十四步左校四陳之中三處各虛六十八步計二百四十步虛實都厚一里一十六步計四百七十六步右校亦如之前校之首去中騎之末二百步自衝之胸到後校之末并虛在內共厚二里二百三十四步計一千三百一十四步左右校於中校平頭各相去四步計八步在內統成一大陳長七里三百五十八步計三千八百七十八步八卦陳第一百衝騎四穗各五部每穗一部居中中部則居於左右前各二處各相去二十步虛實彎長二里二十步計七百四十步每穗各二千五百計四穗並同居大陳角前披掩左右去大陳三十步不係大陳厚薄之數四陳並同法前校四陳步兵二十部騎六部共計六十四部步騎合一萬七千人第一陳步兵七部騎兵左右各二部計一十一部長二里三里五十八步計一千五百八步并部騎三處相接之地各虛四步第二陳步兵七部長一里一百三十步計四百九十步第三陳步兵七部騎兵左右各一部計九部長二里五十八步計七百七十八步虛法同前第四陳與第二陳同法左右後校並同前校法中校七陳步兵二十八部騎兵八部共三十六部步騎合一萬八千人第一陳步兵五部騎兵左右各一部共七部長一里二百七十八步計六百八十六步并步騎二處相接之地各虛四步第二陳步兵五部長三百五十步第三陳第五陳與一陳同第四陳與二陳同法第六陳步兵三部長二百一十一步第七陳步兵二部長二百八十步前校四陳之中三處各虛三十四步計一百二步虛實都厚二百三十八步騎兵各虛六十八步厚薄同數左右後校並同前校法中校七陳之中六處各虛三十四步虛實都厚一里一百一十六步計四百七十六步中校不常其地觀四面敵人力攻之處則應之别出騎兵八部居大陳四角之內每二部第二陳後一部兩稍抵大陳祗去五步第三陳後一部同前部法四面並同統成一大陳每角前虛一百步計四百步在內徑三里一百八十步計一千三百六十步四方並同外環一十二里三百一十三步計四千六百三十二步如敵引兵四面俱以衝騎力戰大陳不可輒動衝敵之進退令無反自蹂踐我陳焉飛轅寨第一百一飛轅寨者非古寨也臣切謂戎馬以衝突為利因此寨以禦之每一車竿四條每四條長六尺五寸徑方一寸五分前間一尺為槍頭側立槍頭以好鐵為之一尺為幹過竿方八尺二寸五分笋中間二尺近鑽方一寸五分笋後間八寸為幹三寸為鑽鑽亦以鐵為之其竿各相去七寸一分鑿圓竅以扇之其方兩頭各露六寸三分槍頭四條每條長二尺五寸內一尺為槍頭一尺為幹同前法二寸五分入槍頭方笋二寸五分五分通過後以拴之腳四度每隻長四尺徑方一寸五分搭腦一作腦笋入一寸上間一尺通竿方入二寸五分笋中間一尺一寸置槍頭方入二寸五分笋下間一尺一寸陷雲頭笋二寸令透底腳各居竿亭中安置兩畔間各闊七寸一分中闊一尺五寸七分方二條每條長四尺徑二寸五分穿腳兩頭各露二寸鑿竅各闊一寸五分以腳穿之近鑽方一條長四尺二寸五分闊一寸五分搭腦方一條長四尺徑方以一尺五寸雲頭自四角起狀如車輛而起闊一寸五分厚三寸二分彎長七寸一分車通竿上用鐡鈎二左右各一也一照內而一垂下以牛革挽之如有所用則衆車相鈎聯周環如城以拒衝突欲戰則旋拆開為門內鑽强彎為守行則剖之止則聯之每一車用步士一人禦之其用兵器者不限其數或立營或據險皆可用之也虎鈐經卷九
