  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0013_WYG_009-1a, image: WYG0727/WYG0727-0058a.png}
body:
  text: 虎鈐經卷九宋許洞撰四陣統論第九十六飛鶚陣第九十七長虹陣第九十八重覆陣第九十九八卦陣第一百飛轅陣第一百一四陣統論第九十六四陣圖者非古陣也臣切見李筌纂聚諸家陣圖但有形勢而已其部伍行列精微尺寸則莫能釋然其名既多其要則寡臣因辨古陣之法創造新意别為四陣之施可御而變因著論以明之論曰臣聞兵陣戰場止尸之所不能規度以固法何以取功决勝而定天下乎是故結陣之術不可疎疎則難應不可宻宻則難用首欲捷翼欲輕腹欲實尾欲正捷者不可使過輕者不可使凌實者不可使不應機正者不可使不知便即變今之所定四陣者十萬人之正陣也人數之多少臨時增減此非執盖此十萬人為準則焉每一陣歩兵七萬騎兵七萬以為常准但四陣更變各隨所便而用之爾每歩兵一人占地兩歩騎兵一人占地四歩取其出入輕各受敵夫四陣我以之法若敵為彎陣我以飛鶚陣應之敵為直陣我以重霞陣當之敵為突陣我以長虹陣當之敵引兵四面圍我我以八卦陣當之此所謂應敵者也其隊校所動各飛敵之去就焉善結陣者先結人心何謂先結人心賞罰明也欲士伍應變之精熟在日月數習之不能教陣者是舉其師以與敵也夫孔子云以不敎人戰是謂棄之此之謂也雖萬變之機不能精於陣戰之事與愚者同也然善戰者不陣騎兵也一部謂之五百歩兵如騎之數飛鶚陣第九十七前校首騎三陣一十部合成五千騎一陣一部長一百四十步第二陣四部左右各祗一隊丈陣中並同長一里二百步計五百六十步第三陣五部長一里三百四十步計七百步前校項兵三陣步兵二十七部合一萬三千五百人第一陣九部長一里二百七十步計六百三十步第二陣并第三陣如之中校五陣步兵九十二部合四萬六千人第一陣二十一陣即部長四里三十步計一千四百七十步第三陣第四陣亦如之第五陣八部長一里二百步計五百六十步後校尾兵一直陣步兵二十一部合一作各一萬五百人長四里三十步計一千四百七十步左校爪騎二陣五部合二千五百騎第一陣二部長一里六十步計四百二十步第二陣長一百八十步右校爪騎亦如之左校翼騎四陣二十部一萬騎第一陣五部長一里三百四十步計七百步第二陣第三陣第四陣亦如之右校翼陣亦如之前校首騎三陣之中兩處各虚六十八步計一百三十六步在内虚實都厚三百四十步前校項兵三陣之中兩處各虚三十四步計六十八步一作一百三十步虚實都厚三百七十步中校五陣之中四處各虚三十四步計一百三十六步虚實共厚三百六步後校一陣厚三十四步右校爪騎二陣之中一處虚六十八步計二百四步虚實都厚一里一百一十六步左校翼騎亦如之前校之項前去首騎之末三百四十步中校之首去前校項兵之末一百七十步後校之首去中校之末自前校之首到後校之末并虚在内共厚四里三百二十步計一千七百六十步左校爪騎居中校左校相接之地中校稍前一百三十步右校爪騎所居之地亦如之左右校低於中校第二陣一隊與中校相去各一里四十步統成一大陣虚實共長八里二百七十步計三千一百五十步長虹陣第九十八前校三陣步兵三十七部合一萬八千五百人第一陣九部長一里二百七十步計六百三十步第二第三陣亦如之中校五陣步兵九十二部合四萬六十作千人第一陣一十九部長三里二百五十步計一千三百三十步第二陣二十一部長四里三十步計一千四百七十步第三第四陣亦如之第五陣一十部一里三百四十步計七百步後校一陣步兵二十一部合一萬五百人長四里三十步計一千四百七十步右校衝騎四陣八部合四千騎第一陣五部左右各抵隊長一里三百四十步計一千步第二陣亦如之第三陣六部長二里一百二十步計八百四十步第四陣亦如之左校四陣與右校同法前校三陣之中二處各虚三十四步計六十八步左内都厚一百七十步中校五陣之中四處各虚三十四步計一百三十六步虚實都厚二百六步後校一陣都厚三十四步左校衝騎四陣之中一處虚六十八步虚實都厚二百四步右校衝騎亦如之左校四陣之中三處皆虚五十八步計一百七十四步虚實都一里一百二十二步計四百八十二步右校亦如之中校之首去前校之末一百五十步後校之首去中校之末一百二十步自前校之首到後校之末虚實共厚二里六十步計七百八十步自後校之首左右校衝騎之末一百五十步自左校衝騎之首到右校之末虚實共厚一里三百一十六步計六百七十六步右校衝騎到左校之末亦如之左右校角各去中校角一十步計二十步在内左右校第一陣第二陣與中校齊頭以向中校巡各一部為準外府髙於中校六十步左右校角第三第四陣皆掩一百在中之後統成一大陣彎長七里二百三十步計二千七百五十步重霞陣第九十九前校衝騎三陣一十二部合六千騎第一陣六部左右各抵一隊長二里一百二十步計八百四十步第二陣亦如之前校四陣步兵三十五部騎兵八部兵四十三部計步騎各二萬一千五百人第一陣步兵九部步騎兵左右各二部計一十三部長五里一百一十三步計一千一百九十八步地各虚步并步騎二處相接四步在内第二陣步兵九部長一里二百七十步計六百三十步第三陣與第一陣同法第四陣步兵八部長一里二百步計五百六十步中校四陣步兵八十四部合四萬二千人第一陣二十一隊四里三十步計一千一百七十步第二陣第三陣第四陣亦如之後校一陣二十一部合一萬五百人長四里三十步計一千四百七十步右校四陣騎兵二十部合一萬騎第一陣五部長一里三百四十步計七百步第二陣第三陣第四陣亦如之右校四陣與左校同法前校衝騎二陣之中一處虚六十八步虚實都厚二百四步前校四陣之中三處各虚三十步計一百二步虚實都厚二百三十八步騎兵各虚六十八步厚薄同數中校四陣之中厚薄之數與前校同法無騎兵數校後一陣後三十四步左校四陣之中三處各虚六十八步計二百四十步虚實都厚一里一十六步計四百七十六步右校亦如之前校之首去中騎之末二百步自衝之胷到後校之末并虚在内共厚二里二百三十四步計一千三百一十四步左右校於中校平頭各相去四步計八步在内統成一大陣長七里三百五十八步計三千八百七十八步八卦陣第一百衝騎四穗各五部每穗一部居中中部則居於左右前各二處各相去二十步虚實彎長二里二十步計七百四十步每穗各二千五百計四穗並同居大陣角前披掩左右去大陣三十步不係大陣厚薄之數四陣並同法前校四陣步兵二十部騎六部共計六十四部步騎合一萬七千人第一陣步兵七部騎兵左右各二部計一十一部長二里三里五十八歩計一千五百八步并部騎三處相接之地各虚四步第二陣步兵七部長一里一百三十步計四百九十步第三陣步兵七部騎兵左右各一部計九部長二里五十八步計七百七十八步虚法同前第四陣與第二陣同法左右後校並同前校法中校七陣步兵二十八部騎兵八部共三十六部步騎合一萬八千人第一陣步兵五部騎兵左右各一部共七部長一里二百七十八步計六百八十六步并步騎二處相接之地各虛四步第二陣步兵五部長三百五十步第三陣第五陣與一陣同第四陣與二陣同法第六陣步兵三部長二百一十一步第七陣步兵二部長二百八十步前校四陣之中三處各虚三十四步計一百二步虚實都厚二百三十八步騎兵各虚六十八步厚薄同數左右後校並同前校法中校七陣之中六處各虚三十四步虚實都厚一里一百一十六步計四百七十六步中校不常其地觀四面敵人力攻之處則應之别出騎兵八部居大陣四角之内每二部第二陣後一部兩稍抵大陣祗去五步第三陣後一部同前部法四面並同統成一大陣毎角前虚一百步計四百步在内徑三里一百八十步計一千三百六十步四方並同外環一十二里三百一十三步計四千六百三十二步如敵引兵四面俱以衝騎力戰大陣不可輒動衝敵之進退令無反自蹂踐我陣焉飛轅寨第一百一飛轅寨者非古寨也臣切謂戎馬以衝突為利因此寨以禦之毎一車竿四條毎四條長六尺五寸徑方一寸五分前間一尺為槍頭側立槍頭以好鐵為之一尺為幹過竿方八尺二寸五分笋中間二尺近鑚方一寸五分笋後間八寸為幹三寸為鑚鑚亦以鐵為之其竿各相去七寸一分鑿圓竅以扇之其方兩頭各露六寸三分槍頭四條毎條長二尺五寸内一尺為槍頭一尺為幹同前法二寸五分入槍頭方笋二寸五分五分通過後以拴之脚四度毎隻長四尺徑方一寸五分搭腦一作腦笋入一寸上間一尺通竿方入二寸五分笋中間一尺一寸置槍頭方入二寸五分笋下間一尺一寸陷雲頭笋二寸令透底脚各居竿亭中安置兩畔間各闊七寸一分中闊一尺五寸七分方二條毎條長四尺徑二寸五分穿脚兩頭各露二寸鑿竅各闊一寸五分以脚穿之近鑚方一條長四尺二寸五分闊一寸五分搭腦方一條長四尺徑方以一尺五寸雲頭自四角起狀如車輛而起闊一寸五分厚三寸二分彎長七寸一分車通竿上用鐡鈎二左右各一也一照内而一垂下以牛革挽之如有所用則衆車相鈎聯周環如城以拒衝突欲戰則旋拆開為門内鑚强彎為守行則剖之止則聯之毎一車用步士一人禦之其用兵器者不限其數或立營或據險皆可用之也虎鈐經卷九
