body:
  text: 虎鈐經卷一宋許洞撰天功第一地利第二人用第三三才應變第四三才隨用第五天功第一天道變化消長萬彚契地之力乃有成爾天貴而地賤天動而地静貴者運機而賤者効力上有其動而下行其化矣是以知天之施地匪專也知地之應天有常也生機動則應之以生氣機動則應之以氣機正則泰機亂則否萬物列形而否泰交著見之於地焉豈止地之為乎盖天道内而地道外者也王者天也將地也將者天也士卒地也我天也敵地也由此觀其所動故勝負可知矣王之於將也閫外之寄擇賢授柄舉無所疑將必内應其正外務其順應以正則師律嚴務以順則臣節貞舉而禦敵詎有輿尸之患乎君恃智以自用倨禮而傲下授柄匪人任人不信將不正應内包猶豫之惑外喪馭衆之威矣舉而禦敵寧免失律之㐫乎師之成敗見之於將焉豈將之為乎將之為任也智敵萬人茍無萬人之用與愚者同矣勇冠三軍茍無三軍之用與懦者同矣善為將者正而能變剛而能恤仁而能斷勇而能謀以策馭吏士未有不振㧞勲業以戡禍亂者也反是則吏士外無攻取之心内多離散之勢勇怯見之豈吏士之為乎夫我之於敵也攻㧞戰勝使敵不敢抗衡者豈敵怯乎由我威令整進退肅賞罰明也覆兵殺將弱國削地者豈敵彊乎由我不嚴師律故也夫如是則自上而及下自内而達外其猶天地之用乎故天必藉地力然後運四氣正生殺也貴必藉賤力然後能立元功而建王業也地利第二地之形險易殊也地之氣寒熱異也用形與氣在知逆順焉昧此道者不能得地利必矣善用地者則不然險而易之易而險之也夫居險用險必内潰居易用易必内蹶當有形之用逆之者善矣何謂險而易之曰簡以夷其政要以節其動寛以緩其約不以疎慢為失也何謂易而險之曰進止戒嚴内外無怠用其謹懼不以暴急為務也如是者乃險易之用也以方位觀之則寒熱之氣異也當有氣之用順之者善矣南方之氣熱北方之氣寒也其氣異則水土之性必相戾逆諸人而使之飲其地脉食其土毛蒙其風氣瘴癘之疾凍澁之戾加焉以我之不便犯順方之人不有患乎天不能以氣順人君能以人順氣可也是故利不可以專一北人之馬越人之航也各有便焉反是不可措手足矣行師者不能擇而用之斯亦更南北之所便也冀其成功遠矣是知地之所利者可兼而有乎善用兵者擇利而從之善矣人用第三今之世取人也每務其多學而捨其偏技非良術也兵家所利隨其長短而用之也是以善撫恤者勿使頻鬬慮其勞疲而無勇也善保守者勿使進攻慮其遲緩而不猛也多方者勿使與於決事慮其猶豫也多勇者勿與謀敵慮其過輕也精悍者使鬭果敢者使攻也沉毅而性執者使據險阻見小而貪財者不可使守儲蓄智而善斷者可擇其言輕健者使誘敵剛愎者使當鋒利口喋喋者使行間善䑕竊狗偷者使盜號探敵惡言多罵者使之揚毁訾詈奇材異識者使預談論深識大度者使安衆崛彊多力者使斬闢榛莽善隨地形結構者使度樹營柵怯懦者使輦運器用老弱者使備炊汲諳山川擇髙下水泉之利者使相地形妖言詐辭善張皇鬼神之說推引天命者使揚聲惑衆以動敵心善擇地勢平易險阻知往來細大之蹊路者使通糧儲竒辭偉辨能架虛矜大者使奮振威徳耳目聰明探察敵人情者使伺候奸偽敏才健筆者使主牋檄明七曜休咎者為厯數之士善占風雲吉凶者為候氣之士曉六壬遁甲者為選日時之士諳蓍龜者為卜筮之士是四人者雖推騐體測隂陽各不可使相亂貴其專一也醫藥之人二十人已上以兵數増之獸醫亦如醫人之數大將軍擇通材者與之㕘議可否故我大衆之内有善有惡無棄人焉人無所棄斯不怨則動有功矣三才應變第四易曰見機而作不俟終日故用兵之術知變為大軍雖氣銳時勝一作遇天時而行列散潰旌旗紊亂金鼓不節擊之可也或曰彼得天時詎可破乎許洞曰天之所祐正也怙天時而戾軍政與天違也天人相違不㓙何俟故兵利以順應順也順而逆應之必㐫之兆也或曰軍乗天時誇有地利將吏驕怠謀畫不精軍陣散亂如之何洞曰可擊也曰彼獲天地之利如何擊之曰人者天地之心也茍心不正雖有其表將焉用乎或曰軍違天時逆地利大將深謀沉毅部伍清肅進退有節如之何許洞曰未可擊也曰不獲天地之利奚謂未可乎曰正則可以率天地之用草冦可為王矣或曰彼如是也我之動將如之何許洞曰先以人次以地次以天然後攻之必克敵也曰先後如之何曰利為主何謂主曰動為客静為主觀敵之動何如乃應之夫書言動者不必戰陣時敵人先動為客也但宻構敵人所為之事謂之動則我以機應之為勝焉先勝而後舉神明之道也三才隨用第五天著吉凶以隂陽辨也地布險易以山川章也人包勇怯以戰陣見也茍一作有欲隂陽之順險易之利勇怯之用在於閒暇可得而擇也當彼我相逢各岀不意忽然交合曷能擇所利而用哉或曰兩師不期逼於險地天地震晦雨雪交積山川不辨當此之際何以禦之許洞曰大將止衆堅陣嚴肅號令雖敵來攻勿與交戰俟天變少罷觀弱彊之勢而後進退之曰我既安矣彼自驚撓則如之何曰以精兵乘之又曰倉卒之際大將以何術即能堅行陣嚴號令使士卒不自驚亂許洞曰善用兵者有動必備預擇輕勇者二十四人八方各三騎相去一里晝以旗夜以鼓過山川委曲叢林茂宻晝亦鳴鼔恐不見旗第一騎見賊晝舉旗第二騎亦如之第三騎馳告夜用鼔如晝法恐敵聞鼔聲急馳告烟霧蓊塞風雷震驚旗之不見鼓之不聞亟馳告斯謂八卦探騎者也是以偵賊而能備焉茍天地有變則引輕兵突之大陣不可妄動凡大兵之常以輕騎數千人别分部隊為游兵其将擇驍勇觀彼動静而後舉焉故我常用其整也此皆隨天之變也或曰與敵卒然相遇或平原廣澤或山谷深峭或坡嶝穹隆或拗汚沮洳或草木䝉宻俱是危地當其用之如何許洞曰迴渠迃一作汚澗可以衝車突馳也深峽隘口可以少擊衆也長林豐草可以為伏也原野漫衍可以騎兵相屬也草木隠障可以步士戰也平郊往來可進可退可以長㦸當敵踰水跨遠髙下相乘不可得親近可以弓弩當敵崖壁相隠狹徑斗迴可以刀楯當敵葦蕭蘆荻枝葉蔚茂可以戈鋌一作挺當敵此皆隨地之性也或曰寨柵之間三軍已憩寇敵乘間衝突攻擊當此之時如之何許洞曰使勇者據其前怯者匿其後忿遽之時怯者彊驅而前進焉必挫鋒折鋭不若隠之也曰當此之時何暇别勇怯之用乎曰不然善用兵者防亂於未亂備急於未急結營既定預擇彊勇者衛外怯弱者附之所以慮晦夜之急也此皆隨人之性也如是順天地人預備之道者也故易之卦以豫者預也取預備之象為難之用也故曰重門擊柝以待暴客盖取諸豫用兵者可不審於此乎虎鈐經卷一
