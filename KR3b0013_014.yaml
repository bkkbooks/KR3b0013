body:
  text: 虎鈐經卷十四宋許洞撰占星統論第一百四十二日第一百四十三月第一百四十四雜星第一百四十五客星第一百四十六妖星第一百四十七流星第一百四十八彗星第一百四十九占星統論第一百四十二臣謹按星經及諸傳記凡諸星宿中外羅列周天蓋隱見變化下應人事七曜往來以為經緯災變之作實在於兹凡為大將不可不詳察星位以括休咎焉或興受命之符或起敗亡之兆鮮不由此矣中宫天極其一明者太乙常居也旁三星曰三公或曰子屬後四星末一作未大星曰正妃餘三星後宫之屬也環之十二星藩臣也皆曰紫宫前列直斗口三星隋此一作北端鋭微曰陰德或曰天一紫宫左三星天槍右三星天棓後列六星絶漢抵營室曰闖一作閣道北斗七星所謂璇璣玊衡以齊七政杓攜龍角杓斗柄也龍角東方宿也攜連也衡中南斗魁枕參首用昏建者杓杓自華山以西南斗第七星法大白主杓者斗之尾為陰又其用昏昏陰位在西方故主西南也夜半建者衡衡正中州河濟之間假令杓昏建寅衡夜半亦建寅也平旦建者魁魁海岱以東北也斗魁第一星法為一作於日主齊魁斗之首首陽也其用在明陽為明德在東方故主東北方也斗為帝車運於中央臨利一作制四海一作極分陰分陽建四時均五行移一作利節度定諸紀一作記皆繫於斗斗魁戴匡六星曰文昌一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司祿在魁中貴人之牢魁中四理曰天理四星在斗魁中貴人牢曰天理魁下六星兩兩相比者曰三台三台色齊君臣和不齊為乖戾輔星明近主輔臣親強暗小主疏弱杓端有兩星一內為矛招搖近北斗者天矛星也招搖近河三星天矛天鋒天盾招搖一星也一外為盾天鋒逺北斗也在招搖第一星也名曰天鋒有勾圜一作啚十五星曰賤人之牢牢中星實則囚多虛則開出也若夫天一天槍天豫天盾動搖其芒角則天下之兵戈大起也東宫蒼龍房心謂房心載角曳尾若龍也心為明堂大星天王前後星子屬不欲直直王失計房為天府曰天駟其陰右驂旁二星旁一作房曰鈐北一星曰牽牛東北曲十二星曰旗旗中四星曰天市天市中星衆者曰實虛則耗房南衆星曰綺官左角理一作李右角將大角者天王帝廷其兩旁各有三星鼎足勾之曰攝提者直斗杓以指以建時節故曰攝提格亢者為首宗廟主疾其南北兩大星曰南門氐為天根主疫厄一作尾為九子曰君臣斥絶不知箕為敖客后妃之府曰口舌火犯守角則有陳戰犯房心王者惡之南宫朱雀權衡軒轅為權大微為衡衡大微三光之庭衛大二星藩臣西將東相南四星曰執法中端門門左右掖門內六星諸侯其內五星五帝座後聚一十五星曰哀烏郎位旁一大星將位也五星順入軌道司其出所守天子所誅也其逆入若不順軌道以所犯命之中座成形中座者犯帝者也成形者成禍福之形也羣下不從謀也金火尤甚廷藩西有隋星五曰少微士大夫權軒轅黃龍體如騰龍也前大星女主象旁小星御者後宫屬月五星守犯者如衡占東井為水事其西曲星曰鉞鉞北北河南南河兩河天闕間為關梁輿鬼鬼祠事中白者為質火守南北河者兵起之象也穀不登故德成衡觀成潢日月五星不軌道也衡大微廷也觀占也潢五潢五帝車舍也傷成鉞賊傷之占先成形於鉞也誅成質熒惑入輿鬼天質占曰大臣有誅也禍成井東井主水事火入之一星居其旁天子且以火敗故曰禍栁為鳥咮主草木七星頸為員官主急事張嗉為厨主觴客翼為羽翮主逺客軫為車主風其旁有一小星曰長沙星不欲明明與四星等若五星入軫兵大起也軫南衆星曰天庫樓庫有五車車星角若益衆及不具亡處車馬西宫咸池曰天五潢五帝車舍火入旱金入兵起水潦水中有二柱柱不具者兵起奎曰封豕為溝瀆婁為聚衆胃為天倉其南衆星曰廥積昴曰髦頭外星也為白衣會畢曰罕車為邊兵主弋獵其大星旁小星為附耳搖動有讒亂之臣在側畢昴為天街其陰陰國其陽陽國陰外也陽中也參為白虎三星直者是為衡石參三星白虎宿中東西直有似稱衡也下有三星鋭曰罰在參間之星也上小下大故曰鋭鋭曰罰三小星斜列無鋭形為斬艾事其外四星左右肩股一作暇也小三星隅置曰觜觽為虎有首主保旅事保守也旅軍衆言佐參伐艾除凶慝也其南有四星曰天厠厠下一星曰天矢矢黃則吉白及青黑凶其西有勾曲九星三處羅列一曰天旗二曰天苑三曰九斿其東一大星曰狼狼角變色則多盜賊下有四星曰弧直狼比地有大星曰南極老人星見則有天下治平不見兵起常以秋分候之南郊附耳星入壁中天下兵起北宫玄武虛危為蓋屋危上一星髙旁二下似蓋屋也虛為哭泣之事東一作其南有衆星曰羽林天軍虛危一作營室陰陽始終如為之處際會之間常多姦邪故設羽林為兵衛天軍之西曰壘或曰鉞旁一大星曰北落若微天一作亡軍星動角益希及五星犯北落入天庫一作軍兵大起火金水犯之尤甚火犯多憂兵事水犯憂水患木土入之則吉危東六星兩兩相比曰司冦一作空營室為宗一作清廟四一作曰離宫闖一作閣道漢中四星曰天駟旁一星曰王良策馬車騎滿野旁有八星絶漢曰天潢星旁江星動人涉水杵臼四星在危南若匏瓜有青黑星守之魚鹽貴南斗為廟其北建星建星者旗也牽牛為犧牲其北河鼓河鼓大星為上將左右者為左右將婺女其北為織女織女者天孫也是以聖人於春秋二百四十二年之間日食三十六彗星三見夜明常星不見夜中星殞如雨變異皆書之當時禍亂輒應上下交怨諸侯奔走戰伐並興一作與不保其社稷者不可勝數是知玄象示變吉凶之微也凡為將者不可不詳之也日第一百四十三無雲而日色昏晦者主將不明也或日月陰沉無光不雨或十晝夜不見日月者曰蒙此時不可妄委兵於人大將不忠之象也日色青軍令削弱吏士多凌正也或日邊雲氣文成五色者破軍殺將之象也其大禍在二年之內或赤雲截日如杵形者兵將大戰血氣先動者敗或日月旁有物如枯樹起兵者勝或雲氣如青衣人無手在日西立者所見之軍當有帝王此勝侯也兩軍相當日暈等者力均若曰殺將抱日而負且戴者有喜圜在於中者內兵勝圜在於外者外兵勝日弭一作珥拜大將有兵在野日有白足者所臨破軍殺將有背氣青赤色曲而向外者為背叛之象也其將有二心日背有缺氣被直向外如山字者兩軍相當所臨者敗兩軍相當日有冠纓者和解抱截一作戴大喜日外青內赤則兩軍以和相去日外赤內青則兩軍以惡相去日之氣暈先至而後去居軍勝若先至先去前有利後有病後至後去前病後利先去前後皆病居軍不勝見而去其發疾雖勝必亡功見半日上功大暈一作而缺兩軍相當從缺方擊之勝抱暈者隨抱暈克日背暈而弭外軍凶暈有直氣在外者所臨克日有背暈兵陳不合七日日暈不解者不可起軍暈而背抱弭及值而實之者順從擊之克暈而兩珥一在外一在內并有聚雲不出三日兩軍和解之又有他軍圍城凡日暈制勝近期三十日逺期六十日日下有雲氣如龍形蜿蜒者凶日鬬將大血戰天下亂日失行凶日有揚光重輪日五色當之大吉利日無光而赤暈主將憂黑暈敗白暈驚子日日食兵起魏分丑日日食兵起趙分忌六月十二月兵動寅日日食兵起燕分忌正月七月卯日日食兵起魯分忌二月八月辰日日食兵起楚分忌三月九月巳日日食兵起宋分忌四月十月午日日食兵起韓分忌正月七月未日日食兵起齊分忌六月十二月申日日食兵起魏分其禍最深忌五月十一月酉日日食兵起鄭分忌二月八月戊日日食兵起宋分忌正月七月亥日日食兵起秦分忌四月十月夫日食從上食者不出九十日國有征伐日從下食者百姓更有侵奪日從旁食者兵動鄰國月第一百四十四黃虹貫月者兵起月旁氣漸漸大者不可攻城叩陳宜屯兵以自守敵來勿與戰月旁氣細細從外侵輪但攻城小戰勝月旁氣逺之不得攻城切宜堅自守備或氣繞月而光明者主人吉但守勿憂外賊或星在月背城中兵欲敗走星在月角軍中有智謀之士勿輕敵月之下角有星敵人潛入我軍宜精守四門詳别詐偽或三星上下在月之上下角及在月背用兵不利攻城不拔或三星俱在月背攻戰一作城皆不利軍中亦有失叛之事宜精慎明察恤撫三軍或三星俱在月上者攻戰不利或三星俱在月形中敵中兵亂三日內降月形中者謂彎月之虛氣也三星俱在月下敵中當有詐降大造戰具欲乘間大戰月入太微出北座若犯北座則下謀上月出房户北為兵亂出房户南為兵敗喪月暈七重在參畢之間兵大起辰星在翼月犯之大將死太白入月敵兵退月暈光起兵者勝抱載一作負載赤色在外外克在內內克月暈之時嵗星鎮星色暗客勝若明主勝月暈太白色暗主勝色明客勝月起房箕大風起暈於參畢大兵起軍出之時卯蝕即凶大星入月色暗惡客敗色明客勝月暈赤色客勝月垂四珥敵來攻月帶四彗而出密備姦人謀主將不忠兵大起月在天獄中吏士多犯禁星貫月中主將多淫亂之事亦防姦人亂軍兩月相重吏士爭亂爭亦作大日月並見將弱士強月食謀者不明入井中者兵起月逼近太微者大臣謀亂月臨天獄者從四邊周回食向心者大亂食於八月九月者敵兵盛一作勝茍欲詳日月星辰之變當以二十八宿之分野驗之則知在於彼我矣雜星第一百四十五福慶之星其化者何積天地淳一作純粹之精氣也精氣動而化之也飛流之星其化者何五星之精氣也五星有變則精氣散而為妖星是故漢書曰天暒而景見暒者赤赤方與青方相連赤方氣中有兩星明也青方氣中有一黃星明凡三星相合而明則為景星者也景星者也黃而潤澤其狀無常常出有道之國茍或見於軍上此乃應天之兵大慶之兆也若在當速自退軍不可與抗也或流星長四五丈如龍蛇動搖者大將凶或白雲如車輪下有流星旋入北斗者主人當走星有勃於招搖者外國為患或流交於天心者敵盛或流衡太白而過者大將凶或流星貫日而滅敵凶或流星貫於紫宫備姦賊下謀上流星前赤後青黑者客軍敗流星從敵上來至吾營上者當有姦謀來説吾軍流星尾長三尺暉然者氣使也赤色者將軍使也凡用兵攻其星見之所則克也流星色蒼白者為使赤則有兵黑則喪星有曳光如匹練墜軍中者星有色如血及星有光奕奕細碎墜軍中者敵兵陰到多殺傷或星無尾形色如橘或有拖光如劍形墜軍中者敵兵剛猛我必敗或大星無尾狀如斗及火星狀如橘大而色黑晝墜軍中者主大殺害星有五色曳尾或有圓光大如斗內赤黃而外青及有頭如血而尾白墜軍中者敗兆也客星第一百四十六客星者非主座之星也故曰客星色白如氣勃勃似絮所過之宿必有災害出營室無兵亦不罷入奎破兵殺將犯婁外亂入昴外入犯塞入畢邊有急兵一作水犯觜堡虛軍儲少飢犯栁兵起守張將有陰計兵起入招搖敵兵起入天槍兵起入天棓兵起犯文昌星色蒼將有憂色多赤將驚色黃將喜色黑將死守傳曰敵入中國守天雞天下兵馬驚守天街敵人死入庫樓兵起守南河兵起守騎官將憂士卒疫守北落師門虜入塞兵起守天倉粟貴入天苑兵作馬死入天宫天下弓弩皆張出天宫丐奴兵起守庫騎西羌來降守九州殊口負海丕安妖星第一百四十七天鴈星軍中之精華也色青赤有光尾長三四丈天猾星者飛星忽作為雲者也所以兆地有流血積骨之象也頓頑星如大甕前卑後髙見則大將死燭星者狀如太白其出也不行才見而滅所燭之地城邑拔兵破亂也天狗星者狀如大流星有聲星其下也止地其形類狗逺望之如火光炎炎中天而下圓如數頃田而上鋭黃色見則千里破軍將死也一曰有尾如狗形也蚩尤旗類彗而尾曲象旗見則王者征伐四方天蓬絮者類十小星綿聨如絮所見之野當有兵起虎頭星者其落如大月著地一作城則光星類里大聲如雷所墜之地兵火起旬始星出於北斗旁狀如雄雞怒則青黑象伏鱉見則兵亂格澤星者如炎火之狀黃白色起地上鋭一作鈍而下大也其見也不種而獲不有土功必有大害枉天星者類大流星蛇行而蒼黑如有毛日長如一匹布著天此星見則天下兵起昭明星者白而無角乍上乍下所見之地兵多變動也五殘星者出正東方東方之星也其狀如辰星去地可六丈大而黃六賊星者出正南方南方之星也去地一作行六丈大而數動有光焰司詭星者出正西方西方之星也去地六丈其狀如太白大而白咸漢星者出正北方北方之星也去地可六丈而赤數動察之則中青此四星所出非其方其下當起兵為亂衝擊者不利焉四鎮星者出四隅之地去地可四丈地維咸光星者亦出四隅去地可三丈若月之初出所見則下有亂兵興動有德者昌或二赤星在月背者利宫姓為將或三赤星從西北向東南者利徵姓為將或一赤星從西向東者利角姓為將或二赤星共尾一處從東向西者利商姓為將或三赤星引尾直上者利羽姓為將夫星象所見兵家禍福之本不可不詳之流星第一百四十八流星者天使也上者曰飛下者曰流也飛大曰奔星小曰流星大使大星小使小星謂紫微太微宫也徐行漸進經於列宿之次或於大星之座為使也聲大者怒象也疾出遲出者並為妖星八角四方兵起前黑後赤兵敗將亡入參不出先起者敗犯七星兵起色青兵起入河鼓大將亡一云河鼓兵起出王良兵起入將軍及羽林兵大起抵北落兵起使星出入天庫胸奴兵起抵天市垣大將亡抵天狗犯弧矢將有千里之行使星出廏兵馬起彗星第一百四十九彗星長而亘天兵大起也引尾入城城將拔近則八日逺則十二日有應彗直垂入軍營者凶宜一作逺拔之否則士卒俱死若在敵宜急擊之彗出於月之左右者不出三十日有兵起抵觸月者暴兵起若色白者有大喪也蒼黃者臣下謀叛黑者兵大起也從中天出曳尾向西者姦人謀主將從南曳尾向北者妄殺害從天中出身尾向東者士民多飢曳尾向東者民凶從北出曳尾向南者士人凶彗形如寶冦來疾速形如幢節者冦強不可妄動色如血者敵兵陰到光焰爛燦而尾長濶者敵盛凡彗所指處皆凶地也虎鈐經卷十四
