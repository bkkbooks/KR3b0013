body:
  text: 虎鈐經卷十八宋許洞撰天第一百七十七地第一百七十八虹蜺第一百七十九雷霆第一百八十戰候第一百八十一雜占第一百八十二占風統論第一百八十三五音占風第一百八十四刑殺占風第一百八十五十二位占風第一百八十六占逆風第一百八十七風雨雜占第一百八十八八節占風第一百八十九天第一百七十七天裂一作制于敵上者敵人自亂之兆也天色如血兵戰之兆也天雨甘露所雨之地兵大勝也雨雖在敵敵敗也在我軍避之天雨魚鼈在敵敵敗也在我亦當避之天雨血在敵急擊之可勝也在我避之或在我彼兩界者將大血戰吏士俱傷天雨絮及粟在敵敵㓙在我避之天雨海島毛大亂之兆也天雨毛所雨之地大將信任邪謀也若煙非煙慶雲也雲開有徳若星非星歸邪也歸邪有人若霧非霧泣軍也泣軍多殺將若雷非雷天鼓也天鼓多敗軍不雲而雨天泣也天泣多覆國凡天下之事變異於人者急慎之地第一百七十八地裂者兵戈之兆也營中地生錢者下謀叛也急備之營中地上生毛者吏士多亡敵嚴令防之軍在野營地震者有灾星到也營地生五谷者將士有喜慶大將有封邑營中地色忽變黄者大慶之兆也營中地忽拆裂有軍敗將死也急移營避之地忽陷者主將破滅之兆也營中地忽生血者賊来急速避之城中與營内山忽有夜崩者吏士欲分散移營避之屯兵之城山春崩者敵来伐城山夏崩者有大水至山秋崩者有暴兵至山冬崩者軍民飢結營之地吼如雷者敵来急速備之流水無故絶者設伏兵至水忽赤如血者軍士欲自亂急備之虹蜺第一百七十九攻敵人之城有虹蜺屈曲從外入者三日内城屠五色虹蜺飲軍井者大㓙移營避之虹蜺垂營中者亦敗兆也五色虹蜺繞城城中將亂急攻之白虹見於軍上者軍敗流血白虹貫中師不可出白虹繞城而不匝者從不匝處攻之必拔矣繞城而匝者即俟從漸錯處攻之赤虹從天直垂地者所垂之地敵兵至十一月屈虹出破軍敗將天有白虹如霧者營中防姦賊及兵將反黑虹所見之地大水到其處利於髙處置營赤虹半隠雲上有火灾亦當敗黄虹在營上吏士多驚撓青虹亦如之不為灾雷霆第一百八十營中雷折木者大將㓙利修軍政春三月内甲子乙丑戊寅辛夘戊午有雷及霹靂下石殺人者軍在野營將有大戰一月内應之雷一聲而止者將軍有重令行將戰之時雷聲自我陣後起漸漸入敵者必勝也隨其聲而擊之吉從敵震迅而来者㓙也急抽兵避之天陰不雨雷霆在我軍上隨而擊之者大勝也合戰之時大雷一聲而止先動者勝渾渾圓長者從来處吉聲四起東西南北不定者軍有大血戰兩軍傷大雷疾速自我入敵者勝也自敵来㓙霹靂當牙帳急搜檢一作驗之營中有姦人為賊應亦慮暴兵至或夜半無雲而雨者吏士不從軍令也火急施恩布惠一作講我以禳其禍戰候第一百八十一交戰之時五色采旗掣拽不動者大勝候也敵强力戰慎不可追之臨戰之時鼙鼓之音鳴于常者勝候也角聲清激者勝候也風不起而旌旗悠揚前指敵陣者勝候也馬驕嘶而喜躍欲進者勝候也牙帳無故倒折者敗候也鼙鼓之音重濁不上徹者敗候也角聲洪濁不清潔者敗候也焦而四亂者敗候也横而不圓者内亂將發旌旗撩亂不整者敗候也馬亦多驚嘶退縮者敗候也臨陣之際勝敗之候能詳審者善矣雜占第一百八十二結營之地天火焚其林墅者賊兵疾到火無故自發焚其帳幕者有大水到溪澗中水忽出主有陰賊到其地㓙移營避之或出軍之時或將戰之際有兔及麋鹿之類走過者忽殺之勝兆也營中黄龍見者大勝也營中山池沼溪澗忽自然自外而入者士卒凌主將龍鬬營中及左右者賊大至亦防大水羣虵集營前道上者有急兵至營中竹樹忽然生血者大將有重憂營中不雨而樹濕者賊兵起營中忽得五色魚者勿殺之殺則大水立至不然暴兵到有魚上下于樹者水亦至急移營髙處避之鷄有重距重翼飛来營内者勝兆也殺則大㓙兩軍相當遙見敵上有龍者不出一月敵當大敗大尿溺營前大道者移營避之有灾至營中馬忽驚嘶者即起卒兵立具兵器備之恐賊潛到馬前營生角者多殺傷馬毛無故而赤主將灾也將帥之馬夜無故嘶者其主㓙城忽出水者賊兵相侵䑕嚙一作齧甲胄及兵器者損吏士也䑕羣行即有大水䑕頻出軍中防叛逆虎狼入營者賊兵至傷人大㓙占風統論第一百八十三凡灾風之来多有殺氣克日濁塵飛埃蓬勃四起也凡祥風之来多與佳氣併而日色清朗天氣涼索令鳴條去地少髙不動塵而過也五音占風第一百八十四宫風聲如雷吼空中一作風商風聲如驅羣羊徵風聲如奔馬羽風聲如擊濕鼓角風聲如千人子午為宫丑未寅申為徵夘酉為羽辰戌為商巳亥為角宫風發屋拆木米貴来年兵起徵風發屋折木四方有急羽風發屋折木米貴一作情􅀈商風發屋折木主兵角風發屋折木急鬬戰刑殺占風第一百八十五嵗月日時干陽徳自處陰徳在干合嵗月日時子刑夘夘刑子丑刑戌戌刑未未刑丑丑刑巳巳刑寅一作申辰午酉亥各自相刑子丑寅巳申為上刑夘寅巳為下刑大風從三刑上来官軍克大寒大克小寒小克風從刑下来禍從刑上来福從三刑為上從自刑為下十二位占風第一百八十六申子為貪狼主欺紿不信已賊遇盜賊主攻刼巳酉為寛大主福禄賞賜衆宴酒食主貴人君子亥夘為陰賊主戰鬬殺傷謀反大逆殺人之事寅午為㢘宜一作貞主賔客禮樂嫁娶圖儀誠信丑戌為公正執仇怨主兵辰未為奸邪主欺慢人貪狼之日風從寛大来仍以貪狼參説吉㓙他皆倣此有殺氣從三刑上来或五墓上来有伏兵不戰必克逆風第一百八十七蓬勃四起或自上来觸地此逆風也暴兵至寅時發主人逆辰時發客逆午時發親戚逆申時左右逆黄昏發外賊逆宫日風從角上来卒急有兵圍至月中折木者城陷羽日風喧喧日無光深霧兵圍城客克商日風從四季上来關梁不通路色陰賊日風從陰賊上来大寒日一作賊日相殺風雨雜占第一百八十八攻城圍邑經旬不雷雨者城中有備疾去之出征之日細雨沐兵捷之徵也若大風雷雨不見日辰午戌亥自刑之日兵家大忌也臨戎之際忽来陰氣旁勃牙杠折陰不見日旌旗抑揚此敗徵也慢風與氣從敵所俱来我勝急擊之反是則㓙旌旗翬翬一作暈順風搖曳舉向賊者即擊之勝也大將牙旗之日風勢順動旌旗前指鼙鼓之音清亮此勝兆也持此可以勝安定三軍之心風施塵如穗如虵形屈屈来様者㓙急備之風来卑而掃地者敵兵至速髙則来緩營中大風折木者大將失位風無常而無定者賊即至合戰之際大風晝昏揚塵衝敵大勝反是㓙兵初至所伐之城天色陰翳又無風而細雨涳濛者軍將敗若初臨敵而大雷雨隠而至者大勝之兆也有旋風入營折絶旗幟干戈次壊帳幙必有盜賊入營將死八節占風第一百八十九候風之次一作發常于其節寅時候之立春之日位應艮宫本宫綽綽然和風徐徐而至者此之謂條風也風自人門起者軍民不利也春分之日位應震宫本宫風来抑之非低颺之非髙習然得風者此之謂明庶風也明庶風應候軍民寧泰之兆也風自金門起者軍民不利也立夏之日位應巽宫本宫風至陶陶然圓緩而不散亂者此之謂清明風也清明風應候軍民寧泰之兆也風自天門起者軍民不利也夏至之日位應離宫本宫風薰然融和而普者此之謂景風也景風應候軍民寧泰之兆也風自水門起者軍民不利也立秋之日位應坤宫本宫風来暢而愉一作渝者此之謂涼風也涼風應候軍民寧泰之兆也風自鬼門起一作来者軍民不利也秋分之日位應兊宫本宫風来肅然者此之謂閶闔風也閶闔風應候軍民寧泰之兆也風自木門而起者軍民不利也立冬之日位應乾宫本宫風潔清瑩爽而至者此之謂不周風也不周風應候軍民寧泰之兆也風自土門起者軍民不利也冬至之日位應坎宫本宫風来凄涼不怒者此之謂廣漠風也廣漠風應候軍民寧泰之兆也風自火門起者軍民不利也風之来也順者為祥逆者為妖皆由人志正邪然後通天地鬼神之心也是以八節之首日而占之可以知其吉㓙矣行師者能以順正之道應乎天欲風之不祥也其可得乎虎鈐經卷十八
